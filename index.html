/* ── MEDIUM (25) ── */
{id:'ar26',t:'rep',d:2,type:'mcq',q:'Emphasis of Matter (SA 706) is used to:',opts:['Modify opinion','Draw attention to properly disclosed matter fundamental for understanding','Report fraud','Describe KAMs'],ans:1,exp:'EoM draws attention to matter already in FS — fundamental for user understanding. E.g., significant subsequent event, effect of regulatory litigation, going concern (where resolved). Does NOT modify opinion.'},
{id:'ar27',t:'rep',d:2,type:'scenario',q:'Gamma Ltd has not depreciated plant ₹40 lakh (material, 5% of assets). Error is material but not pervasive. Opinion:',opts:['Unmodified','Qualified','Adverse','Disclaimer'],ans:1,exp:'Material (5% assets) + NOT PERVASIVE (specific line only) → Qualified Opinion. "Except for the effect of non-provision of depreciation..."'},
{id:'ar28',t:'rep',d:2,type:'tf',q:'KAM (SA 701) is mandatory for audits of all companies.',ans:false,exp:'False. Mandatory ONLY for LISTED entities. Other cos — voluntary or per law. Other entities may include KAMs if required by regulation.'},
{id:'ar29',t:'rep',d:2,type:'fill',q:'"Other Information" paragraph under SA _____ refers to information outside FS but in annual report.',ans:['720','sa 720','720 revised'],exp:'SA 720 Revised: Auditor\'s responsibility for Other Information (Director\'s Report, MD&A, Chairman\'s Statement) in annual report. Read, consider material inconsistency with FS.'},
{id:'ar30',t:'rep',d:2,type:'mcq',q:'"Other Matter" paragraph (SA 706) refers to:',opts:['Matters in FS','Matters NOT in FS but relevant for users','Matters in notes','Matters in prior year'],ans:1,exp:'Other Matter paragraph: Matter relevant for users, NOT disclosed in FS — e.g., restricted use of report, comparison to budget / prior-auditor. Distinct from EoM (which refers to matters in FS).'},
{id:'ar31',t:'rep',d:2,type:'scenario',q:'80% of Sigma Ltd\'s revenue (₹200 cr of ₹250 cr) is misstated due to flawed recognition policy. Misstatement is material + pervasive. Opinion:',opts:['Qualified','Emphasis of Matter','Adverse Opinion','Disclaimer'],ans:2,exp:'Material AND pervasive (80% of revenue) → ADVERSE OPINION. Auditor states FS do not give a true and fair view. Pervasive = substantial portion of FS affected.'},
{id:'ar32',t:'rep',d:2,type:'mcq',q:'Delta Ltd management denies auditor access to ₹180 cr inventory (70% of assets). Opinion:',opts:['Qualified','Adverse','Disclaimer','Unmodified'],ans:2,exp:'Scope limitation on inventory (70% of assets) is PERVASIVE. Auditor cannot form opinion → DISCLAIMER OF OPINION. "We do not express an opinion..."'},
{id:'ar33',t:'rep',d:2,type:'tf',q:'If accounting policy change is appropriately disclosed, opinion should still be qualified.',ans:false,exp:'False. If change is APPROPRIATE and ADEQUATELY DISCLOSED, no modification needed. Auditor may include EoM to highlight the disclosure for users — but opinion remains UNMODIFIED.'},
{id:'ar34',t:'rep',d:2,type:'fill',q:'When auditor is satisfied with going concern, but material uncertainty exists and is adequately disclosed, report includes a separate _____ section.',ans:['material uncertainty','material uncertainty related to going concern','going concern','material uncertainty on going concern'],exp:'SA 570 Revised: Separate section "Material Uncertainty Related to Going Concern" — does NOT modify opinion but prominently highlights the uncertainty. Pre-Revised was an EoM.'},
{id:'ar35',t:'rep',d:2,type:'mcq',q:'If material misstatement is identified AND management refuses correction AND it\'s material but not pervasive:',opts:['Issue Unmodified','Issue Qualified Opinion','Issue Adverse Opinion','Issue Disclaimer'],ans:1,exp:'Material + not pervasive + uncorrected = QUALIFIED OPINION. Basis paragraph quantifies the misstatement. Management refusal triggers modification — adjustment would have saved the clean opinion.'},
{id:'ar36',t:'rep',d:2,type:'scenario',q:'A company refuses to allow bank balance confirmation (material but not pervasive scope limit). Opinion:',opts:['Unmodified','Qualified ("except for" — inability to obtain evidence)','Adverse','Ignore'],ans:1,exp:'Scope limitation on one account — material but not pervasive → QUALIFIED OPINION on grounds of inability to obtain sufficient evidence. Quantify potential impact in basis paragraph.'},
{id:'ar37',t:'rep',d:2,type:'tf',q:'Subsequent events after audit report date can still require modification of report.',ans:true,exp:'True. SA 560: If auditor learns new facts post-audit report date that, had he known then, would have caused modification — he must (a) discuss with management, (b) re-issue report with new date, or (c) withdraw original.'},
{id:'ar38',t:'rep',d:2,type:'mcq',q:'KAM section appears in audit report:',opts:['Before opinion','After Opinion + Basis for Opinion, before Other Information','After all sections','In management letter'],ans:1,exp:'SA 701: KAM section placed AFTER Opinion and Basis for Opinion, BEFORE Other Info/Management Responsibility. Structure: each KAM has description + how addressed during audit.'},
{id:'ar39',t:'rep',d:2,type:'fill',q:'The auditor must obtain _____ letter from management before signing the audit report.',ans:['representation','management representation','written representation','mrl','representations'],exp:'Written Representations (SA 580): Management confirms responsibilities, information completeness, disclosures, specific assertions. Obtained near report date. Forms part of audit evidence.'},
{id:'ar40',t:'rep',d:2,type:'scenario',q:'A company has loss > net worth (eroded net worth). Accounts prepared on going-concern basis. Management demonstrates plans. Auditor:',opts:['Adverse opinion','Unmodified opinion with Material Uncertainty Related to Going Concern section','Disclaimer','No mention'],ans:1,exp:'Eroded net worth = going concern alert. If management\'s plans are reasonable AND DISCLOSED, auditor issues UNMODIFIED opinion WITH "Material Uncertainty Related to Going Concern" section. This gives prominence without modifying opinion.'},
{id:'ar41',t:'rep',d:2,type:'tf',q:'An auditor\'s report for a listed company must include KAM section.',ans:true,exp:'True. SA 701 mandatory for LISTED entities. Non-listed need not include KAM, unless required by law, regulation, or voluntarily.'},
{id:'ar42',t:'rep',d:2,type:'mcq',q:'The "Auditor\'s Responsibilities" section of the report states:',opts:['Management responsibility','Auditor\'s objectives, conduct of audit per SAs, and reasonable assurance','Only qualification','Company profile'],ans:1,exp:'SA 700: Auditor\'s Responsibility section explains scope of audit, reasonable (not absolute) assurance, professional skepticism, identification and assessment of risks, etc. Helps users understand limitations.'},
{id:'ar43',t:'rep',d:2,type:'fill',q:'Under SA 706, an _____ paragraph may be added to draw attention without modifying opinion.',ans:['emphasis of matter','eom','emphasis','other matter'],exp:'SA 706: Emphasis of Matter (EoM) or Other Matter paragraphs. EoM — for matters in FS. Other Matter — matters outside FS. Neither modifies the opinion.'},
{id:'ar44',t:'rep',d:2,type:'mcq',q:'If auditor qualifies opinion on one matter, can he still issue unmodified on other matters?',opts:['No','The opinion itself is QUALIFIED as a whole on the specified matter; entire audit report is modified','Yes, dual opinion allowed','Only in some SAs'],ans:1,exp:'Opinion is HOLISTIC — report is either unmodified OR modified. "Qualified opinion" means the WHOLE audit report is modified, with specific exception noted. No dual opinions — but qualification language isolates the issue.'},
{id:'ar45',t:'rep',d:2,type:'scenario',q:'Beta Ltd invested ₹5 crore in illegal/unauthorised activity (unapproved investment). Material but not pervasive. Appropriate opinion:',opts:['Unmodified','Qualified with basis describing non-compliance','Adverse','Disclaimer'],ans:1,exp:'Non-compliance with laws (SA 250) material + not pervasive = QUALIFIED OPINION. Basis for Qualified Opinion paragraph describes nature of non-compliance. Also consider reporting under CARO and Sec 143(12) if fraud.'},
{id:'ar46',t:'rep',d:2,type:'tf',q:'Auditor must modify opinion if FS are prepared on a non-applicable framework.',ans:true,exp:'True. If FS don\'t comply with applicable framework (e.g., Ind AS required but co. uses AS), auditor qualifies or issues adverse opinion depending on materiality/pervasiveness.'},
{id:'ar47',t:'rep',d:2,type:'mcq',q:'A Modified Opinion is NOT expressed as:',opts:['Qualified','Adverse','Disclaimer','Emphasis of Matter'],ans:3,exp:'Modified Opinion = Qualified / Adverse / Disclaimer. EoM is NOT a modification — it enhances disclosure without changing opinion.'},
{id:'ar48',t:'rep',d:2,type:'fill',q:'SA 706 deals with _____ paragraphs.',ans:['emphasis of matter','emphasis of matter and other matter','eom','emphasis'],exp:'SA 706: Emphasis of Matter and Other Matter paragraphs. Both add to report without modifying opinion.'},
{id:'ar49',t:'rep',d:2,type:'scenario',q:'XYZ Ltd has unresolved tax litigation (₹20 crore). Adequately disclosed in notes. Auditor\'s treatment:',opts:['Qualify','Unmodified + Emphasis of Matter paragraph drawing attention to contingent liability','Adverse','Hide'],ans:1,exp:'Contingent liability adequately disclosed = no misstatement. Unmodified opinion. Significance warrants EoM paragraph to direct users\' attention — not a qualification.'},
{id:'ar50',t:'rep',d:2,type:'mcq',q:'When a predecessor auditor\'s report for prior year was modified, incoming auditor:',opts:['Ignores','Considers implications for current year, may reference in "Other Matter"','Re-audits prior year','Replaces prior year auditor'],ans:1,exp:'SA 710 / 706: If prior year audited by predecessor and report was modified, incoming auditor considers implications for opening balances and may use "Other Matter" paragraph to reference prior-year audit (done by predecessor) in current report.'},

/* ── HARD (25) ── */
{id:'ar51',t:'rep',d:3,type:'mcq',q:'Auditor forms an adverse opinion on FS but going concern material uncertainty also exists. Report:',opts:['Only adverse opinion','Adverse opinion + separate "Material Uncertainty Related to Going Concern" section','Only EoM','Disclaimer'],ans:1,exp:'Dual issues. Adverse opinion covers FS misstatements. Going concern MU addressed separately — SA 570 section gives prominence. Complex but each has its own reporting treatment, not mutually exclusive.'},
{id:'ar52',t:'rep',d:3,type:'tf',q:'Pervasiveness test for adverse opinion considers only quantitative materiality, not qualitative.',ans:false,exp:'False. SA 705: Pervasive = (a) not confined to specific elements, (b) or confined but represents substantial portion, (c) or disclosures fundamental to user understanding. Qualitative aspects count — e.g., disclosure error on related-party can be pervasive even if small.'},
{id:'ar53',t:'rep',d:3,type:'fill',q:'SA _____ covers "Comparative Information — Corresponding Figures and Comparative Financial Statements."',ans:['710','sa 710'],exp:'SA 710: Auditor\'s responsibilities for comparative info. Distinguishes Corresponding Figures (part of current FS) vs Comparative FS (full separate). Opinion coverage differs.'},
{id:'ar54',t:'rep',d:3,type:'scenario',q:'Auditor for current year finds prior-year comparatives contain material error. Predecessor audited prior year. Treatment:',opts:['No action','Discuss with management — restate comparatives in current FS with required disclosures; incoming auditor may need EoM / modification','Only note in KAM','Adverse'],ans:1,exp:'SA 710: If prior-year comparatives materially misstated, incoming auditor discusses with management → management restates. Auditor\'s report on current period addresses this appropriately. If uncorrected, modification on current report. Coordination with predecessor auditor.'},
{id:'ar55',t:'rep',d:3,type:'mcq',q:'In forming Opinion under SA 700, auditor must consider whether:',opts:['Sufficient appropriate audit evidence obtained','Uncorrected misstatements are material','Qualitative aspects of accounting practices','All of these'],ans:3,exp:'SA 700 Opinion formation considers: (a) sufficient appropriate evidence (SA 500), (b) uncorrected misstatements material individually or aggregate (SA 450), (c) qualitative aspects of accounting practices (aggressive vs conservative), (d) appropriateness of framework. All integrated.'},
{id:'ar56',t:'rep',d:3,type:'tf',q:'For an Adverse Opinion, auditor still expresses opinion that FS are NOT presented fairly.',ans:true,exp:'True. Adverse Opinion: Auditor HAS sufficient evidence but concludes FS DO NOT give true and fair view. Unlike Disclaimer, opinion IS formed — just that it is negative. Both are modifications but conceptually different.'},
{id:'ar57',t:'rep',d:3,type:'fill',q:'Under SA 701, each Key Audit Matter has two components: description of the matter and _____ addressed it during audit.',ans:['how the auditor','how it was','audit procedure','audit response','how auditor'],exp:'KAM structure: (a) Description of the KAM (referring to disclosures in FS), (b) How the matter was addressed in the audit (procedures performed, conclusions). Gives transparency.'},
{id:'ar58',t:'rep',d:3,type:'mcq',q:'A joint auditor disagrees with the other joint auditor\'s opinion. Appropriate action (SA 299):',opts:['Silent','Issue SEPARATE audit report expressing his own opinion','Override","Withdraw'],ans:1,exp:'SA 299 Responsibility of Joint Auditors: Where joint auditors disagree, each has right to issue their own separate audit report. Cannot be forced to agree. Report ends with separate signatures and potentially different opinions.'},
{id:'ar59',t:'rep',d:3,type:'scenario',q:'A listed company had extensive restatement of prior years\' FS (due to fraud). Current auditor\'s report on current year:',opts:['Unmodified','Consider KAM on restatement + EoM on prior-year implications + possibly modified opinion if unresolved','Automatic adverse','Silent'],ans:1,exp:'Serious restatement = highly significant. Auditor should: (a) KAM on the matter per SA 701 (listed co), (b) EoM / Other Matter on prior-year restatement context, (c) Report under Sec 143(12) if fraud ≥ ₹1 cr, (d) Modify opinion if current FS still affected or disclosures inadequate.'},
{id:'ar60',t:'rep',d:3,type:'tf',q:'Auditor\'s report must quantify the effect of misstatement in Basis for Qualified Opinion.',ans:true,exp:'True. SA 705: Basis for Modified Opinion paragraph should (a) describe the misstatement, (b) quantify its impact if practicable, (c) if cannot quantify, state why, (d) reference to affected items in FS. Users need to understand magnitude.'},
{id:'ar61',t:'rep',d:3,type:'mcq',q:'When auditor expresses disclaimer due to multiple uncertainties, the opinion paragraph states:',opts:['Do not express opinion','Possible effects so pervasive that unable to express opinion on FS','Auditor failed','No audit'],ans:1,exp:'SA 705: Disclaimer wording = "…we were unable to obtain sufficient appropriate audit evidence…[possible effects could be both material and pervasive]…we do not express an opinion on the accompanying financial statements." Formal language, not informal "failure."'},
{id:'ar62',t:'rep',d:3,type:'fill',q:'Under CARO 2020, auditor must report whether FS disclose adequate reasonable assurance on _____ as per Rule 11(a).',ans:['pending litigation','litigation','litigations','pending litigations'],exp:'Rule 11(a) Companies (Audit and Auditors) Rules: Company has disclosed impact of pending litigations on financial position in FS. Auditor reports compliance or non-compliance.'},
{id:'ar63',t:'rep',d:3,type:'scenario',q:'Epsilon Ltd has major going concern issue + management refuses to disclose + planned to liquidate next year. Opinion:',opts:['Unmodified + EoM','Qualified','Adverse (FS materially + pervasively misstated due to inappropriate GC basis + non-disclosure)','Disclaimer'],ans:2,exp:'If use of going concern basis is INAPPROPRIATE (imminent liquidation) AND management insists on it or fails to disclose — FS materially + pervasively misstated. ADVERSE OPINION per SA 570 + SA 705. Users must know GC assumption invalid.'},
{id:'ar64',t:'rep',d:3,type:'tf',q:'Auditor can withdraw an audit report after issue if facts warrant it.',ans:true,exp:'True. SA 560: If facts discovered post-issuance would have caused modification AND report is still relied on, auditor (a) discusses with management, (b) may inform those receiving FS, (c) request amendment of FS + reissue report, (d) if management refuses — auditor may resign and notify regulator.'},
{id:'ar65',t:'rep',d:3,type:'mcq',q:'In "Auditor\'s Responsibilities" section, auditor states that audit gives:',opts:['Absolute assurance','Reasonable assurance — not absolute','100% guarantee','Complete certainty'],ans:1,exp:'SA 200: Audit provides REASONABLE (high level, but not absolute) assurance. FS free from material misstatement (whether fraud or error) is the purpose. Reasonable assurance due to inherent limitations of audit.'},
{id:'ar66',t:'rep',d:3,type:'fill',q:'Under Sec 143(3)(i), for LISTED cos and specified cos, auditor must also report on _____ over financial reporting.',ans:['internal financial controls','ifc','internal controls','ifc-fr','ifcfr'],exp:'Sec 143(3)(i): IFC over Financial Reporting report for listed cos + specified cos per Rule 10A. Assess design and operating effectiveness. Separate attachment to main audit report. Opinion on IFC (unqualified / qualified).'},
{id:'ar67',t:'rep',d:3,type:'mcq',q:'The IFC report states opinion on:',opts:['Operating efficiency','Adequacy + operating effectiveness of IFC over FR per Criteria','Profitability','Compliance'],ans:1,exp:'IFC-FR report (Companies Act): Adequacy and OPERATING EFFECTIVENESS of IFC over financial reporting — as of BS date. Criteria = ICAI Guidance Note (or COSO framework for Ind AS). Opinion separate from main audit opinion.'},
{id:'ar68',t:'rep',d:3,type:'tf',q:'A material weakness in IFC means a Material Weakness opinion in auditor\'s report.',ans:true,exp:'True. ICAI Guidance Note on IFC-FR: Material Weakness = reasonable possibility that material misstatement of annual FS will not be prevented/detected on timely basis. Auditor modifies IFC opinion — describes weakness + impact. Separate from main FS opinion.'},
{id:'ar69',t:'rep',d:3,type:'scenario',q:'Auditor identifies material weakness in revenue recognition controls but FS itself is not materially misstated. Reporting:',opts:['Unmodified FS opinion + Modified IFC opinion (with description of material weakness)','Adverse both','Only note in CARO','Disclaimer'],ans:0,exp:'Two separate opinions in Indian context (listed cos): (i) FS opinion per SA 700 — unmodified (no material FS misstatement observed), (ii) IFC-FR opinion — modified for material weakness (describes deficiency). Auditor may use compensating substantive procedures to cover for weak controls.'},
{id:'ar70',t:'rep',d:3,type:'fill',q:'Sec 143(12) requires auditor to report _____ to Central Government if ≥ ₹1 crore.',ans:['fraud','frauds','fraud by officers','fraud or mis-statement'],exp:'Sec 143(12): Fraud committed by officers/employees ≥ ₹1 cr → report to CG via ADT-4 within 60 days. Separate from main audit report; flagged in Auditor\'s Report under Sec 143(3)(ca).'},
{id:'ar71',t:'rep',d:3,type:'mcq',q:'Audit report of a multinational company with multiple components relies on work of:',opts:['Only principal auditor','Component auditors (SA 600) + coordination + review','Management self-audit','Tax auditor'],ans:1,exp:'SA 600 Using the Work of Another Auditor: Principal auditor uses reports of component auditors. Procedures: (i) assess competence, (ii) coordinate scope + timing, (iii) review other auditor\'s work, (iv) visit if needed, (v) consider findings for principal opinion. Common in group audits.'},
{id:'ar72',t:'rep',d:3,type:'tf',q:'An auditor can be held liable for issuing negligent unmodified opinion when fraud existed.',ans:true,exp:'True. If auditor failed to exercise reasonable care + skill (per SAs), and fraud was detectable with normal procedures — he may be liable for: (i) professional misconduct under CA Act, (ii) damages to third parties who relied on report (Hedley Byrne), (iii) Sec 447 Companies Act if complicity shown, (iv) NFRA penalties.'},
{id:'ar73',t:'rep',d:3,type:'scenario',q:'During audit, matters communicated to TCWG (SA 260) included significant audit findings + disagreement with management on provision ₹50L. Management later agrees. Impact on report:',opts:['Still qualified','UNMODIFIED opinion (issue resolved by correction)','Disclaimer','Adverse'],ans:1,exp:'If management ULTIMATELY CORRECTS misstatement before FS finalised — no need to modify. UNMODIFIED OPINION. Auditor\'s communication with TCWG + subsequent management response documented in working papers. Corrective action is the desired outcome.'},
{id:'ar74',t:'rep',d:3,type:'mcq',q:'If a subsidiary\'s audit report is modified (qualified), impact on consolidated FS audit report:',opts:['Independent of subsidiary','Evaluate whether qualified matter is material to consolidated FS; if material, modify consolidated opinion','Automatic unmodified','Resign'],ans:1,exp:'SA 600 + SA 705: Consolidated FS auditor evaluates aggregate impact of component-level qualifications. If component issue is material at consolidated level → modify consolidated opinion on that ground. If immaterial → unmodified consolidated opinion (mention in KAM / Other Matter). CARO Clause 3(xxi) also applies.'},
{id:'ar75',t:'rep',d:3,type:'fill',q:'Under SA 700 (revised), the opinion paragraph comes _____ in the audit report.',ans:['first','before basis','at the top','before basis for opinion'],exp:'SA 700 Revised (2016 international, adopted India): OPINION FIRST in the audit report — prominent position so users see auditor\'s conclusion first. Basis for Opinion immediately after. Reversed from earlier structure.'},
  ]
}
};

/* ═══ STATE ═══ */
let currentSubj='', currentTopic=null, selectedTopic=null;
let sessionQs=[], qIdx=0, correct=0, wrong=0;
let difficulty=1, streak=0, topicStats={};
let timerInt=null, timerSec=0;
const HIST_KEY='tybcom_v3_hist';

function getHist(){ try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]')}catch(e){return[]} }
function saveHist(h){ try{localStorage.setItem(HIST_KEY,JSON.stringify(h))}catch(e){} }

// Best recent score per topic, derived from history
function getTopicStats(){
  const hist=getHist(); const stats={};
  for(const h of hist){
    const k=h.subj+'_'+h.topic;
    if(!stats[k]) stats[k]={attempts:0,best:0,last:null};
    stats[k].attempts++;
    if(h.pct>stats[k].best) stats[k].best=h.pct;
    if(!stats[k].last) stats[k].last=h.pct; // hist is desc, first is most recent
  }
  return stats;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('on');
    s.style.display='none';
  });
  var el=document.getElementById(id);
  el.classList.add('on');
  el.style.display='block';
  try{window.scrollTo(0,0);}catch(e){}
}

function openSubject(subj){
  currentSubj=subj;
  const data=QB[subj];
  document.getElementById('ts-title').textContent=subj==='tax'?'Taxation':'Audit';
  const stats=getTopicStats();
  const grid=document.getElementById('topic-grid');
  grid.innerHTML='';
  data.topics.forEach((tp)=>{
    const s=stats[subj+'_'+tp.id];
    let statusClass='st-notstarted', statusTxt='Not started';
    if(s){
      if(s.best>=75){statusClass='st-done';statusTxt='Best '+s.best+'%';}
      else{statusClass='st-inprogress';statusTxt='Best '+s.best+'%';}
    }
    const div=document.createElement('button');
    div.className='topic-row-card';
    div.innerHTML=`<div class="topic-icon" style="background:${tp.color};color:var(--text);font-size:12px">${tp.icon}</div>
      <div class="topic-info"><h4>${tp.label}</h4><p>${countQs(subj,tp.id)} questions · MCQ, T/F, Fill, Scenario</p></div>
      <span class="topic-status ${statusClass}">${statusTxt}</span>`;
    div.onclick=()=>selectTopic(tp.id,subj);
    grid.appendChild(div);
  });
  document.getElementById('btn-start-topic').style.display='none';
  showScreen('s-topics');
}

function countQs(subj,tid){ return QB[subj].qs.filter(q=>q.t===tid).length }

function selectTopic(tid,subj){
  const topicObj=QB[subj].topics.find(t=>t.id===tid);
  if(!topicObj)return;
  selectedTopic=tid;
  document.querySelectorAll('.topic-row-card').forEach(c=>c.style.borderColor='');
  document.querySelectorAll('.topic-row-card').forEach((c,i)=>{
    if(QB[subj].topics[i]&&QB[subj].topics[i].id===tid) c.style.borderColor='var(--acc)';
  });
  document.getElementById('btn-start-topic').style.display='block';
}

function startTopicExam(){
  if(!selectedTopic)return;
  currentTopic=selectedTopic;
  const data=QB[currentSubj];
  const pool=data.qs.filter(q=>q.t===currentTopic);
  shuffle(pool);
  sessionQs=pool;
  qIdx=0;correct=0;wrong=0;difficulty=1;streak=0;
  topicStats={correct:0,total:0};
  timerSec=0;clearInterval(timerInt);
  timerInt=setInterval(()=>{timerSec++;document.getElementById('timer').textContent=fmt(timerSec)},1000);
  const tp=data.topics.find(t=>t.id===currentTopic);
  document.getElementById('ex-title').textContent=tp?tp.label:currentTopic;
  document.getElementById('st-c').textContent='0';
  document.getElementById('st-w').textContent='0';
  document.getElementById('st-d').textContent='1';
  showScreen('s-exam');
  renderQ();
}

function renderQ(){
  if(qIdx>=sessionQs.length){endTopic();return;}
  const total=Math.min(sessionQs.length,12);
  const pct=Math.round(qIdx/total*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${qIdx} / ${total}`;
  document.getElementById('ex-sub').textContent=`Question ${qIdx+1}`;
  document.getElementById('st-d').textContent=difficulty===1?'Easy':difficulty===2?'Med':'Hard';
  document.getElementById('expl').className='expl';
  document.getElementById('btn-next').className='btn-next';

  const q=sessionQs[qIdx];
  const meta=document.getElementById('qmeta');
  const diffLabel=q.d===1?'Easy':q.d===2?'Medium':'Hard';
  const diffClass=q.d===1?'bd-easy':q.d===2?'bd-med':'bd-hard';
  const typeLabel={'mcq':'MCQ','tf':'True / False','fill':'Fill in blank','scenario':'Scenario'}[q.type]||q.type;
  meta.innerHTML=`<span class="badge ${diffClass}">${diffLabel}</span><span class="badge bd-type">${typeLabel}</span>`;

  const body=document.getElementById('qbody');
  body.innerHTML='';
  const qp=document.createElement('div');
  qp.className='qtext';qp.style.marginBottom='0';
  qp.textContent=q.type==='fill'?q.q.replace('_____',''):q.q;
  body.appendChild(qp);

  if(q.type==='mcq'||q.type==='scenario'){
    const od=document.createElement('div');od.className='opts';
    const letters=['A','B','C','D'];
    q.opts.forEach((o,i)=>{
      const b=document.createElement('button');b.className='opt';
      b.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${o}</span>`;
      b.onclick=()=>answerMCQ(i,q.ans,q);
      od.appendChild(b);
    });
    body.appendChild(od);
  } else if(q.type==='tf'){
    const row=document.createElement('div');row.className='tf-row';
    ['True','False'].forEach((lbl,i)=>{
      const b=document.createElement('button');b.className='tf-btn';b.textContent=lbl;
      b.onclick=()=>answerTF(i===0,q.ans,q);
      row.appendChild(b);
    });
    body.appendChild(row);
  } else if(q.type==='fill'){
    const inp=document.createElement('input');
    inp.className='blank-input';inp.type='text';inp.placeholder='Type your answer…';
    inp.setAttribute('autocorrect','off');
    inp.setAttribute('autocapitalize','none');
    inp.setAttribute('spellcheck','false');
    inp.setAttribute('autocomplete','off');
    inp.style.width='100%';inp.style.marginTop='14px';inp.style.fontSize='16px';inp.style.padding='10px';inp.style.borderRadius='6px';
    inp.onkeydown=function(e){if(e.key==='Enter')checkFill(q,inp.value);};
    body.appendChild(inp);
    const sb=document.createElement('button');sb.className='fill-submit';sb.textContent='Submit';
    sb.onclick=function(){checkFill(q,inp.value);};
    body.appendChild(sb);
  }
}

function answerMCQ(chosen,correct_ans,q){
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  btns[correct_ans].classList.add('correct');
  if(chosen!==correct_ans) btns[chosen].classList.add('wrong');
  recordAnswer(chosen===correct_ans,q);
}

function answerTF(chosen,correct_ans,q){
  const btns=document.querySelectorAll('.tf-btn');
  btns.forEach(b=>b.disabled=true);
  const correctIdx=correct_ans?0:1;
  btns[correctIdx].classList.add('correct');
  if(chosen!==correct_ans) btns[chosen?0:1].classList.add('wrong');
  recordAnswer(chosen===correct_ans,q);
}

function checkFill(q,val){
  const input=document.querySelector('.blank-input');
  const submit=document.querySelector('.fill-submit');
  if(input)input.disabled=true;
  if(submit)submit.disabled=true;
  const norm=val.trim().toLowerCase().replace(/[₹\s,]/g,'');
  const isCorrect=q.ans.some(a=>norm===a.toLowerCase().replace(/[₹\s,]/g,''));
  if(input){
    input.style.borderBottomColor=isCorrect?'var(--acc2)':'var(--err)';
    input.style.color=isCorrect?'var(--acc2)':'var(--err)';
  }
  recordAnswer(isCorrect,q);
}

function recordAnswer(isCorrect,q){
  topicStats.total++;
  if(isCorrect){correct++;topicStats.correct++;streak++;if(streak>=2&&difficulty<3)difficulty=Math.min(3,difficulty+1);}
  else{wrong++;streak=0;if(difficulty>1)difficulty=Math.max(1,difficulty-1);}
  document.getElementById('st-c').textContent=correct;
  document.getElementById('st-w').textContent=wrong;
  document.getElementById('st-d').textContent=difficulty===1?'Easy':difficulty===2?'Med':'Hard';
  const expl=document.getElementById('expl');
  expl.innerHTML=`<strong>${isCorrect?'Correct!':'Incorrect.'}</strong> ${q.exp}`;
  expl.className='expl on';
  document.getElementById('btn-next').className='btn-next on';
}

function nextQ(){
  qIdx++;
  if(qIdx>=sessionQs.length){endTopic();return;}
  renderQ();
}

function endTopic(){
  clearInterval(timerInt);
  const total=topicStats.total;
  const corr=topicStats.correct;
  const pct=total>0?Math.round(corr/total*100):0;
  const ring=document.getElementById('score-ring');
  ring.style.borderColor=pct>=75?'var(--acc2)':pct>=50?'var(--warn)':'var(--err)';
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-frac').textContent=`${corr}/${total}`;
  let msg,sub;
  if(pct>=85){msg='Excellent!';sub='Strong command of this topic.';}
  else if(pct>=70){msg='Good work';sub='Almost there. Review weak areas and retry.';}
  else if(pct>=50){msg='Needs practice';sub='Go through the explanations carefully.';}
  else{msg='Keep revising';sub='Review your notes and try again.';}
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('r-sub').textContent=sub;
  // Save this attempt FIRST so the bars can reflect it
  const hist=getHist();
  hist.unshift({subj:currentSubj,topic:currentTopic,pct,total,corr,date:new Date().toLocaleDateString('en-IN'),time:fmt(timerSec)});
  if(hist.length>50)hist.length=50;
  saveHist(hist);
  // Breakdown bars: best score per topic in this subject
  const bars=document.getElementById('r-bars');
  bars.innerHTML='';
  const stats=getTopicStats();
  QB[currentSubj].topics.forEach(tp=>{
    const s=stats[currentSubj+'_'+tp.id];
    const p=s?s.best:null;
    const col=p===null?'var(--bord)':p>=75?'var(--acc2)':p>=50?'var(--warn)':'var(--err)';
    const row=document.createElement('div');row.className='trow';
    row.innerHTML=`<span class="tname">${tp.label}</span><div class="tbar"><div class="tfill" style="width:${p||0}%;background:${col}"></div></div><span class="tpct">${p!==null?p+'%':'—'}</span>`;
    bars.appendChild(row);
  });
  showScreen('s-results');
}

function retryTopic(){
  selectedTopic=currentTopic;
  startTopicExam();
}

function mobileConfirm(msg,onYes){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px';
  var box=document.createElement('div');
  box.style.cssText='background:#1f2235;border:1px solid #252840;border-radius:14px;padding:24px;max-width:300px;width:100%;text-align:center';
  var p=document.createElement('p');
  p.style.cssText='font-size:15px;line-height:1.6;color:#eaedf5;margin-bottom:20px';
  p.textContent=msg;
  var row=document.createElement('div');
  row.style.cssText='display:flex;gap:10px';
  var btnNo=document.createElement('button');
  btnNo.textContent='Cancel';
  btnNo.style.cssText='flex:1;padding:12px;background:transparent;border:1px solid #252840;border-radius:9px;color:#6b7194;font-size:14px;font-family:inherit;touch-action:manipulation;cursor:pointer';
  btnNo.onclick=function(){document.body.removeChild(ov);};
  var btnYes=document.createElement('button');
  btnYes.textContent='OK';
  btnYes.style.cssText='flex:1;padding:12px;background:#ff6b6b;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:600;font-family:inherit;touch-action:manipulation;cursor:pointer';
  btnYes.onclick=function(){document.body.removeChild(ov);onYes();};
  row.appendChild(btnNo);row.appendChild(btnYes);
  box.appendChild(p);box.appendChild(row);
  ov.appendChild(box);
  document.body.appendChild(ov);
}
function confirmExit(){
  mobileConfirm('Exit this session?',function(){clearInterval(timerInt);openSubject(currentSubj);});
}

function showHistScreen(){
  const hist=getHist();
  const list=document.getElementById('hist-list');
  if(!hist.length){list.innerHTML='<div class="empty">No attempts yet</div>';showScreen('s-hist');return;}
  list.innerHTML=hist.map(h=>{
    const col=h.pct>=75?'var(--acc2)':h.pct>=50?'var(--warn)':'var(--err)';
    const subj=h.subj==='tax'?'Taxation':'Audit';
    const tp=QB[h.subj]&&QB[h.subj].topics.find(t=>t.id===h.topic);
    return `<div class="hist-item"><div><div class="hname">${subj} · ${tp?tp.label:h.topic||''}</div><div class="hdate">${h.date} · ${h.time||''}</div></div><div class="hscore" style="color:${col}">${h.pct}%</div></div>`;
  }).join('');
  showScreen('s-hist');
}

function clearHist(){
  mobileConfirm('Clear all attempt history?',function(){
    try{localStorage.removeItem(HIST_KEY);}catch(e){}
    showHistScreen();updateHomeScores();
  });
}

function updateHomeScores(){
  const hist=getHist();
  const el=document.getElementById('home-scores');
  if(!hist.length){el.innerHTML='<p class="empty" style="padding:10px 0">No attempts yet</p>';return;}
  el.innerHTML=hist.slice(0,5).map(h=>{
    const col=h.pct>=75?'var(--acc2)':h.pct>=50?'var(--warn)':'var(--err)';
    const subj=h.subj==='tax'?'Taxation':'Audit';
    const tp=QB[h.subj]&&QB[h.subj].topics.find(t=>t.id===h.topic);
    return `<div class="srow"><span>${subj}: ${tp?tp.label:''} · ${h.date}</span><span class="sval" style="color:${col}">${h.pct}%</span></div>`;
  }).join('');
}

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function _init(){
  // Force inline display so no browser/WebView CSS sandboxing can override
  document.querySelectorAll('.screen').forEach(function(s){s.style.display='none';});
  var home=document.getElementById('s-home');
  home.style.display='block';
  home.classList.add('on');
  updateHomeScores();
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',_init);}
else{_init();}
</script>
