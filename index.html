{id:'g75',t:'gst',d:3,type:'mcq',q:'Mr P supplies goods on 20 May; issues invoice on 25 May; receives payment on 10 June. Time of supply of goods is:',opts:['20 May','25 May','10 June','Any of the three'],ans:1,exp:'Section 12(2) CGST Act: Time of supply = EARLIER of (a) date of invoice (25 May) or last date by which invoice should be issued (removal date 20 May + Section 31: invoice before or at removal → actually 20 May would also trigger). Since invoice issued 25 May but removal was 20 May, last date of invoice was 20 May. Earliest = 20 May? Hmm most exam answers take "date of invoice" → 25 May if invoice was validly issued. Strictly: TOS = earlier of (invoice issued OR last permissible date for invoice). Answer most commonly accepted = 25 May assuming the invoice was issued validly within the 30-day/removal rule.'},
/* ════════════════ TDS / TCS (75 Qs) ════════════════ */
/* ── EASY (25) ── */
{id:'td1',t:'tds',d:1,type:'mcq',q:'TDS on salary is deducted under which section?',opts:['Section 192','Section 194','Section 194A','Section 195'],ans:0,exp:'Section 192 covers TDS on salary. Tax is deducted at the average rate based on estimated annual income of the employee.'},
{id:'td2',t:'tds',d:1,type:'fill',q:'TDS certificate issued to employees for salary is Form _____.',ans:['16','form 16','form-16'],exp:'Form 16 = TDS certificate for salary (u/s 192). Has Part A (tax deducted + deposited) and Part B (income + tax computation). Issued by 15 June of next FY.'},
{id:'td3',t:'tds',d:1,type:'tf',q:'TDS must be deducted on every payment, regardless of amount.',ans:false,exp:'False. TDS is deducted only when a payment exceeds the prescribed THRESHOLD for each section.'},
{id:'td4',t:'tds',d:1,type:'mcq',q:'TDS on bank interest (other than savings) for residents is under:',opts:['Section 192','Section 194','Section 194A','Section 194B'],ans:2,exp:'Section 194A: TDS @10% on bank FD/RD interest exceeding ₹40,000 (₹50,000 for senior citizens) per year. Section 194B is lottery winnings.'},
{id:'td5',t:'tds',d:1,type:'fill',q:'TDS certificate for non-salary payments is Form _____.',ans:['16a','form 16a','16-a'],exp:'Form 16A = TDS certificate for non-salary payments (interest, rent, professional fees, etc.) issued quarterly, within 15 days of filing TDS return.'},
{id:'td6',t:'tds',d:1,type:'mcq',q:'TCS stands for:',opts:['Tax Counted at Source','Tax Collected at Source','Tax Compensated at Source','Tax Credited at Source'],ans:1,exp:'TCS = Tax Collected at Source (u/s 206C). The SELLER collects tax from the buyer on specified goods (scrap, tendu leaves, minerals, car > ₹10L, overseas remittances, etc.) at time of sale.'},
{id:'td7',t:'tds',d:1,type:'tf',q:'TAN is mandatory for anyone required to deduct or collect TDS/TCS.',ans:true,exp:'True. TAN (Tax Deduction and Collection Account Number) u/s 203A is mandatory 10-digit alphanumeric. Must be quoted on all TDS returns, challans, and certificates. Penalty ₹10,000 for not obtaining TAN.'},
{id:'td8',t:'tds',d:1,type:'mcq',q:'TDS on rent paid by individuals/HUF (not subject to audit) is under:',opts:['Section 194I','Section 194IB','Section 194J','Section 194H'],ans:1,exp:'Section 194IB: Individuals/HUFs (not covered by tax audit) paying rent > ₹50,000 per month must deduct TDS @5% ONCE a year (in March or at tenancy end). No TAN needed — deducted using PAN. Section 194I is for businesses.'},
{id:'td9',t:'tds',d:1,type:'fill',q:'TDS must be deposited by the _____ of the following month (for non-March deductions).',ans:['7th','7','seventh','7 of following','7 of next'],exp:'Rule 30: TDS deducted in a month must be deposited by the 7th of the following month. For March deductions, deadline is 30th April.'},
{id:'td10',t:'tds',d:1,type:'mcq',q:'TDS on payment to non-residents is governed by:',opts:['Section 192','Section 194','Section 195','Section 196'],ans:2,exp:'Section 195: TDS on payments to non-residents (other than salary, covered by 192). Rates vary — determined by nature of income and DTAA. Lower rate certificate can be obtained u/s 197.'},
{id:'td11',t:'tds',d:1,type:'tf',q:'Form 15G is submitted by senior citizens to avoid TDS on interest.',ans:false,exp:'False. Form 15G is for individuals BELOW 60. Senior citizens (60+) use FORM 15H. Both are declarations that total income is below taxable limit, enabling nil TDS at source.'},
{id:'td12',t:'tds',d:1,type:'mcq',q:'TDS on commission or brokerage is under:',opts:['Section 194H','Section 194I','Section 194J','Section 194C'],ans:0,exp:'Section 194H: TDS @5% on commission/brokerage exceeding ₹15,000 per year. Does not apply to insurance commission (covered separately u/s 194D).'},
{id:'td13',t:'tds',d:1,type:'fill',q:'TDS on professional fees is under Section _____.',ans:['194j','194 j','section 194j'],exp:'Section 194J: TDS on fees for professional services (10%), technical services (2% post 2020), royalty, non-compete fees. Threshold ₹30,000 per year per category.'},
{id:'td14',t:'tds',d:1,type:'mcq',q:'Form 26AS is:',opts:['Income tax return','Annual tax credit statement (TDS/TCS/advance tax)','PAN application','Wealth tax return'],ans:1,exp:'Form 26AS = Annual consolidated tax credit statement available on e-filing portal. Shows all TDS deducted, TCS collected, advance tax paid, SFT transactions, refunds, demands, etc. AIS (Annual Information Statement) is broader, launched in 2021.'},
{id:'td15',t:'tds',d:1,type:'tf',q:'A deductor who fails to obtain TAN can be penalised ₹10,000.',ans:true,exp:'True. Section 272BB: Penalty ₹10,000 for (a) failure to apply for TAN, (b) failure to quote TAN on TDS documents, or (c) quoting wrong TAN. Imposed by AO.'},
{id:'td16',t:'tds',d:1,type:'mcq',q:'TDS rate on winnings from lottery (Section 194B) is:',opts:['10%','20%','30%','40%'],ans:2,exp:'Section 194B: Flat 30% TDS on winnings from lotteries, crossword puzzles, card games, etc. exceeding ₹10,000. No slab benefit. Final tax — cannot reduce via deductions.'},
{id:'td17',t:'tds',d:1,type:'fill',q:'TDS on interest on securities (debentures etc.) is under Section _____.',ans:['193','section 193'],exp:'Section 193: TDS @10% on interest on securities (debentures, bonds) issued by companies. Threshold ₹5,000 (₹10,000 for debentures of public companies paid to residents).'},
{id:'td18',t:'tds',d:1,type:'mcq',q:'TDS rate on contractor payments to individual/HUF u/s 194C is:',opts:['1%','2%','5%','10%'],ans:0,exp:'Section 194C: 1% for payment to individual/HUF contractor; 2% for others (firm/company). Threshold ₹30,000 per single bill or ₹1,00,000 aggregate per year.'},
{id:'td19',t:'tds',d:1,type:'tf',q:'TDS return for salary payments is filed in Form 24Q.',ans:true,exp:'True. Form 24Q = Quarterly TDS return for SALARY (Section 192). Due dates: 31 Jul, 31 Oct, 31 Jan, 31 May (for Q1-Q4). Form 26Q for non-salary; Form 27Q for non-residents; Form 27EQ for TCS.'},
{id:'td20',t:'tds',d:1,type:'mcq',q:'TDS on rent > ₹2,40,000/year paid by a business is under:',opts:['Section 194I','Section 194IB','Section 194IA','Section 194J'],ans:0,exp:'Section 194I: TDS on rent paid by businesses. Rate: 10% for land/building; 2% for plant & machinery. Threshold ₹2,40,000 per year.'},
{id:'td21',t:'tds',d:1,type:'fill',q:'TDS @1% is deducted on sale of immovable property > ₹50 lakh under Section _____.',ans:['194ia','194-ia','section 194ia'],exp:'Section 194IA: Buyer must deduct TDS @1% on purchase of immovable property (excl. agricultural land) if consideration ≥ ₹50 lakh. No TAN required; deducted using PAN of buyer and seller. Filed in Form 26QB.'},
{id:'td22',t:'tds',d:1,type:'mcq',q:'Tax deducted at source must be deposited by:',opts:['Deductee','Deductor','Both equally','Income tax officer'],ans:1,exp:'The DEDUCTOR (payer of income) is responsible for deducting and depositing TDS with the government. Deductee (recipient of income) gets credit for tax deducted via Form 26AS.'},
{id:'td23',t:'tds',d:1,type:'tf',q:'TCS is collected at the time of making payment to buyer.',ans:false,exp:'False. TCS is collected by the SELLER from the BUYER at the time of RECEIPT of payment or DEBIT to buyer\'s account, whichever is earlier (u/s 206C).'},
{id:'td24',t:'tds',d:1,type:'mcq',q:'TDS return for non-salary deductions is in Form:',opts:['Form 24Q','Form 26Q','Form 27Q','Form 16'],ans:1,exp:'Form 26Q = quarterly TDS return for non-salary payments (interest, rent, contractor, professional fees, etc.) to RESIDENTS. Form 27Q is for payments to non-residents; Form 24Q for salary.'},
{id:'td25',t:'tds',d:1,type:'fill',q:'TDS on EPF withdrawal (if PAN furnished) is at rate _____ % (write number).',ans:['10','10%','ten'],exp:'Section 192A: TDS @10% on premature EPF withdrawal if accumulated balance > ₹50,000 and service < 5 years (and PAN is submitted). If no PAN → maximum marginal rate (earlier "20%", later clarified).'},

/* ── MEDIUM (25) ── */
{id:'td26',t:'tds',d:2,type:'mcq',q:'The TDS rate on professional fees under Section 194J is:',opts:['2%','5%','10%','15%'],ans:2,exp:'Section 194J: 10% for professional fees, royalty, non-compete fees, director\'s sitting fees. 2% for technical services (reduced w.e.f. 1.4.2020 to ease burden). Threshold ₹30,000 per year per category.'},
{id:'td27',t:'tds',d:2,type:'fill',q:'TDS must be deposited by the _____ of April for deductions made in March.',ans:['30','30th','thirtieth','30 april'],exp:'Rule 30: For March deductions, the deposit deadline is 30th April (not 7th April). This is the only month with different deadline.'},
{id:'td28',t:'tds',d:2,type:'scenario',q:'Priya receives ₹80,000 as professional fees in a year. TDS amount and section:',opts:['No TDS (below limit)','₹8,000 under Section 194J at 10%','₹4,000 under Section 194J at 5%','₹16,000 at 20%'],ans:1,exp:'₹80,000 > threshold ₹30,000. Section 194J @10% → TDS ₹8,000.'},
{id:'td29',t:'tds',d:2,type:'tf',q:'If PAN is not furnished by the deductee, TDS is deducted at a higher rate u/s 206AA.',ans:true,exp:'True. Section 206AA: Absence of PAN → TDS at HIGHER of (i) rate specified in Act, (ii) rate in force, (iii) 20%. For Section 194N (cash withdrawals) and 194O (e-com), specific rates apply.'},
{id:'td30',t:'tds',d:2,type:'mcq',q:'TDS rate on payment to a non-resident for royalty (FTS) under Section 195 is based on:',opts:['Flat 30%','Rate in Act or DTAA, whichever lower','Nil','Basic exemption slab'],ans:1,exp:'Section 195: TDS rate on payment to non-resident = rate in Act OR applicable DTAA, whichever is LOWER (subject to beneficial provisions). For royalty/FTS to non-resident — generally 10% u/s 115A if no PE in India. DTAA rates often 10-15%.'},
{id:'td31',t:'tds',d:2,type:'fill',q:'Form _____ is the quarterly TDS statement for non-salary deductions.',ans:['26q','form 26q','26-q'],exp:'Form 26Q = quarterly TDS return for all non-salary TDS on residents. Due 31 Jul, 31 Oct, 31 Jan, 31 May.'},
{id:'td32',t:'tds',d:2,type:'mcq',q:'TDS rate on rent paid for machinery u/s 194I is:',opts:['1%','2%','5%','10%'],ans:1,exp:'Section 194I: 2% on rent for plant, machinery, or equipment. 10% on rent for land, building, furniture, fittings. Threshold ₹2,40,000 per year (combined).'},
{id:'td33',t:'tds',d:2,type:'scenario',q:'ABC Ltd pays ₹1,50,000 as rent for machinery AND ₹2,00,000 as rent for office building to Mr X. Combined threshold ₹2,40,000. Does TDS apply?',opts:['No, each type is below ₹2,40,000','Yes, combined ₹3,50,000 exceeds threshold','Only on machinery rent','Only on office rent'],ans:1,exp:'Section 194I threshold applies to AGGREGATE rent (all categories combined) to same payee. Total ₹3.5 lakh > ₹2.4 lakh. TDS on each at its rate: ₹1.5L × 2% = ₹3,000; ₹2L × 10% = ₹20,000. Total TDS ₹23,000.'},
{id:'td34',t:'tds',d:2,type:'tf',q:'A person can apply in Form 13 u/s 197 for lower or nil TDS deduction.',ans:true,exp:'True. Section 197: A deductee can apply to AO in Form 13 for certificate of NIL or lower rate TDS, if justified by total income and tax liability. Valid for specified payer(s) or for any payer.'},
{id:'td35',t:'tds',d:2,type:'mcq',q:'TDS on cash withdrawal u/s 194N applies above:',opts:['₹1 lakh','₹20 lakh (1 crore if returns filed)','₹50 lakh','₹5 crore'],ans:1,exp:'Section 194N: TDS @2% on cash withdrawals > ₹1 crore in a year (from bank, co-op bank, PO). If the account holder has NOT filed ITR for last 3 years → TDS @2% above ₹20 lakh, and @5% above ₹1 crore. Widely used anti-black money measure.'},
{id:'td36',t:'tds',d:2,type:'fill',q:'For a salary of ₹12 lakh annual with no deductions, TDS u/s 192 is computed at _____ of tax liability.',ans:['average rate','average','avg rate','avg'],exp:'Section 192: TDS on salary = AVERAGE RATE of tax on estimated annual income / 12 (monthly). Average rate = (Total estimated tax / Total estimated income) × 100. Not at marginal rate.'},
{id:'td37',t:'tds',d:2,type:'mcq',q:'Where TDS is deducted on rent u/s 194I by an individual paying ₹5 lakh/month rent:',opts:['TDS not required for individuals','TDS u/s 194IB at 5%','TDS u/s 194I at 10% if tax audit applicable','TDS u/s 194IA'],ans:2,exp:'Section 194I applies if the payer individual is subject to tax audit u/s 44AB. If NOT under tax audit and rent > ₹50,000/month, Section 194IB applies at 5%. The facts suggest a business individual likely under audit → 194I @10%.'},
{id:'td38',t:'tds',d:2,type:'scenario',q:'Mr Satya buys a flat for ₹75 lakh. TDS obligations:',opts:['No TDS (personal purchase)','Deduct 1% TDS u/s 194IA, deposit in Form 26QB','Deduct 5% u/s 194IB','Seller pays TDS'],ans:1,exp:'Section 194IA: Buyer (even individual, no TAN needed) must deduct 1% TDS on immovable property > ₹50L at time of payment/credit. TDS = 1% × ₹75L = ₹75,000. Deposit in Form 26QB within 30 days of end of month of deduction. Form 16B to seller.'},
{id:'td39',t:'tds',d:2,type:'tf',q:'TDS u/s 192A on EPF premature withdrawal applies if service is less than 5 years AND amount exceeds ₹50,000.',ans:true,exp:'True. Section 192A: TDS @10% on EPF withdrawal if (a) service < 5 years AND (b) withdrawal ≥ ₹50,000. If PAN not submitted, maximum marginal rate. Exempt if member is terminated due to ill health, contractions, or withdrawal after 5 years.'},
{id:'td40',t:'tds',d:2,type:'fill',q:'TCS on sale of motor vehicle above ₹10 lakh is at the rate of _____ %.',ans:['1','1%','one'],exp:'Section 206C(1F): TCS @1% on sale of motor vehicle > ₹10 lakh per invoice. Collected by seller at time of receipt. Applies to all persons, regardless of business.'},
{id:'td41',t:'tds',d:2,type:'mcq',q:'TDS u/s 194O on e-commerce supplies is payable by:',opts:['Buyer','E-commerce operator on participant\'s turnover','Seller directly','No one'],ans:1,exp:'Section 194O: E-COMMERCE OPERATOR (e.g., Amazon, Flipkart) deducts TDS @1% on gross amount of sales/services facilitated for e-commerce PARTICIPANTS (sellers on platform). Threshold ₹5 lakh per year for individual/HUF participants. Applies irrespective of participant\'s residential status.'},
{id:'td42',t:'tds',d:2,type:'scenario',q:'A company pays ₹5 lakh dividend to a resident shareholder in FY 23-24. TDS liability:',opts:['No TDS on dividend','TDS @10% u/s 194 on amount > ₹5,000','TDS @15% u/s 115-O','Only surcharge'],ans:1,exp:'Post DDT abolition (FA 2020), dividend is taxable in shareholder\'s hands. Section 194: TDS @10% on dividend > ₹5,000 to a RESIDENT individual. Here TDS = 10% × ₹5 lakh = ₹50,000 (threshold not an issue).'},
{id:'td43',t:'tds',d:2,type:'tf',q:'Form 15CA/CB is filed for remittances to non-residents, with CA certificate u/s 195.',ans:true,exp:'True. Form 15CA = declaration by remitter to bank for foreign remittance. Form 15CB = Chartered Accountant\'s certificate certifying nature and taxability of remittance, TDS rate applied, and DTAA relief. Ensures non-residents\' income taxability is addressed.'},
{id:'td44',t:'tds',d:2,type:'fill',q:'Rate of TCS on sale of scrap u/s 206C(1) is _____ %.',ans:['1','1%','one'],exp:'Section 206C(1) TCS rates: Scrap — 1%; Tendu leaves — 5%; Timber under forest lease — 2.5%; Alcoholic liquor — 1%; Tendu — 5%; Minerals (coal, lignite, iron ore) — 1%.'},
{id:'td45',t:'tds',d:2,type:'mcq',q:'Where PAN of deductee is not available, TDS rate (per Section 206AA) is:',opts:['Actual rate','Rate in Act + 1%','HIGHER of Act rate / rate in force / 20%','50% flat'],ans:2,exp:'Section 206AA: Absence of PAN → HIGHER of (a) rate specified in Act, (b) rate in force, (c) 20%. Section 206AB adds: if deductee has NOT filed ITR in last year (specified conditions), higher rate also — max of double normal rate or 5%.'},
{id:'td46',t:'tds',d:2,type:'scenario',q:'Mr Dhruv purchases goods worth ₹60 lakh from ABC Ltd in FY. Buyer\'s turnover > ₹10 crore. Obligation u/s 194Q:',opts:['No TDS','TDS @0.1% on ₹10 lakh (₹60L – ₹50L threshold)','TDS @1% on ₹60L','TDS @5%'],ans:1,exp:'Section 194Q (w.e.f. 1.7.2021): Buyer with turnover > ₹10 crore preceding year deducts TDS @0.1% on purchase of goods from a seller EXCEEDING ₹50 lakh per year. TDS on ₹10 lakh (₹60L – ₹50L threshold) = ₹1,000. Note overlap with seller\'s Section 206C(1H) — 194Q takes precedence.'},
{id:'td47',t:'tds',d:2,type:'tf',q:'Interest u/s 201(1A) for late deposit of TDS is 1% per month from date of deduction till actual deposit.',ans:false,exp:'False (partially). Section 201(1A): Interest = 1% per month from date TDS was DEDUCTIBLE (due date) to date of actual deduction (for short deduction); AND 1.5% per month from date of DEDUCTION to date of DEPOSIT (for late deposit). Two-stage.'},
{id:'td48',t:'tds',d:2,type:'mcq',q:'Penalty u/s 271C for failure to deduct TDS equals:',opts:['₹10,000','100% of tax not deducted','50% flat','No penalty, only interest'],ans:1,exp:'Section 271C: Penalty equal to the AMOUNT of tax not deducted/short deducted. Imposed by Joint Commissioner. Appeal: CIT(A) / ITAT. "Reasonable cause" defence available u/s 273B.'},
{id:'td49',t:'tds',d:2,type:'fill',q:'Form _____ is issued by deductor to deductee for TDS on sale of immovable property u/s 194IA.',ans:['16b','form 16b','16-b'],exp:'Form 16B: TDS certificate for Section 194IA (sale of immovable property). Issued by buyer to seller. Available for download from TRACES portal after depositing tax via Form 26QB.'},
{id:'td50',t:'tds',d:2,type:'mcq',q:'TCS u/s 206C(1G) on overseas remittance under LRS above ₹7 lakh is at:',opts:['0.5%','5%','20% (for non-education/medical) or lower for specified purposes','30%'],ans:2,exp:'Section 206C(1G) TCS on LRS remittance > ₹7 lakh in a year: 5% for education (from Indian lender loan) / medical; 20% on other purposes (foreign tour package, general remittance). Applied by authorised dealer/bank. Effective from 1.10.2023 for 20% rate.'},

/* ── HARD (25) ── */
{id:'td51',t:'tds',d:3,type:'mcq',q:'TCS under Section 206C(1H) is collected by the SELLER on sale of goods > ₹50 lakh where seller\'s turnover > ₹10 crore. This applies:',opts:['Universally to all transactions','Only if 194Q is NOT invoked by the buyer','Jointly with 194Q','Only to imports'],ans:1,exp:'Section 206C(1H) (seller) and Section 194Q (buyer) were designed to avoid overlap. If BUYER is liable to deduct u/s 194Q → TDS u/s 194Q prevails, and seller does NOT collect TCS u/s 206C(1H). Seller collects only if buyer has no 194Q obligation (buyer turnover ≤ ₹10 crore).'},
{id:'td52',t:'tds',d:3,type:'fill',q:'If a deductor deducts TDS but fails to deposit, he is deemed "_____" u/s 201.',ans:['assessee in default','assessee-in-default','assessee','defaulter','assessee in-default'],exp:'Section 201: A person who fails to DEDUCT or fails to DEPOSIT TDS is deemed "assessee-in-default." Consequences: (i) tax recoverable, (ii) interest u/s 201(1A), (iii) penalty u/s 271C, (iv) possible prosecution u/s 276B with rigorous imprisonment 3 months to 7 years.'},
{id:'td53',t:'tds',d:3,type:'scenario',q:'Alpha Ltd paid ₹1 crore professional fees without deducting TDS u/s 194J. Consequences for computing Alpha\'s business income u/s 40(a)(ia):',opts:['No disallowance if fees paid','Disallowance of 30% of ₹1 crore = ₹30 lakh','Disallowance of 100% = ₹1 crore','Allowed if paid by year-end'],ans:1,exp:'Section 40(a)(ia): 30% DISALLOWANCE of expenditure (for residents) if TDS not deducted OR not deposited by due date of return. Amount disallowed = ₹1 crore × 30% = ₹30 lakh. Allowed back in the year of subsequent deduction + payment. Section 40(a)(i) for non-residents = 100% disallowance.'},
{id:'td54',t:'tds',d:3,type:'tf',q:'Under Section 194R, TDS @10% applies on benefit/perquisite given to business associates in course of business.',ans:true,exp:'True. Section 194R (w.e.f. 1.7.2022): TDS @10% on benefits/perquisites arising from business/profession to a resident. Applicable when aggregate value > ₹20,000 per year. Covers free samples, gifts, sponsored trips. Payer (giver) must deduct; if in kind, ensure recipient pays before releasing.'},
{id:'td55',t:'tds',d:3,type:'mcq',q:'TDS on cash withdrawal u/s 194N: A filer who has NOT filed ITR in any of the last 3 preceding years withdraws ₹50 lakh cash:',opts:['No TDS — threshold ₹1 crore','TDS @2% above ₹20 lakh (non-filer threshold)','TDS @5% above ₹50 lakh','Full rebate via Form 15G'],ans:1,exp:'Section 194N: For a regular ITR-filer, threshold ₹1 crore @2%. For a NON-FILER (no ITR in last 3 years), threshold drops to ₹20 lakh @2%, and @5% above ₹1 crore. Here: non-filer withdraws ₹50L → TDS @2% on (50-20) = ₹60,000.'},
{id:'td56',t:'tds',d:3,type:'fill',q:'Under Section _____, TDS/TCS provisions shall not apply to payments by/to Government, RBI, etc.',ans:['196','section 196'],exp:'Section 196: No TDS required on payments TO Government, RBI, certain statutory corporations, mutual funds. (Similar blanket immunity on the outflow side.)'},
{id:'td57',t:'tds',d:3,type:'scenario',q:'A company pays salary ₹50,000/month to its CEO plus director sitting fees ₹20,000 per board meeting. TDS section for sitting fees:',opts:['Section 192 (salary)','Section 194J (professional fees)','Section 194C','No TDS'],ans:1,exp:'Director\'s sitting fees are NOT salary (no employer-employee relationship for that specific service). Section 194J explicitly covers "director\'s remuneration other than salary" — TDS @10%. Salary portion remains under 192. Threshold ₹30,000 in 194J does NOT apply to director fees (no threshold for directors).'},
{id:'td58',t:'tds',d:3,type:'tf',q:'Section 194R (benefits/perquisites) does not apply to benefits provided to employees — those are covered by Section 192.',ans:true,exp:'True. Section 194R explicitly excludes employee benefits (Section 17 perquisites) — those are taxed under salary head via 192. 194R targets BUSINESS RELATIONSHIPS (doctors receiving pharmaceutical samples, influencers receiving freebies, dealers receiving foreign trips, etc.). CBDT Circular 12/2022 clarifies coverage.'},
{id:'td59',t:'tds',d:3,type:'mcq',q:'In Hindustan Coca-Cola Beverages P. Ltd. v. CIT (SC, 2007), court held that if deductee has paid tax directly, deductor:',opts:['Still liable for full tax','Not liable for the tax, only interest u/s 201(1A) till date of payment','Liable for penalty only','Fully exempt'],ans:1,exp:'Hindustan Coca-Cola (2007 SC): If the deductee has paid tax directly (Section 191), the deductor is not liable for the tax portion but IS liable for interest u/s 201(1A) till the date of actual payment by deductee. Principle is to avoid double collection. Proviso to Section 201(1) codifies this.'},
{id:'td60',t:'tds',d:3,type:'scenario',q:'ABC Ltd deducts TDS ₹5 lakh in June and deposits only in October. Interest u/s 201(1A):',opts:['1% × 5 months × 5L = ₹25,000','1.5% × 4 months (July-Oct) × 5L = ₹30,000','2% × 4 × 5L','None'],ans:1,exp:'Late deposit attracts 1.5% per month from date of deduction (June) to date of deposit (October). Months = 4 (if part month counted separately). 1.5% × 4 × ₹5L = ₹30,000. Any fraction of a month is treated as full month.'},
{id:'td61',t:'tds',d:3,type:'fill',q:'Prosecution u/s _____ for failure to deposit TDS can lead to rigorous imprisonment of 3 months to 7 years.',ans:['276b','section 276b'],exp:'Section 276B: Non-payment of TDS to government credit → prosecution with RI 3 months to 7 years + fine. Applies even to officers of company (vicarious liability u/s 278B). Compounding possible u/s 279(2).'},
{id:'td62',t:'tds',d:3,type:'mcq',q:'TDS u/s 194S on transfer of Virtual Digital Asset (crypto) is at:',opts:['1% on consideration paid (above threshold)','10%','20%','30%'],ans:0,exp:'Section 194S (w.e.f. 1.7.2022): 1% TDS on consideration for transfer of VDA (cryptocurrencies, NFTs). Threshold: ₹50,000 (specified persons — individual/HUF not under audit) or ₹10,000 (others) in a year. Paired with Section 115BBH — 30% tax on income from VDA transfer, no loss set-off, no deductions except cost of acquisition.'},
{id:'td63',t:'tds',d:3,type:'tf',q:'Non-resident receiving royalty from India can avail DTAA rate even if TAN not obtained by payer, per Section 206AA second proviso.',ans:true,exp:'True. Second proviso to Section 206AA (and CBDT circulars): Non-residents (without PAN) can still get DTAA benefit for TDS rate if they furnish (i) name, (ii) email, (iii) contact details, (iv) TIN or TRC. Without these the penal 20% kicks in. Introduced in Rule 37BC.'},
{id:'td64',t:'tds',d:3,type:'scenario',q:'GTI Ltd. pays ₹60 lakh to a foreign consultant (non-resident, has TRC, DTAA provides 10% on FTS). Consultant has no PAN but furnished name/email/TIN per Rule 37BC. TDS:',opts:['20% flat u/s 206AA','10% (DTAA rate)','30%','Nil'],ans:1,exp:'Rule 37BC read with 206AA proviso: If non-resident furnishes specified details (name, email, contact, TIN of resident country), DTAA rate applies DESPITE no PAN. TDS = 10% × ₹60L = ₹6 lakh. Otherwise 20% would apply.'},
{id:'td65',t:'tds',d:3,type:'mcq',q:'If a deductor issues TDS certificate late, penalty u/s 272A(2)(g) is:',opts:['₹100 per day till compliance, max TDS amount','₹10,000 flat','1% of tax per day','Nil'],ans:0,exp:'Section 272A(2)(g): ₹100 per day of default for late issue of TDS certificate, CAPPED AT the amount of TDS deductible. Similarly for late filing of TDS return u/s 234E = ₹200 per day, capped at TDS amount.'},
{id:'td66',t:'tds',d:3,type:'fill',q:'Late fee u/s 234E for delayed filing of TDS return is ₹ _____ per day.',ans:['200','two hundred'],exp:'Section 234E: ₹200 per day of delay, capped at the total TDS/TCS amount. Payable before filing the return. Cannot be waived — mandatory. Challenged but upheld by SC.'},
{id:'td67',t:'tds',d:3,type:'scenario',q:'TDS statement for Q2 FY 23-24 (Jul-Sep) was filed on 15 November (due date 31 Oct). TDS amount ₹2 lakh. Late fee:',opts:['₹2,800 (14 days × 200)','₹3,000 (15 days × 200)','₹2,000 capped','₹200 flat'],ans:0,exp:'Delay = 1 Nov to 15 Nov = 14 days (don\'t count due date itself; day of filing inclusive; conventions vary). Fee = 14 × ₹200 = ₹2,800. Cap of ₹2 lakh TDS not triggered. The exact day count may vary — the principle is ₹200/day up to TDS cap.'},
{id:'td68',t:'tds',d:3,type:'tf',q:'Section 197A allows a person to submit Form 15G/H for nil TDS even if income exceeds taxable limit.',ans:false,exp:'False. Form 15G/15H u/s 197A can be submitted ONLY if: (i) estimated total income is BELOW BASIC EXEMPTION LIMIT and (ii) tax payable on estimated total income is NIL. Furnishing wrongly attracts prosecution u/s 277.'},
{id:'td69',t:'tds',d:3,type:'mcq',q:'Under Section 194K, TDS on income from mutual fund units (dividend) is at:',opts:['5%','10% on > ₹5,000','15% flat','Nil'],ans:1,exp:'Section 194K (w.e.f. 1.4.2020, post DDT abolition): 10% TDS on INCOME (dividend) from mutual fund units exceeding ₹5,000 per year. Does NOT apply to capital gains on redemption of units.'},
{id:'td70',t:'tds',d:3,type:'fill',q:'Section _____ exempts certain specified persons (Government, RBI, banks holding specified investments) from TCS collection on sale of specified goods.',ans:['206c','206cc','section 206c'],exp:'Section 206C provisions exclude certain specified persons and purposes. Sub-sections like 206C(1A), 206C(1F proviso) etc. grant specific exclusions. Government entities, RBI, banks, and specified purchasers (e.g. manufacturing use declaration) escape TCS on scrap etc.'},
{id:'td71',t:'tds',d:3,type:'scenario',q:'Mr Arjun receives professional fees ₹25,000 from ABC Ltd, ₹20,000 from XYZ Ltd, ₹30,000 from PQR Ltd (all separate entities). TDS u/s 194J applicable from each:',opts:['No TDS from any (each <₹30,000)','TDS from all three (aggregate > ₹30,000)','TDS only from PQR (crosses threshold individually)','TDS from ABC alone'],ans:2,exp:'Section 194J threshold ₹30,000 applies PER DEDUCTOR (not aggregate across payers). Each payer checks their own aggregate to Arjun: ABC ₹25,000 < ₹30,000 (no TDS); XYZ ₹20,000 (no TDS); PQR ₹30,000 — at threshold, TDS on whole amount. Only PQR deducts.'},
{id:'td72',t:'tds',d:3,type:'tf',q:'Section 194-I applies to rent paid by a partnership firm even if not under audit.',ans:true,exp:'True. Section 194I applies to ALL persons paying rent > ₹2,40,000 (p.a.) EXCEPT individual/HUF not liable to tax audit. A partnership FIRM must deduct regardless of audit (firms are not exempted under 194IB carve-out).'},
{id:'td73',t:'tds',d:3,type:'mcq',q:'In GE India Technology Centre P. Ltd. v. CIT (SC, 2010), court held regarding Section 195:',opts:['TDS is always required on all remittances','TDS is required ONLY if the payment is chargeable to tax in India','Section 195 is unconstitutional','Only CBDT decides applicability'],ans:1,exp:'GE India Technology Centre (2010 SC): Section 195 TDS obligation arises ONLY if the sum paid to non-resident is CHARGEABLE TO TAX in India. Not on every foreign remittance. If no taxability in India, no TDS. Payer can self-determine or seek certificate u/s 195(2) or 197. Important for international transactions.'},
{id:'td74',t:'tds',d:3,type:'fill',q:'Section _____ allows tax authorities to reopen TDS issues within a specified period (time limit to hold a person in default).',ans:['201','section 201'],exp:'Section 201(3): An order holding a person as assessee-in-default for TDS failure on payments TO RESIDENTS cannot be passed after 7 YEARS from end of FY in which payment was made (changed from 2 to 7 years, back to 2 and then settled via amendments). For non-residents, no specific time bar.'},
{id:'td75',t:'tds',d:3,type:'mcq',q:'TDS u/s 194-IA on immovable property > ₹50 lakh: If stamp duty value is higher than consideration, TDS is computed on:',opts:['Consideration','Stamp duty value','Higher of the two (per FA 2022)','Lower of the two'],ans:2,exp:'Section 194IA amended (FA 2022): TDS @1% on HIGHER of (i) consideration, or (ii) stamp duty value. Earlier it was only on consideration — but buyers under-invoiced to reduce TDS. Now aligned with Section 50C principle to prevent evasion.'},
/* ════════════════ CORPORATE TAX & MAT (75 Qs) ════════════════ */
/* ── EASY (25) ── */
{id:'cm1',t:'corp',d:1,type:'mcq',q:'The standard corporate tax rate for domestic companies (AY 24-25, no concessional option) is:',opts:['22%','25%','30%','35%'],ans:2,exp:'Default rate is 30%. Turnover ≤ ₹400 crore → 25%. Concessional: 115BAA @22%, 115BAB @15% for new manufacturing.'},
{id:'cm2',t:'corp',d:1,type:'tf',q:'MAT stands for Minimum Alternate Tax.',ans:true,exp:'True. MAT u/s 115JB: Ensures companies with large book profits but low taxable income pay minimum tax.'},
{id:'cm3',t:'corp',d:1,type:'fill',q:'Section 115BAA concessional rate for existing domestic companies is _____ %.',ans:['22','22%','twenty two'],exp:'Section 115BAA (FA 2019): 22% rate for domestic cos forgoing specified deductions. Effective with surcharge/cess ~25.17%.'},
{id:'cm4',t:'corp',d:1,type:'mcq',q:'Foreign companies are taxed on their Indian income at:',opts:['22%','30%','40%','15%'],ans:2,exp:'Foreign companies: Default 40% + surcharge + cess on India-sourced income. Royalty/FTS has special 10% u/s 115A.'},
{id:'cm5',t:'corp',d:1,type:'tf',q:'Dividend Distribution Tax (DDT) is still applicable under current provisions.',ans:false,exp:'False. DDT was ABOLISHED by Finance Act 2020. From FY 20-21, dividend is taxable in recipient\'s hands at slab/corporate rates. TDS @10% u/s 194 (or 195 for non-residents).'},
{id:'cm6',t:'corp',d:1,type:'mcq',q:'Companies Act 2013 defines a "domestic company" as one:',opts:['Incorporated in India OR making arrangement for dividends in India','Only incorporated in India','Listed on Indian exchange','With Indian directors'],ans:0,exp:'Section 2(22A) IT Act: "Domestic company" = Indian company OR any other company making prescribed arrangements for distribution of dividends in India within India. Income-tax definition differs slightly from Companies Act.'},
{id:'cm7',t:'corp',d:1,type:'fill',q:'Section _____ of IT Act deals with MAT.',ans:['115jb','section 115jb','115 jb'],exp:'Section 115JB: MAT for companies. Applies if tax on total income < MAT on book profit. MAT = 15% of book profit + surcharge + cess.'},
{id:'cm8',t:'corp',d:1,type:'mcq',q:'Current MAT rate under Section 115JB is:',opts:['9%','15%','18.5%','22%'],ans:1,exp:'MAT rate reduced to 15% (from 18.5%) by Taxation Laws Amendment Act 2019. Plus surcharge + cess. Applicable to book profit.'},
{id:'cm9',t:'corp',d:1,type:'tf',q:'A company can opt for Section 115BAA at any assessment year by filing Form 10-IC.',ans:true,exp:'True. Option u/s 115BAA is exercised via Form 10-IC filed before due date of return. Once opted, cannot be withdrawn in subsequent years. Irreversible choice.'},
{id:'cm10',t:'corp',d:1,type:'mcq',q:'New manufacturing companies can claim concessional tax rate under:',opts:['Section 115BAA','Section 115BAB','Section 115BAC','Section 115JB'],ans:1,exp:'Section 115BAB: 15% for domestic manufacturing companies incorporated on/after 1.10.2019, commencing production before 31.3.2024 (extended), not using old P&M > 20% of total value.'},
{id:'cm11',t:'corp',d:1,type:'fill',q:'Minimum Alternate Tax applies only to _____ (specify: companies / individuals).',ans:['companies','company','corporate'],exp:'MAT u/s 115JB applies only to companies (both domestic and foreign). For non-corporate assessees (individual, HUF, firm, LLP), AMT u/s 115JC applies.'},
{id:'cm12',t:'corp',d:1,type:'mcq',q:'"Book profit" for MAT purposes means:',opts:['Income tax profit','Profit as per Companies Act P&L, with specified additions/deductions','Cash profit','Gross profit'],ans:1,exp:'Book profit = Net profit as per P&L (Schedule III format) PLUS certain additions (income tax, dividend, depreciation, provisions for unascertained liabilities etc.) LESS certain deductions. As per Section 115JB and Explanation.'},
{id:'cm13',t:'corp',d:1,type:'tf',q:'A company opting for 115BAA is exempt from MAT.',ans:true,exp:'True. Companies opting for 115BAA (22%) or 115BAB (15%) are EXEMPTED from MAT u/s 115JB. They cannot claim MAT credit either. Trade-off: lower rate but no MAT safety net.'},
{id:'cm14',t:'corp',d:1,type:'mcq',q:'Surcharge on domestic company with income between ₹1 crore and ₹10 crore is:',opts:['0%','7%','12%','15%'],ans:1,exp:'Surcharge: 0% up to ₹1 crore; 7% for ₹1-10 crore; 12% above ₹10 crore. For 115BAA/BAB → flat 10% surcharge irrespective of income. For foreign companies, rates are 2%/5%.'},
{id:'cm15',t:'corp',d:1,type:'fill',q:'Health & Education cess is levied at _____ % on income tax + surcharge.',ans:['4','4%','four'],exp:'Health & Education Cess @4% levied on (income tax + surcharge). Applies to all assessees including companies. Replaces earlier Education Cess (3%) from FY 18-19.'},
{id:'cm16',t:'corp',d:1,type:'mcq',q:'Section 115-O (DDT) was repealed from:',opts:['FY 18-19','FY 19-20','FY 20-21','FY 21-22'],ans:2,exp:'DDT (Section 115-O) was abolished w.e.f. 1.4.2020 (FY 20-21 / AY 21-22) by Finance Act 2020. Dividend now taxable in shareholder\'s hands. Buyback tax u/s 115QA for buyback of shares by listed companies remains.'},
{id:'cm17',t:'corp',d:1,type:'tf',q:'A domestic company with turnover up to ₹400 crore in the preceding FY attracts 25% basic rate.',ans:true,exp:'True. FA 2019: 25% (instead of 30%) for domestic companies with previous year turnover ≤ ₹400 crore. Plus surcharge and cess.'},
{id:'cm18',t:'corp',d:1,type:'mcq',q:'For MAT, the book profit is computed from:',opts:['Income-tax return','Profit & Loss as per Schedule III (Companies Act)','Cash flow statement','Balance sheet'],ans:1,exp:'Book profit starts from Net Profit as per Statement of Profit & Loss prepared in accordance with Schedule III of Companies Act 2013. Ind AS-compliant companies follow special provisions in 115JB (Section 115JB(2A)).'},
{id:'cm19',t:'corp',d:1,type:'fill',q:'MAT credit under Section 115JAA can be carried forward for _____ AYs.',ans:['15','fifteen'],exp:'Section 115JAA: MAT credit = MAT paid – Normal tax (where MAT > Normal). Can be carried forward for 15 AYs. Set off in future years when Normal > MAT, to the extent of the excess.'},
{id:'cm20',t:'corp',d:1,type:'mcq',q:'Income tax on "deemed dividend" u/s 2(22)(e) is payable by:',opts:['Company','Shareholder in personal capacity','Both','Government waives'],ans:1,exp:'Post DDT abolition (2020), deemed dividend u/s 2(22)(e) is taxable in the hands of the SHAREHOLDER as dividend income. No DDT by company. TDS u/s 194 @10% applies.'},
{id:'cm21',t:'corp',d:1,type:'tf',q:'Partnership firms (including LLP) are taxed at corporate rates.',ans:false,exp:'False. Firms and LLPs are taxed at flat 30% (not corporate slab). However, surcharge and cess are similar. They are a separate taxable entity from partners.'},
{id:'cm22',t:'corp',d:1,type:'mcq',q:'Section 80M provides deduction for:',opts:['Donations','Inter-corporate dividend received by a domestic company','SEZ income','Export profits'],ans:1,exp:'Section 80M (reintroduced by FA 2020 post-DDT abolition): A domestic company can deduct dividend received from another domestic/foreign company to the extent of dividend distributed by it to its shareholders (on/before due date of return). Prevents cascading.'},
{id:'cm23',t:'corp',d:1,type:'fill',q:'Effective tax rate under 115BAA (22% + 10% surcharge + 4% cess) is approximately _____ %.',ans:['25.17','25.168','25.17%','25%','25.2'],exp:'Effective rate = 22% × 1.10 (surcharge) × 1.04 (cess) = 25.168%. Flat — no slab. Same for all eligible domestic cos opting in regardless of income.'},
{id:'cm24',t:'corp',d:1,type:'mcq',q:'A company opting for Section 115BAA must furnish:',opts:['Nothing extra','Form 10-IC online before the due date of return','Form 10-IB','Audit report only'],ans:1,exp:'Form 10-IC filed electronically BEFORE DUE DATE of return for the FIRST year of opting. Irrevocable — cannot be reversed in any subsequent year.'},
{id:'cm25',t:'corp',d:1,type:'tf',q:'Section 115JB is also known as "Alternate Minimum Tax."',ans:false,exp:'False. 115JB = MAT (Minimum Alternate Tax) for companies. AMT (Alternate Minimum Tax) is u/s 115JC for non-corporate assessees. Different sections, different rates (15% vs 18.5%).'},

/* ── MEDIUM (25) ── */
{id:'cm26',t:'corp',d:2,type:'mcq',q:'In computing book profit under MAT, which is ADDED BACK to net profit?',opts:['Dividend income','Depreciation as per Companies Act','Income tax paid','Export sales'],ans:2,exp:'Under 115JB, income tax + surcharge + cess paid or payable is ADDED BACK to net profit. Depreciation as per Companies Act is added and then re-deducted at lower of straight-line or actual. Dividend received may be deducted (if credit method applied).'},
{id:'cm27',t:'corp',d:2,type:'scenario',q:'Domestic company\'s normal tax liability ₹12 lakh, MAT ₹15 lakh. Tax payable and MAT credit:',opts:['Pay ₹12L; credit ₹0','Pay ₹15L; MAT credit ₹3L c/f','Pay ₹15L; no credit','Pay avg ₹13.5L'],ans:1,exp:'MAT ₹15L > Normal ₹12L → pay MAT. MAT credit = ₹3L carried forward for 15 years u/s 115JAA.'},
{id:'cm28',t:'corp',d:2,type:'tf',q:'A foreign company can opt for Section 115BAA (22% rate).',ans:false,exp:'False. Sections 115BAA and 115BAB are available ONLY to DOMESTIC companies. Foreign companies remain at 40% + surcharge + cess on India income.'},
{id:'cm29',t:'corp',d:2,type:'fill',q:'The condition to avail 115BAB is that manufacturing company must commence production before _____ (extended date, month/year).',ans:['31.03.2024','march 2024','31 march 2024','31/03/2024','mar 2024','31-03-2024'],exp:'Section 115BAB: New manufacturing co. incorporated on/after 1.10.2019, must commence manufacturing before 31.3.2024 (extended from 31.3.2023 by FA 2022). Post-2024 extensions may apply via notifications.'},
{id:'cm30',t:'corp',d:2,type:'mcq',q:'A company with book profit ₹10 crore has MAT liability (base, before surcharge/cess):',opts:['₹1 crore (10%)','₹1.5 crore (15%)','₹1.85 crore (18.5%)','₹3 crore (30%)'],ans:1,exp:'MAT @15% on book profit ₹10 crore = ₹1.5 crore (base). Plus surcharge (7%/12% as applicable) + cess 4%. Total ~₹1.74 crore if surcharge 12%.'},
{id:'cm31',t:'corp',d:2,type:'scenario',q:'Alpha Pvt Ltd: book profit ₹100 lakh, normal total income ₹20 lakh (tax @25% = ₹5L). MAT @15% = ₹15L. Tax payable:',opts:['₹5L normal tax','₹15L (MAT), MAT credit ₹10L c/f','₹20L','₹15L without credit'],ans:1,exp:'Normal tax ₹5L < MAT ₹15L → Pay MAT of ₹15L + applicable surcharge/cess. MAT credit = ₹15L – ₹5L = ₹10L, carried forward 15 AYs.'},
{id:'cm32',t:'corp',d:2,type:'tf',q:'Section 115BAA is irreversible — once opted, company cannot exit in subsequent years.',ans:true,exp:'True. Once opted 115BAA via Form 10-IC, cannot be reversed for the same or any subsequent year. Similarly 115BAB is irreversible. Only exception: company exits 115BAB → moves to 115BAA (allowed once).'},
{id:'cm33',t:'corp',d:2,type:'mcq',q:'Which of these is NOT a condition for 115BAB (new manufacturing)?',opts:['Incorporated on/after 1.10.2019','Manufacturing only (not trading)','Use of new P&M (second-hand ≤ 20%)','Minimum investment of ₹100 crore'],ans:3,exp:'No minimum investment threshold for 115BAB. Key conditions: (a) incorporated after 1.10.2019, (b) engaged in manufacture or production, (c) new plant & machinery (up to 20% used P&M allowed), (d) not engaged in specified non-mfg activities, (e) commence production by 31.3.2024.'},
{id:'cm34',t:'corp',d:2,type:'fill',q:'A domestic company with turnover up to ₹ _____ crore attracts 25% basic rate (instead of 30%).',ans:['400','400 crore','four hundred'],exp:'FA 2019 raised the turnover limit to ₹400 crore (previous year) for 25% rate. Earlier ₹250 crore.'},
{id:'cm35',t:'corp',d:2,type:'mcq',q:'Under 115BAA, depreciation allowance continues to be allowed BUT the company forgoes:',opts:['Depreciation u/s 32','Additional depreciation and specified deductions like 10AA, 80IA, 35AD','All expenses','Only research deduction'],ans:1,exp:'Section 115BAA requires company to forgo: (i) additional depreciation u/s 32(1)(iia), (ii) deductions under 10AA, 32AD, 33AB, 33ABA, 35(1)(ii)/(iia)/(iii)/35(2AA)/(2AB), 35AD, 35CCC, 35CCD, (iii) Chapter VI-A except 80JJAA/80M. Normal depreciation u/s 32 continues.'},
{id:'cm36',t:'corp',d:2,type:'scenario',q:'A company opts for 115BAA. It has unabsorbed additional depreciation from prior years ₹50 lakh. Can it set this off in 115BAA regime?',opts:['Yes, fully','No — lost once 115BAA opted','Only 50%','Can be carried forward to future years'],ans:1,exp:'Clarificatory: Unabsorbed additional depreciation and specified deductions from pre-115BAA years CANNOT BE SET OFF after opting in. Similarly, B/f losses attributable to such deductions are also lost. This was clarified by CBDT Circular 29/2019.'},
{id:'cm37',t:'corp',d:2,type:'tf',q:'Buyback of shares by a domestic company attracts tax u/s 115QA at 20%.',ans:true,exp:'True. Section 115QA: Buyback by a domestic company (whether listed or unlisted) attracts BUYBACK TAX @20% + surcharge + cess on "distributed income" (buyback price – issue price). Paid by company; shareholder\'s receipts exempt u/s 10(34A). This pattern survived the DDT repeal.'},
{id:'cm38',t:'corp',d:2,type:'fill',q:'In the MAT formula, Book Profit × _____ % = MAT tax.',ans:['15','15%','fifteen'],exp:'MAT = 15% on book profit + surcharge + cess. Earlier rate was 18.5%, reduced by Taxation Laws Amendment Act 2019 when concessional regimes were introduced.'},
{id:'cm39',t:'corp',d:2,type:'mcq',q:'Section 80JJAA allows deduction for:',opts:['Depreciation','Additional employee cost (new employment)','Export sales','Donations'],ans:1,exp:'Section 80JJAA: 30% deduction of ADDITIONAL EMPLOYEE COST (for new employees) for 3 consecutive AYs. Conditions: salary ≤ ₹25,000/month, PF member, employed > 240 days (150 for apparel/leather/footwear), net addition in headcount. Available even under 115BAA regime.'},
{id:'cm40',t:'corp',d:2,type:'scenario',q:'A listed company distributes dividend ₹50 lakh. In shareholder\'s hands (resident individual, slab 30%), tax on dividend (post DDT abolition):',opts:['Exempt','TDS @10% u/s 194 + slab rate tax','Flat 15%','Company pays DDT'],ans:1,exp:'Post DDT abolition: Company deducts TDS @10% u/s 194 at time of payment (if > ₹5,000). Shareholder pays balance tax at slab rate. Net effect: ~30% for high-income (instead of earlier DDT ~17% + cascaded tax). Double taxation concern partly addressed by 80M for inter-corporate dividend.'},
{id:'cm41',t:'corp',d:2,type:'tf',q:'Dividend received by a domestic company from its foreign subsidiary (≥26% holding) was taxable at concessional 15% u/s 115BBD (now sunset).',ans:true,exp:'True (with caveat). Section 115BBD taxed dividend from foreign subsidiary (Indian holding ≥26%) at concessional 15%. However, FA 2022 SUNSET this provision from AY 23-24 — such dividend now taxable at normal corporate rate. 80M-type deduction also not available for foreign subsidiary dividend (except for prior years).'},
{id:'cm42',t:'corp',d:2,type:'fill',q:'Under MAT, depreciation as per Companies Act is _____ to net profit, and depreciation per lower of SLM/WDV is deducted.',ans:['added','added back','add back','added-back'],exp:'Under 115JB Explanation 1: Book profit = Net profit + depreciation (per Companies Act) + tax + prov. for unascertained liabilities + ... – depreciation (straight line, lower rate). Net effect aligns with straight-line depreciation for MAT purposes.'},
{id:'cm43',t:'corp',d:2,type:'mcq',q:'Section 80G donation deduction can be claimed by a company under 115BAA?',opts:['Yes, fully','No — all Chapter VI-A deductions (except 80JJAA and 80M) forfeited','Only 50%','Only for PM Relief Fund'],ans:1,exp:'Under 115BAA, Chapter VI-A deductions (80C to 80U) are generally FORFEITED, EXCEPT Section 80JJAA (additional employee cost) and Section 80M (inter-corporate dividend). Hence 80G donation deduction is NOT available.'},
{id:'cm44',t:'corp',d:2,type:'scenario',q:'Delta Ltd (existing company): normal tax at 30% is ₹50 crore. If it opts 115BAA (22%), tax is ₹36.67 crore (approx). Should it opt?',opts:['Yes, saves ~₹13 crore','No, loses all MAT credits and specified deductions','Depends on pending MAT credits and deductions','Always opt in'],ans:2,exp:'Decision matrix: company must weigh savings (lower rate) against loss of (a) accumulated MAT credit (extinguished once 115BAA opted), (b) pending deductions like 80IA, 35AD, (c) additional depreciation carry-forward. Advisors model both scenarios before opting. If company has no significant unused deductions/MAT credit, opting in usually beneficial.'},
{id:'cm45',t:'corp',d:2,type:'tf',q:'A section 8 company (non-profit) is exempt from MAT u/s 115JB.',ans:false,exp:'False. Section 8 companies ARE subject to MAT unless separately exempted (e.g., purely charitable with 11/12 exemption). However, if their income is exempt u/s 11/12, MAT applicability is limited. Life insurance companies have specific MAT exemption u/s 115JB(5A).'},
{id:'cm46',t:'corp',d:2,type:'mcq',q:'A company voluntarily opting for 115BAA loses the benefit of:',opts:['Section 80JJAA','Brought forward additional depreciation','Section 10AA future years','Both B and C'],ans:3,exp:'On opting 115BAA, company loses: (a) benefit of 10AA, 32AD, 35AD, 35CCC, 35CCD, Chapter VI-A (except 80JJAA/80M) in current and future years; (b) B/f losses/additional depreciation attributable to those deductions. 80JJAA remains available.'},
{id:'cm47',t:'corp',d:2,type:'fill',q:'MAT credit available to a company = MAT paid – _____ .',ans:['normal tax','income tax','tax on total income','normal tax payable','regular tax'],exp:'MAT credit = MAT paid – Normal tax liability (computed under normal provisions) in the year when MAT > Normal. Carried forward 15 AYs u/s 115JAA. Set off in later year when Normal > MAT, up to the excess.'},
{id:'cm48',t:'corp',d:2,type:'mcq',q:'A subsidiary company receives ₹10 crore dividend from its 55% owned Indian subsidiary and distributes ₹8 crore dividend. Under Section 80M, deduction:',opts:['₹10 crore','₹8 crore','Nil','₹2 crore'],ans:1,exp:'Section 80M: Deduction equals dividend DISTRIBUTED (on/before due date of return) or dividend RECEIVED, WHICHEVER IS LOWER. Here: received ₹10 crore, distributed ₹8 crore → deduction = ₹8 crore. Net taxable dividend = ₹2 crore.'},
{id:'cm49',t:'corp',d:2,type:'tf',q:'Under new manufacturing regime (115BAB), the rate increases if the company is found engaged in activity other than manufacturing.',ans:true,exp:'True. 115BAB: If company is found to be engaged in any "specified prohibited activity" (e.g., development of software, mining, restaurant, manufacture of tobacco products, transaction with related parties outside arm\'s length), the benefit is withdrawn and income taxed at 30% for such non-compliant year onwards.'},
{id:'cm50',t:'corp',d:2,type:'scenario',q:'A closely-held company pays ₹20 lakh loan to a 15% shareholder. Company has accumulated profits ₹10 lakh. Tax treatment:',opts:['Full ₹20L treated as dividend in shareholder\'s hands','₹10L (limited to accumulated profits) treated as deemed dividend u/s 2(22)(e)','Not a dividend','₹20L taxed at 30%'],ans:1,exp:'Section 2(22)(e) deemed dividend: Loan to shareholder (≥10% beneficial interest) treated as dividend TO THE EXTENT OF ACCUMULATED PROFITS of the company. Here ₹10 lakh (= accumulated profits). Balance ₹10L is treated as a loan. Post DDT abolition, taxable in shareholder\'s hands.'},

/* ── HARD (25) ── */
{id:'cm51',t:'corp',d:3,type:'fill',q:'Effective tax rate under 115BAB (15% + 10% surcharge + 4% cess) is approximately _____ %.',ans:['17.16','17.17','17.01','17','17.16%'],exp:'15% × 1.10 × 1.04 = 17.16%. Actually 15 × 1.10 = 16.5; 16.5 × 1.04 = 17.16%. Some tables cite 17.01% depending on surcharge application method. Lowest in current regime.'},
{id:'cm52',t:'corp',d:3,type:'mcq',q:'Book profit under MAT for a company following Ind AS includes adjustments for:',opts:['OCI items (with specified exclusions)','No OCI items','Only tax on OCI','100% of all OCI'],ans:0,exp:'Section 115JB(2A) (for Ind AS companies): Certain Other Comprehensive Income (OCI) items are included in book profit — e.g., actuarial gains/losses (split over 5 yrs), revaluation gains (only on realisation). Some OCI items (e.g., FVTOCI equity) are specifically excluded. Complex Ind AS carve-outs apply.'},
{id:'cm53',t:'corp',d:3,type:'scenario',q:'Company X opts for 115BAA in AY 23-24. It had MAT credit ₹5 crore c/f from AY 21-22. Can it utilise this?',opts:['Yes, fully','No, MAT credit lapses upon opting 115BAA','Only 50%','Refund from CBDT'],ans:1,exp:'CBDT Circular 29/2019: On opting for 115BAA, MAT PROVISIONS CEASE to apply, and MAT credit BROUGHT FORWARD cannot be utilised or carried forward. It effectively LAPSES. Major consideration for cos with large MAT credit — may delay opting in until credit utilised.'},
{id:'cm54',t:'corp',d:3,type:'tf',q:'Section 115JB book profit is computed WITHOUT deducting dividend paid by the company from net profit.',ans:true,exp:'True. Dividend paid is an APPROPRIATION of profit, not an expense. It is already deducted (implicitly) or disclosed separately in P&L under Schedule III. For MAT, book profit starts from net profit (before appropriations), hence dividend not deducted. Note: Dividend RECEIVED may be deductible (if conditions met) for avoiding double taxation.'},
{id:'cm55',t:'corp',d:3,type:'mcq',q:'Under Section 115QA, buyback tax on unlisted and listed companies: Base for tax is:',opts:['Total buyback value','(Buyback price – Amount received on issue of shares)','Only profit part','Market value'],ans:1,exp:'Section 115QA: Tax @20% on "distributed income" = amount paid on buyback MINUS amount received by company on issue of such shares. The "issue amount" is computed per Rule 40BB (detailed mechanism for different classes of shares: bonus, rights, ESOP, conversion etc.).'},
{id:'cm56',t:'corp',d:3,type:'scenario',q:'ABC Ltd (book profit ₹100 lakh) has income tax u/s normal provisions ₹20 lakh. Additional items: export profit exempted u/s 10AA ₹30 lakh. For MAT book profit:',opts:['Deduct ₹30L exempt income','Do NOT deduct 10AA exempt profit — it\'s included in book profit','Deduct 50%','Deduct full ₹30L but adjust tax'],ans:1,exp:'Section 115JB: SEZ export profit exempt u/s 10AA was earlier DEDUCTIBLE from book profit; however, Finance Act 2011 amended Explanation 1 to REMOVE this deduction. So 10AA profits are now INCLUDED in book profit. One of the reasons 115BAA at 22% flat became attractive — no MAT hassle.'},
{id:'cm57',t:'corp',d:3,type:'fill',q:'Section _____ prohibits tax holidays / deductions otherwise available, if 115BAA option is exercised.',ans:['115baa','section 115baa','115 baa'],exp:'Section 115BAA itself lists the prohibited deductions (10AA, 32(1)(iia), 32AD, 33AB, 33ABA, 35, 35AD, 35CCC, 35CCD, Chapter VI-A except 80JJAA/80M). These are integrated into 115BAA for the company to exercise a clean option.'},
{id:'cm58',t:'corp',d:3,type:'mcq',q:'A company earned ₹50 lakh from SEZ (eligible u/s 10AA) and ₹30 lakh from non-SEZ. Normal tax (30%) on ₹30 lakh = ₹9 lakh. MAT on book profit ₹80 lakh @15% = ₹12 lakh. What tax applies?',opts:['Normal ₹9 lakh','MAT ₹12 lakh (including 10AA income as part of book profit)','Weighted avg','Exempt'],ans:1,exp:'MAT catches exempt income (10AA included in book profit post FA 2011). Normal tax excludes 10AA profit — but MAT includes it. Hence MAT > Normal → pay MAT ₹12L, MAT credit ₹3L c/f. This is why 115BAA (no MAT, no 10AA) is attractive: avoid MAT on SEZ income.'},
{id:'cm59',t:'corp',d:3,type:'tf',q:'Under Section 115JB, loss from derivatives (non-speculative hedging) is adjusted to book profit.',ans:false,exp:'False. MAT book profit is computed as per Companies Act P&L — any derivatives gain/loss already reflected in P&L per Ind AS/AS is part of book profit. No separate adjustment for speculative/non-speculative distinction (which applies under normal provisions only).'},
{id:'cm60',t:'corp',d:3,type:'scenario',q:'XYZ Ltd had losses. Book Profit ₹40 lakh, b/f business loss as per books ₹60 lakh, unabsorbed depreciation as per books ₹30 lakh. Deductible under MAT:',opts:['Full ₹90 lakh loss','LOWER of b/f loss or unabsorbed depreciation = ₹30 lakh','Higher of the two = ₹60 lakh','Nil'],ans:1,exp:'Section 115JB Explanation 1 (iii): Lower of (i) b/f business loss as per books OR (ii) unabsorbed depreciation as per books — deductible from book profit. If either is nil, no deduction. Here: lower = ₹30 lakh. Book profit after MAT adjustment = ₹10 lakh. MAT = ₹10L × 15% = ₹1.5 lakh.'},
{id:'cm61',t:'corp',d:3,type:'mcq',q:'Section 115BAC (new regime for individuals) corresponds to which for companies?',opts:['115JB','115BAA','115JD','115QA'],ans:1,exp:'115BAC = concessional new regime for individuals/HUF (optional, from FY 20-21). 115BAA = concessional regime for domestic companies. Both mandate forgoing of specified exemptions/deductions. Parallel design.'},
{id:'cm62',t:'corp',d:3,type:'fill',q:'CSR expenditure (Section 135 Companies Act) is disallowed as business expenditure u/s _____ of IT Act.',ans:['37(1)','37','section 37','37 (1)','explanation 2 to 37'],exp:'Explanation 2 to Section 37(1) IT Act: CSR expenditure shall NOT be deemed to be business expenditure. Hence disallowed in computing taxable profits. However, certain CSR contributions qualify for deduction under other sections (80G, 35AC etc.). Courts have held this creates quasi-double taxation.'},
{id:'cm63',t:'corp',d:3,type:'scenario',q:'Alpha Ltd: Net profit per P&L ₹100 crore. Includes depreciation ₹20 crore (Companies Act), provision for doubtful debts ₹5 crore, DDT ₹0 (post abolition), dividend from foreign co. ₹10 crore. Prior losses ₹15 crore (lower of the two). Book profit for MAT:',opts:['₹100 crore','₹100 + 5 – 10 – 15 = ₹80 crore','₹100 + 20 + 5 – 10 – 15 = ₹100 crore','₹85 crore'],ans:1,exp:'Book Profit = Net profit ₹100 + Prov. doubtful debts ₹5 (unascertained liability) – foreign dividend ₹10 (may be excluded if exempt or 115BBD earlier, post FA 2022 sunset varies) – lower of b/f loss/dep ₹15. = ₹80 crore. Depreciation already accounted in P&L, not added back unless specifically re-added (only revaluation-related excess added). Simplified illustration.'},
{id:'cm64',t:'corp',d:3,type:'tf',q:'Section 115BAA is not available to a company that has claimed 10AA benefit in any earlier year.',ans:false,exp:'False. A company that earlier claimed 10AA benefit CAN still opt for 115BAA in a subsequent year — once opted, 10AA is forfeited prospectively. Past claims remain intact. The decision is prospective only.'},
{id:'cm65',t:'corp',d:3,type:'mcq',q:'Section 115BBE applies a flat 60% tax rate on income covered under:',opts:['Section 11/12','Sections 68 to 69D (unexplained)','Section 115JB','Section 80P'],ans:1,exp:'Section 115BBE: Flat 60% tax on income referred in Sections 68 (cash credits), 69, 69A, 69B, 69C, 69D — unexplained investments, cash, expenditure. Plus 25% surcharge on tax + 4% cess → effective ~78%. No deduction, no loss set-off allowed. Penalty u/s 271AAC @10% of tax.'},
{id:'cm66',t:'corp',d:3,type:'scenario',q:'A domestic company has 10-year 10AA deduction running. In year 5 opts for 115BAA. Treatment:',opts:['Continue 10AA alongside 115BAA','10AA ceases from year of opting; no deduction in remaining years','Deduction halved','Refund for future years'],ans:1,exp:'On opting 115BAA (irrevocable), the company FORFEITS 10AA from that year onwards. Remaining 5 years of 10AA tax holiday = lost. This is a major disincentive for SEZ units considering 115BAA. Economic evaluation: compare (10AA tax savings) vs (22% vs 25-30% for remaining life of company).'},
{id:'cm67',t:'corp',d:3,type:'fill',q:'For computing book profit of a banking / insurance / electricity company, a separate format is followed per _____ of Schedule III / special acts.',ans:['companies act','schedule iii','banking regulation act','special provisions','special'],exp:'Banking companies follow Form B of Third Schedule to Banking Regulation Act; insurance companies follow Schedule A of Insurance Act; electricity cos Section 116 of Electricity Act. Their book profit computation u/s 115JB(2)(b) uses these sector-specific formats.'},
{id:'cm68',t:'corp',d:3,type:'mcq',q:'A start-up eligible for 80-IAC deduction (tax holiday) — if it opts 115BAA:',opts:['Retains 80-IAC deduction','Forfeits 80-IAC (Chapter VI-A forfeiture)','Extends by 2 years','Half benefit'],ans:1,exp:'Section 80-IAC (eligible start-up tax holiday — 100% profit deduction for 3 out of 10 years) is a Chapter VI-A deduction. Opting 115BAA requires forfeiture of Chapter VI-A deductions (except 80JJAA/80M). Hence start-up loses 80-IAC. Most start-ups wait until after 80-IAC runout before opting 115BAA.'},
{id:'cm69',t:'corp',d:3,type:'tf',q:'MAT is not applicable to a foreign company earning interest income taxable u/s 115A.',ans:true,exp:'True. Foreign companies are subject to MAT u/s 115JB(2)(c), BUT only on income from a PERMANENT ESTABLISHMENT in India. Passive income (royalty, FTS, interest — Section 115A, fixed rates) is specifically excluded from MAT since FA 2016. Relief given to pure passive foreign investors.'},
{id:'cm70',t:'corp',d:3,type:'scenario',q:'A domestic manufacturing co. (inc. 1.11.2019) commenced production 1.4.2024. It used 15% old P&M. Can it claim 115BAB?',opts:['Yes — within 20% limit and commenced by due date','No — commencement after 31.3.2024','Yes if under 115BAA','50% benefit'],ans:0,exp:'Commencement deadline under 115BAB has been extended to 31.3.2024 (and potentially further). 1.4.2024 is BORDERLINE — may fall outside unless further extended. Assuming the extension to 31.3.2024 is operative and this crosses by 1 day → fails. However, if another extension (say to 31.3.2025) was granted, it qualifies. This highlights the strict date sensitivity. Old P&M test: ≤20% of total value — 15% is within limit. ANSWER depends on the exact policy extension in force when commencement occurred.'},
{id:'cm71',t:'corp',d:3,type:'mcq',q:'In CIT v. Apollo Tyres Ltd (SC, 2002), court held regarding MAT book profit:',opts:['AO has wide power to re-compute','AO has VERY LIMITED power — cannot go behind net profit as per P&L certified by auditors and accepted by shareholders','Book profit = taxable profit','Company can self-certify book profit'],ans:1,exp:'Apollo Tyres (2002 SC): Landmark. AO cannot re-draw the P&L; can only make adjustments specified in Explanation to 115JB. Book profit as certified by auditors and adopted in AGM is final. Decision limited AO\'s power to tinker with MAT computation, forcing reliance on statutory adjustments only.'},
{id:'cm72',t:'corp',d:3,type:'fill',q:'Taxation Laws Amendment Act 2019 reduced the MAT rate from 18.5% to _____ %.',ans:['15','15%','fifteen'],exp:'TLAA 2019 reduced MAT from 18.5% to 15% alongside introducing 115BAA (22%) and 115BAB (15%). Made MAT less punitive for non-opting companies. Rate effective from AY 20-21.'},
{id:'cm73',t:'corp',d:3,type:'scenario',q:'Foreign company has PE in India. PE profit ₹80 crore; royalty from unrelated Indian customer ₹20 crore. Total taxable income ₹100 crore. Book profit as per 115JB:',opts:['₹100 crore','₹80 crore (PE only, royalty excluded per FA 2016)','₹20 crore (royalty only)','Nil'],ans:1,exp:'Finance Act 2016 amendment: Foreign companies — MAT book profit includes only PE-attributable profit. Royalty/FTS/interest covered by 115A (chargeable at fixed rates) are EXCLUDED from book profit. Result: Book profit = ₹80 crore PE only. MAT = 15% × 80 = ₹12 crore.'},
{id:'cm74',t:'corp',d:3,type:'tf',q:'A closely-held company buying back listed shares from open market is taxable u/s 115QA at 20%.',ans:true,exp:'True. Section 115QA covers buyback by ALL domestic companies (listed + unlisted). Originally only unlisted, extended to listed companies from FY 19-20. Rate 20% + surcharge + cess on "distributed income" (buyback price – issue price). Shareholder\'s income from buyback is exempt u/s 10(34A) to avoid double taxation.'},
{id:'cm75',t:'corp',d:3,type:'mcq',q:'A new domestic manufacturing company (incorporated 1.11.2019, opted 115BAB) merges with an existing 30%-tax company. Post-merger, the merged entity:',opts:['Continues under 115BAB','Loses 115BAB benefit (specific conditions violated)','Taxed at 22%','Auto-shifts to 115BAA'],ans:1,exp:'Section 115BAB imposes strict conditions: (i) new company, (ii) formed not by splitting up or reconstruction of existing business, (iii) no amalgamation of specified kind. A merger with an existing company likely violates "formed by reconstruction/amalgamation" condition. Benefit withdrawn prospectively. Merger structures require careful tax planning to preserve 115BAB.'},
  ]
},

{id:'sa1',t:'sa',d:1,type:'mcq',q:'Auditing Standards (SAs) in India are issued by:',opts:['RBI','SEBI','ICAI','MCA'],ans:2,exp:'SAs are issued by ICAI through its Auditing and Assurance Standards Board (AASB), converged with ISAs.'},
{id:'sa2',t:'sa',d:1,type:'tf',q:'The primary objective of an audit is to detect all frauds.',ans:false,exp:'False. Per SA 200, primary objective is to express opinion on true and fair view. Fraud detection is incidental.'},
{id:'sa3',t:'sa',d:1,type:'fill',q:'SA _____ deals with "Audit Evidence".',ans:['500','sa 500','sa500'],exp:'SA 500: Sufficient (quantity) and appropriate (relevance + reliability) audit evidence.'},
{id:'sa4',t:'sa',d:1,type:'mcq',q:'SA 320 deals with:',opts:['Audit Evidence','Materiality','Going Concern','Sampling'],ans:1,exp:'SA 320 Materiality in planning and performing audit.'},
{id:'sa5',t:'sa',d:1,type:'mcq',q:'"True and Fair View" means:',opts:['Every figure 100% accurate','Free from material misstatement','All taxes paid','No fraud'],ans:1,exp:'Financial statements are free from material misstatements and comply with applicable framework.'},
{id:'sa6',t:'sa',d:1,type:'fill',q:'SA 200 deals with "Overall Objectives of the Independent Auditor and the conduct of audit in accordance with _____ ".',ans:['standards on auditing','sas','auditing standards','standards'],exp:'SA 200 overall objectives: form opinion, report on FS, communicate findings per SAs.'},
{id:'sa7',t:'sa',d:1,type:'tf',q:'SA 570 deals with Going Concern.',ans:true,exp:'True. SA 570: Auditor must evaluate management\'s going concern assessment for at least 12 months.'},
{id:'sa8',t:'sa',d:1,type:'mcq',q:'SA 530 covers:',opts:['Fraud','Audit Sampling','Related Parties','Opening Balances'],ans:1,exp:'SA 530 Audit Sampling: Statistical or non-statistical methods to test representative sample.'},
{id:'sa9',t:'sa',d:1,type:'fill',q:'SA 240 deals with the auditor\'s responsibilities relating to _____ in an audit.',ans:['fraud','frauds','fraudulent activities'],exp:'SA 240 on Fraud: Risk assessment, procedures, reporting to management and regulators.'},
{id:'sa10',t:'sa',d:1,type:'mcq',q:'Audit evidence is considered sufficient when:',opts:['In excess quantity','Enough quantity to support the opinion','Digitally verified','Peer reviewed'],ans:1,exp:'Sufficiency = adequate QUANTITY of evidence. Appropriateness = relevance + reliability (quality).'},
{id:'sa11',t:'sa',d:1,type:'tf',q:'SA 210 covers "Agreeing the terms of Audit Engagements."',ans:true,exp:'True. SA 210 requires written engagement letter covering scope, responsibilities, fee, reporting framework, access to info.'},
{id:'sa12',t:'sa',d:1,type:'fill',q:'An _____ letter is issued by the auditor at the start of the engagement.',ans:['engagement','engagement letter','appointment','audit engagement'],exp:'Engagement letter (SA 210) defines terms: scope, fees, responsibilities, reporting framework. Signed by client.'},
{id:'sa13',t:'sa',d:1,type:'mcq',q:'SA 315 covers:',opts:['Planning an audit','Identifying and assessing risks of material misstatement','Written representations','Audit documentation'],ans:1,exp:'SA 315 Identifying and Assessing Risks of Material Misstatement (revised) through understanding the entity and its environment.'},
{id:'sa14',t:'sa',d:1,type:'tf',q:'SA 300 "Planning an Audit" requires a written audit plan.',ans:true,exp:'True. SA 300 requires overall audit STRATEGY + detailed audit PLAN. Both must be documented.'},
{id:'sa15',t:'sa',d:1,type:'mcq',q:'The ICAI body that issues SAs is:',opts:['AASB','AAEB','ICAI Board of Auditing','Quality Review Board'],ans:0,exp:'AASB = Auditing and Assurance Standards Board of ICAI issues SAs (Standards on Auditing), SREs, SAEs, SRSs.'},
{id:'sa16',t:'sa',d:1,type:'fill',q:'The highest standard hierarchy for audit in India is an _____ (write: SA / SQC / SRE).',ans:['sa','standard on auditing','sqc','sa 200'],exp:'SA (Standards on Auditing) are mandatory for statutory audits. SQC 1 (Standards on Quality Control) applies at firm level. SRE = Review; SAE = Assurance; SRS = Related Services.'},
{id:'sa17',t:'sa',d:1,type:'mcq',q:'SA 260 deals with:',opts:['Communication with those charged with governance','Audit risk','External confirmations','Opening balances'],ans:0,exp:'SA 260: Communication with those charged with governance (board/audit committee) on scope, timing, significant findings.'},
{id:'sa18',t:'sa',d:1,type:'tf',q:'Audit risk = Inherent Risk × Control Risk × Detection Risk.',ans:true,exp:'True. Classic audit risk model. Risk of Material Misstatement = IR × CR. Audit Risk = RoMM × Detection Risk.'},
{id:'sa19',t:'sa',d:1,type:'fill',q:'Audit sampling allows the auditor to draw conclusions about the _____ (entire group) from a sample.',ans:['population','entire population','whole'],exp:'Population = all items (transactions, balances) about which auditor wants to draw a conclusion. Sample represents it.'},
{id:'sa20',t:'sa',d:1,type:'mcq',q:'SA 250 deals with:',opts:['Laws and regulations compliance','Opening balances','Going concern','Written reps'],ans:0,exp:'SA 250: Consideration of Laws and Regulations in an Audit of Financial Statements.'},
{id:'sa21',t:'sa',d:1,type:'tf',q:'The auditor\'s opinion is a guarantee of future viability of the company.',ans:false,exp:'False. Audit opinion is on historical financial statements. It does not guarantee future viability, operational efficiency, or management competence.'},
{id:'sa22',t:'sa',d:1,type:'mcq',q:'SA 230 covers:',opts:['Audit documentation','Audit evidence','Going concern','Review'],ans:0,exp:'SA 230 Audit Documentation: Working papers should enable an experienced auditor to understand the work done and conclusions.'},
{id:'sa23',t:'sa',d:1,type:'fill',q:'Audit working papers must be retained for a minimum of _____ years from date of audit report.',ans:['7','seven'],exp:'SA 230 + SQC 1: Retain working papers for 7 years (some jurisdictions 5-10 years). Companies Act 2013 also mandates 8 years for statutory audit records.'},
{id:'sa24',t:'sa',d:1,type:'mcq',q:'SA 220 deals with:',opts:['Quality control for an audit','Sampling','Going concern','Laws'],ans:0,exp:'SA 220 Quality Control for an Audit of Financial Statements. Engagement level quality controls per team.'},
{id:'sa25',t:'sa',d:1,type:'tf',q:'Professional skepticism means questioning mindset regardless of past honesty.',ans:true,exp:'True. SA 200: Skepticism = questioning mind, alertness to conditions indicating misstatement, critical assessment of evidence. Applied irrespective of prior integrity of management.'},

/* ── MEDIUM (25) ── */
{id:'sa26',t:'sa',d:2,type:'mcq',q:'SA 240 (Fraud) distinguishes between:',opts:['Small and big frauds','Fraudulent financial reporting and misappropriation of assets','Internal and external fraud','Cash and non-cash fraud'],ans:1,exp:'SA 240: Two types (i) Fraudulent Financial Reporting (manipulation of FS) and (ii) Misappropriation of Assets (theft). Different procedures and risk.'},
{id:'sa27',t:'sa',d:2,type:'tf',q:'Auditor is primarily responsible for preventing fraud in the company.',ans:false,exp:'False. Management is responsible for prevention + detection. Auditor\'s role is to obtain reasonable assurance FS are free from material misstatement whether due to fraud or error.'},
{id:'sa28',t:'sa',d:2,type:'fill',q:'SA _____ covers Audit Documentation — the auditor must document work, findings, and conclusions.',ans:['230','sa 230'],exp:'SA 230 Audit Documentation: Should enable experienced auditor (new to engagement) to understand work done, evidence, judgments, conclusions.'},
{id:'sa29',t:'sa',d:2,type:'mcq',q:'During audit of Sunrise Ltd, current liabilities exceed current assets and loan defaults exist. Which SA applies?',opts:['SA 200','SA 315','SA 570','SA 700'],ans:2,exp:'SA 570 Going Concern. Red flags (negative working capital, defaults) require auditor to evaluate management\'s plans, and report material uncertainty if unresolved.'},
{id:'sa30',t:'sa',d:2,type:'scenario',q:'An auditor finds a ₹15 lakh misstatement in a company with total revenue ₹500 crore. Is this material?',opts:['Always material','Always immaterial','Depends on materiality threshold set in planning (SA 320)','Material only if fraud'],ans:2,exp:'SA 320: Materiality is relative. Typical benchmarks: 0.5-1% revenue; 5% PBT; 1% total assets. ₹15 lakh on ₹500 crore revenue = 0.003% — likely immaterial by size alone. But may be material by nature (e.g., related-party).'},
{id:'sa31',t:'sa',d:2,type:'tf',q:'Professional skepticism requires auditor to assume management is dishonest.',ans:false,exp:'False. Skepticism ≠ distrust. It is a QUESTIONING MIND — neither assuming dishonesty nor unquestioning honesty. Balanced critical assessment of evidence.'},
{id:'sa32',t:'sa',d:2,type:'mcq',q:'SA 550 deals with:',opts:['Related Parties','Laws and regulations','External confirmations','Going concern'],ans:0,exp:'SA 550 Related Parties: Auditor\'s responsibilities to identify related parties, understand relationships, assess whether transactions are at arm\'s length, ensure proper disclosure.'},
{id:'sa33',t:'sa',d:2,type:'fill',q:'SA 600 covers the responsibility of the auditor in respect of "Using work of _____ auditor".',ans:['another','branch','component'],exp:'SA 600 Using the Work of Another Auditor: When principal auditor uses branch/subsidiary auditor\'s work — must coordinate, review, and consider modifications.'},
{id:'sa34',t:'sa',d:2,type:'scenario',q:'Principal auditor A audits Parent Co. Branch audit is done by auditor B. Under SA 600, A must:',opts:['Not rely on B; do all work himself','Consider professional competence of B and coordinate','Ignore branch audit','Issue joint opinion'],ans:1,exp:'SA 600: Principal auditor must (i) consider professional competence of other auditor, (ii) communicate coordination requirements, (iii) review other auditor\'s work as needed, (iv) consider whether modifications are required based on branch findings.'},
{id:'sa35',t:'sa',d:2,type:'tf',q:'Material misstatement can arise only from fraud, not from error.',ans:false,exp:'False. Material misstatement can arise from (i) ERROR (unintentional) or (ii) FRAUD (intentional). Auditor designs procedures to detect both.'},
{id:'sa36',t:'sa',d:2,type:'mcq',q:'SA 520 covers:',opts:['Analytical procedures','Written representations','Audit documentation','Using work of experts'],ans:0,exp:'SA 520 Analytical Procedures: Compare ratios, trends, relationships — identify unusual variations. Used in planning (SA 315), evidence (SA 500), review (SA 520).'},
{id:'sa37',t:'sa',d:2,type:'fill',q:'Detection risk is _____ of the auditor: the higher the audit effort, the _____ the DR.',ans:['control','risk','in control','controllable','under control','lower'],exp:'Detection Risk is under auditor\'s control (unlike IR and CR which are entity-driven). More testing → lower DR. Auditor sets AR target, assesses IR/CR, and decides DR level.'},
{id:'sa38',t:'sa',d:2,type:'mcq',q:'SA 560 covers:',opts:['Events After Reporting Date (subsequent events)','Going concern','Engagement letter','Reports'],ans:0,exp:'SA 560 Subsequent Events: Procedures for events between balance sheet date and auditor\'s report date; adjusting vs non-adjusting events; discovery of facts after report.'},
{id:'sa39',t:'sa',d:2,type:'scenario',q:'Sigma Ltd\'s major customer files bankruptcy on 15 May, after BS date 31 March. Under SA 560, is this an adjusting event?',opts:['Yes, adjusting (bankruptcy started before BS date)','Not adjusting (conditions post BS date); disclosure required','Ignore; too late','Fraud reporting'],ans:1,exp:'SA 560 + AS 4/Ind AS 10: Events CONFIRMING conditions existing at BS date = adjusting. Events REFLECTING conditions arising after BS = non-adjusting. Customer bankruptcy may be adjusting IF financial distress existed before BS — fact-specific; often disclosed as non-adjusting if reasons arose post-BS.'},
{id:'sa40',t:'sa',d:2,type:'tf',q:'SA 580 requires written representations from management covering specified matters.',ans:true,exp:'True. SA 580 Written Representations: Management\'s written confirmation — about responsibilities, completeness of information, fraud disclosures, related parties, commitments/contingencies. Part of audit evidence.'},
{id:'sa41',t:'sa',d:2,type:'mcq',q:'Audit risk is acceptable when:',opts:['Zero','Reduced to acceptably LOW level via sufficient evidence','At maximum','Undisclosed'],ans:1,exp:'Audit Risk = Risk of inappropriate opinion when FS materially misstated. Cannot be zero. SA 200: Auditor should reduce AR to an acceptably low level through sufficient appropriate evidence.'},
{id:'sa42',t:'sa',d:2,type:'fill',q:'When risk of material misstatement is high, the auditor must reduce _____ risk by more extensive procedures.',ans:['detection','detection risk','dr'],exp:'AR = RoMM × DR. If RoMM (IR × CR) is high, to keep AR acceptable, DR must be LOWER — requires MORE extensive/robust procedures (more sampling, higher reliability evidence).'},
{id:'sa43',t:'sa',d:2,type:'mcq',q:'SA 610 deals with:',opts:['Using Work of Internal Auditors','External confirmations','Going concern','Fraud'],ans:0,exp:'SA 610 Using the Work of Internal Auditors: When external auditor may use work of internal audit function. Assess competence, objectivity, and systematic approach of IA.'},
{id:'sa44',t:'sa',d:2,type:'tf',q:'Analytical procedures are mandatory in the planning and review phases of an audit.',ans:true,exp:'True. SA 315 (planning) and SA 520 (substantive + review) require analytical procedures. Also used during fieldwork as substantive procedure for reasonableness checks.'},
{id:'sa45',t:'sa',d:2,type:'scenario',q:'Auditor X observed that repairs expense has doubled (₹5cr → ₹10cr) in one year. Under SA 520, what should X do?',opts:['Accept as recorded','Investigate — possible capital vs revenue misclassification or fraud','Write off as immaterial','Change materiality'],ans:1,exp:'Analytical procedures (SA 520) — unusual variations trigger further inquiry. Large increase in repairs could be (i) capital items expensed, (ii) fraudulent invoicing, (iii) genuine major repair. Auditor must obtain explanation + corroborating evidence.'},
{id:'sa46',t:'sa',d:2,type:'mcq',q:'SA 540 relates to auditing accounting estimates. Key examples include:',opts:['Cash and bank balances','Provisions, impairment, fair values','Share capital','Land'],ans:1,exp:'SA 540 Accounting Estimates: Fair value, provisions for doubtful debts, impairment of assets, warranties, actuarial valuations for retirement benefits. Uncertainty + management judgment = higher risk.'},
{id:'sa47',t:'sa',d:2,type:'fill',q:'The _____ paragraph in an audit report draws attention to matters already disclosed in FS.',ans:['emphasis of matter','emphasis of matter (eom)','emphasis','eom'],exp:'Emphasis of Matter (EoM) paragraph under SA 706 — draws attention to matter already properly disclosed, fundamental to understanding FS. Does NOT modify the opinion.'},
{id:'sa48',t:'sa',d:2,type:'mcq',q:'SA 450 covers:',opts:['Materiality','Evaluation of misstatements identified during the audit','Fraud','Laws'],ans:1,exp:'SA 450 Evaluation of Misstatements Identified During the Audit: Auditor accumulates misstatements (above trivial), considers correction, and determines impact on opinion.'},
{id:'sa49',t:'sa',d:2,type:'tf',q:'A clearly trivial misstatement must always be communicated to management.',ans:false,exp:'False. SA 450: The auditor accumulates misstatements OTHER than those which are CLEARLY TRIVIAL. Clearly trivial items need not be communicated. "Clearly trivial" = much smaller than materiality and can\'t add up to material when aggregated.'},
{id:'sa50',t:'sa',d:2,type:'scenario',q:'Auditor finds unrecorded liability ₹40 lakh. Planning materiality ₹100 lakh. Management refuses to record. Action:',opts:['Issue unmodified opinion','Accumulate misstatement, discuss with TCWG, qualify if not corrected','Resign','Write off personally'],ans:1,exp:'SA 450: Material unrecorded misstatement (₹40L against materiality ₹100L is ~40% — material). If management refuses correction, auditor must communicate with TCWG. If still uncorrected, modify opinion (qualify — "except for..." per SA 705).'},

/* ── HARD (25) ── */
