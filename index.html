{id:'sa51',t:'sa',d:3,type:'mcq',q:'SA 402 covers:',opts:['Audit considerations relating to an entity using a service organisation','Related parties','Subsequent events','Sampling'],ans:0,exp:'SA 402: When the entity outsources processes (e.g., payroll, cloud hosting) to a service organization, auditor must obtain understanding of service and controls — via Type 1/Type 2 reports of service org auditor.'},
{id:'sa52',t:'sa',d:3,type:'tf',q:'A Type 2 SOC report provides operating effectiveness evidence, unlike Type 1.',ans:true,exp:'True. Under SA 402: Type 1 report = controls design at a point in time. Type 2 report = design + OPERATING EFFECTIVENESS over a period. Auditor relies on Type 2 for control reliance; Type 1 only for planning.'},
{id:'sa53',t:'sa',d:3,type:'fill',q:'The three-tier materiality levels are OVERALL materiality, performance materiality, and _____ .',ans:['specific','specific materiality','trivial threshold','specific materialities'],exp:'SA 320: (i) Overall materiality (FS-level), (ii) Performance materiality (lower, for procedures to cover undetected misstatements), (iii) Specific materiality (for particular classes — may be lower if sensitive, e.g., related-party balance).'},
{id:'sa54',t:'sa',d:3,type:'scenario',q:'Performance materiality is set at 75% of overall materiality of ₹100 lakh. Auditor accumulates uncorrected misstatements ₹65 lakh. Assessment:',opts:['Unmodified opinion — within overall materiality','Worry — approaches performance materiality; investigate for undetected','Automatic adverse opinion','Qualify without discussion'],ans:1,exp:'Performance materiality ₹75L is a CUSHION below overall to cover undetected errors. ₹65L already identified + likelihood of unfound errors could push total above overall ₹100L. Auditor should perform additional procedures, reassess risks, discuss with management.'},
{id:'sa55',t:'sa',d:3,type:'mcq',q:'SA 701 Key Audit Matters is mandatory for:',opts:['All audits','Only listed entities','Public sector','Firms with turnover > ₹100 crore'],ans:1,exp:'SA 701 Key Audit Matters mandatory ONLY for audits of LISTED ENTITIES. Other entities — voluntary or as required by law/regulation. KAM is reported separately without modifying the opinion.'},
{id:'sa56',t:'sa',d:3,type:'tf',q:'Auditor can issue opinion based solely on management\'s written representations.',ans:false,exp:'False. SA 580: Written representations are necessary but NOT SUFFICIENT on their own. They supplement other audit evidence — cannot replace. Always obtain corroborating evidence wherever practicable.'},
{id:'sa57',t:'sa',d:3,type:'fill',q:'SA _____ relates to opening balances when the prior period was audited by another auditor.',ans:['510','sa 510'],exp:'SA 510 Initial Audit Engagements — Opening Balances: Auditor must obtain sufficient evidence that opening balances do not contain material misstatements. Procedures: review predecessor\'s working papers, perform specific tests.'},
{id:'sa58',t:'sa',d:3,type:'mcq',q:'Professional skepticism under SA 200 must be applied:',opts:['Only where fraud is suspected','Throughout the audit','Only during planning','Only with new clients'],ans:1,exp:'SA 200 requires skepticism THROUGHOUT THE AUDIT — from acceptance to report. Includes evaluating evidence, management\'s explanations, unusual transactions, confirmations. Not situational.'},
{id:'sa59',t:'sa',d:3,type:'scenario',q:'Company management provides unusual explanation: a ₹50 crore asset revaluation was based on "internal judgment, no external valuer used." Skeptical auditor should:',opts:['Accept due to trust','Apply professional skepticism — insist on external valuation or adjust','Issue disclaimer immediately','Resign'],ans:1,exp:'Revaluation = critical estimate (SA 540) + large (material). Skepticism: do not accept at face value. Request (i) methodology, (ii) independent valuer per SA 620 (Using Work of an Expert), (iii) reconcile with market evidence. If no acceptable evidence, modify opinion.'},
{id:'sa60',t:'sa',d:3,type:'tf',q:'Audit risk can always be reduced to zero.',ans:false,exp:'False. Absolute assurance is impossible due to inherent limitations: sampling, judgment, entity fraud, complexities. SA 200 requires REASONABLE (not absolute) assurance.'},
{id:'sa61',t:'sa',d:3,type:'mcq',q:'SA 620 "Using the Work of an Auditor\'s Expert" requires:',opts:['Always hire expert','Assess competence, capability, and objectivity of the expert','Only use external experts','Charge client for expert'],ans:1,exp:'SA 620: When auditor needs specialised expertise (e.g., valuation, actuarial, legal), he may rely on expert. Must evaluate (i) competence, (ii) capabilities, (iii) objectivity of expert. Also obtain understanding of expert\'s work.'},
{id:'sa62',t:'sa',d:3,type:'fill',q:'SA _____ deals with "The auditor\'s response to assessed risks."',ans:['330','sa 330'],exp:'SA 330: Auditor designs and implements responses to assessed risks of material misstatement (identified via SA 315). Responses = test of controls + substantive procedures.'},
{id:'sa63',t:'sa',d:3,type:'scenario',q:'Auditor assesses CONTROL RISK as HIGH based on poor internal controls. Under SA 330, appropriate strategy:',opts:['Rely on controls','Increase substantive procedures (primarily substantive approach)','Ignore','Reduce sample size'],ans:1,exp:'SA 330: High CR means controls cannot be relied on. Auditor must adopt PRIMARILY SUBSTANTIVE approach — more extensive substantive testing, higher-reliability procedures (external confirmations, third-party evidence), larger samples.'},
{id:'sa64',t:'sa',d:3,type:'tf',q:'Fraud risk factors identified by SA 240 relate only to pressures to manipulate earnings.',ans:false,exp:'False. SA 240 fraud risk factors (fraud triangle): (i) INCENTIVES/PRESSURES (earnings targets, debt covenants), (ii) OPPORTUNITIES (weak controls, complex transactions), (iii) ATTITUDES/RATIONALIZATIONS (aggressive stance, industry ethics). All three dimensions.'},
{id:'sa65',t:'sa',d:3,type:'mcq',q:'"Risk of Material Misstatement" (RoMM) consists of:',opts:['IR + CR','IR × CR','DR × AR','RoMM = AR / DR'],ans:1,exp:'RoMM = Inherent Risk × Control Risk (both entity-driven). Audit Risk = RoMM × Detection Risk. Auditor plans for target AR by assessing IR+CR and setting appropriate DR.'},
{id:'sa66',t:'sa',d:3,type:'fill',q:'An _____ auditor is one who has established long-standing relationship with the client.',ans:['continuing','recurring','engagement continuity'],exp:'Continuing auditor: holds position over multiple years. Benefit — deeper knowledge. Risk — complacency / loss of skepticism. Partner rotation rules (Companies Act Sec 139(2)) address this for listed cos.'},
{id:'sa67',t:'sa',d:3,type:'scenario',q:'Auditor\'s working papers are requested by a regulator (e.g., NFRA investigation). Obligation:',opts:['Refuse due to confidentiality','Comply with legal/regulatory requirements; confidentiality not absolute','Show only the report','Hide work'],ans:1,exp:'Client confidentiality is a core ethical duty (Code of Ethics — ICAI), BUT not absolute. Exceptions: (i) legal/regulatory requirement, (ii) court order, (iii) NFRA/ICAI investigation, (iv) due diligence with consent. Auditor must comply when compelled by law.'},
{id:'sa68',t:'sa',d:3,type:'tf',q:'SA 720 deals with "The Auditor\'s Responsibilities relating to Other Information."',ans:true,exp:'True. SA 720 (Revised): Covers "Other Information" in annual reports (Director\'s Report, MD&A) outside FS. Auditor must read and consider for material inconsistencies with FS. Report in "Other Information" paragraph.'},
{id:'sa69',t:'sa',d:3,type:'mcq',q:'If management refuses written representation on critical matter (SA 580):',opts:['Auditor should pursue','Auditor must consider as scope limitation — possible disclaimer','Ignore','Accept oral'],ans:1,exp:'SA 580: Refusal to provide written representation when required = SCOPE LIMITATION. Auditor must (i) discuss with management, (ii) reassess integrity of management, (iii) consider consequences — possibly disclaimer (SA 705).'},
{id:'sa70',t:'sa',d:3,type:'fill',q:'SA _____ deals with "Identifying and Assessing the Risks of Material Misstatement Through Understanding the Entity and Its Environment."',ans:['315','sa 315','sa 315 (revised)'],exp:'SA 315 (revised 2021): Enhanced risk assessment procedures. Requires understanding: entity and its environment (industry, regulation), internal control, and identifying risks at assertion and FS levels.'},
{id:'sa71',t:'sa',d:3,type:'mcq',q:'The audit SAMPLING risk is:',opts:['Zero if statistical sampling used','Risk that conclusion from sample differs from the full-population conclusion','Only applicable to inventory','None of the above'],ans:1,exp:'SA 530: Sampling risk = conclusion from sample may differ from conclusion if entire population tested. Two types: (i) Alpha/Type I (wrongly conclude material misstatement — inefficiency), (ii) Beta/Type II (wrongly accept — ineffectiveness, more serious).'},
{id:'sa72',t:'sa',d:3,type:'tf',q:'Statistical sampling is always superior to non-statistical sampling.',ans:false,exp:'False. SA 530: Both methods are acceptable. Statistical provides measurable sampling risk but more complex/costly. Non-statistical relies on judgment. Choice depends on population, risk, cost-benefit. Neither inherently superior.'},
{id:'sa73',t:'sa',d:3,type:'scenario',q:'Auditor Z, during year-end audit, discovers his audit team member is a spouse of Finance Manager. Under ICAI Ethics and SA 220:',opts:['Ignore if work is correct','Withdraw member — conflict of interest / independence issue','Continue with extra oversight','Full team change'],ans:1,exp:'Independence is paramount per Code of Ethics + SA 220. Close family relationship with client\'s management = SELF-INTEREST / FAMILIARITY threat. Team member must be withdrawn immediately. Apply safeguards; document in engagement quality review.'},
{id:'sa74',t:'sa',d:3,type:'mcq',q:'The "auditor\'s expert" under SA 620 includes:',opts:['Auditor\'s own staff expert','External expert engaged by auditor','Both internal and external experts engaged BY AUDITOR','Management\'s expert'],ans:2,exp:'SA 620 "Auditor\'s Expert" = a person or firm with expertise other than accounting/auditing, used by auditor — can be INTERNAL (auditor\'s employee) or EXTERNAL (engaged by auditor). DIFFERENT from "Management\'s Expert" (engaged by management, covered under SA 500).'},
{id:'sa75',t:'sa',d:3,type:'fill',q:'Joint auditors work is governed by SA _____ .',ans:['299','sa 299'],exp:'SA 299 (Revised): Responsibilities of joint auditors. Work divided by mutual consent; each responsible for own portion, joint responsibility for common areas. Must communicate and cooperate.'},
/* ════════════════ COMPANY AUDIT & CARO (75 Qs) ════════════════ */
/* ── EASY (25) ── */
{id:'ca1',t:'caro',d:1,type:'fill',q:'CARO stands for Companies _____ Order.',ans:["auditor's report","auditor's report order",'auditor report',"auditors report"],exp:"CARO = Companies (Auditor's Report) Order, issued under Section 143(11) of Companies Act 2013."},
{id:'ca2',t:'caro',d:1,type:'mcq',q:'First auditor of a company (non-govt) is appointed by:',opts:['Members at AGM','Board within 30 days of incorporation','CG','Tribunal'],ans:1,exp:'Section 139(6): Board appoints first auditor within 30 days of incorporation. Ratified by members at first AGM.'},
{id:'ca3',t:'caro',d:1,type:'tf',q:'The statutory audit report is addressed to Board of Directors.',ans:false,exp:'False. Addressed to MEMBERS (shareholders). Auditors are elected by members and report to members.'},
{id:'ca4',t:'caro',d:1,type:'mcq',q:'Section 143(3) requires auditor to state:',opts:['Company is profitable','Information and explanations obtained','Employees are qualified','All taxes paid'],ans:1,exp:'Sec 143(3)(a): Auditor states whether he has obtained all information and explanations necessary for audit.'},
{id:'ca5',t:'caro',d:1,type:'mcq',q:'Casual vacancy in auditor (death/resignation) in non-govt company is filled by:',opts:['Central Govt','Board within 30 days; ratified by members in 3 months','Tribunal','Auditor himself'],ans:1,exp:'Sec 139(8): Casual vacancy filled by BOD within 30 days. Members ratify within 3 months at general meeting.'},
{id:'ca6',t:'caro',d:1,type:'fill',q:'Auditor\'s remuneration is fixed as per Section _____ of Companies Act.',ans:['142','section 142'],exp:'Section 142: Remuneration fixed by members in GM or in manner determined by them. For first auditor, BOD fixes.'},
{id:'ca7',t:'caro',d:1,type:'tf',q:'A person appointed as auditor must have his appointment filed with ROC in ADT-1.',ans:true,exp:'True. Form ADT-1 filed with ROC within 15 days of appointment/reappointment per Sec 139 read with Rule 4.'},
{id:'ca8',t:'caro',d:1,type:'mcq',q:'Auditor of a company must be:',opts:['Any person','Chartered Accountant in practice','Cost Accountant','Lawyer'],ans:1,exp:'Sec 141: Only Chartered Accountant (individual) or firm of CAs can be appointed as auditor of a company.'},
{id:'ca9',t:'caro',d:1,type:'fill',q:'Maximum term for a firm of auditors in a listed company is _____ consecutive years.',ans:['10','ten','two terms of 5','two 5 year terms'],exp:'Sec 139(2): Audit firm — 2 terms of 5 years (max 10 years). Individual — 1 term of 5 years. Then 5-year cooling-off.'},
{id:'ca10',t:'caro',d:1,type:'tf',q:'Section 140 deals with removal of auditor before expiry of term.',ans:true,exp:'True. Section 140: Removal requires (i) special resolution of members, (ii) prior approval of Central Govt (Regional Director). Auditor has right to be heard.'},
{id:'ca11',t:'caro',d:1,type:'mcq',q:'CARO 2020 is applicable to:',opts:['All companies','Specified companies (public, unlisted, some private)','Only listed companies','Only large companies'],ans:1,exp:'CARO 2020 applies to all companies EXCEPT: banking, insurance, Section 8, OPCs, small companies, and small private cos (paid-up ≤1cr, borrowings ≤1cr, revenue ≤10cr). Rules apply cumulative exemption.'},
{id:'ca12',t:'caro',d:1,type:'fill',q:'Under Companies Act, an auditor must not hold any _____ in the company or its subsidiary.',ans:['security','interest','shares','securities'],exp:'Sec 141(3)(d): Auditor (or relative) must not hold ANY security/interest in the company, subsidiary, holding, associate etc. Independence threat.'},
{id:'ca13',t:'caro',d:1,type:'mcq',q:'"Small company" definition for CARO exemption includes:',opts:['Paid-up ≤₹2 cr and turnover ≤₹20 cr (as per amended definition)','All private companies','Public companies','Listed companies'],ans:0,exp:'Small company (Sec 2(85), revised 2022): paid-up capital ≤₹4 crore AND turnover ≤₹40 crore. (Earlier ₹2cr/₹20cr). Private co meeting this is exempt from CARO.'},
{id:'ca14',t:'caro',d:1,type:'tf',q:'Auditors have the right to access books and accounts of the company at all times.',ans:true,exp:'True. Sec 143(1): Right to access books, accounts, vouchers of company AT ALL TIMES — whether at head office or any branch. Right also to require info/explanations.'},
{id:'ca15',t:'caro',d:1,type:'mcq',q:'Auditor\'s report must specifically state:',opts:['Opinion on true and fair view','Profitability forecast','Market share','Employee satisfaction'],ans:0,exp:'Sec 143(3)(i): Opinion on whether FS give true and fair view of state of affairs. Plus various other reporting on specific matters.'},
{id:'ca16',t:'caro',d:1,type:'fill',q:'Auditor\'s report under Section _____ of Companies Act 2013.',ans:['143','section 143'],exp:'Section 143 contains comprehensive auditor\'s powers and duties — access, inquiries, reporting obligations.'},
{id:'ca17',t:'caro',d:1,type:'tf',q:'An auditor cannot be appointed if he is indebted to the company for more than ₹5 lakh.',ans:true,exp:'True. Sec 141(3)(d)(ii): Person/firm indebted to company (incl. subsidiary, holding) > ₹5 lakh is disqualified. Prevents conflict of interest.'},
{id:'ca18',t:'caro',d:1,type:'mcq',q:'CARO 2020 clause on fixed assets requires reporting on:',opts:['Sale price only','Maintenance of proper records, physical verification, title deeds','Accounting method','Useful life'],ans:1,exp:'CARO 2020 Clause 3(i): Maintenance of property records + PPE, physical verification, title deeds of immovable property, revaluation details, disclosure of benami property proceedings.'},
{id:'ca19',t:'caro',d:1,type:'tf',q:'Auditor can simultaneously audit more than 20 companies (as individual).',ans:false,exp:'False. Section 141(3)(g): Individual auditor — max 20 companies (excluding OPC, small, dormant, private with paid-up <₹100 cr). Each partner of firm also capped at 20.'},
{id:'ca20',t:'caro',d:1,type:'fill',q:'Under Sec 139, subsequent auditors are appointed for a term of _____ years.',ans:['5','five'],exp:'Sec 139(1): Every company appoints auditor for FIVE consecutive years at AGM (held for the purpose). Ratification at every AGM was earlier required, now removed.'},
{id:'ca21',t:'caro',d:1,type:'mcq',q:'Branch auditor is appointed by:',opts:['Central Govt','Company in GM or BOD, conditions permitting','Principal auditor','ROC'],ans:1,exp:'Sec 143(8): Branch auditor appointed by company in GM if provisions of Sec 139(1) apply; otherwise by BOD. Could be same as company\'s auditor or another qualified auditor.'},
{id:'ca22',t:'caro',d:1,type:'tf',q:'An auditor can be removed for expressing unfavorable opinion.',ans:false,exp:'False. Removal for "qualifying" or giving adverse opinion is generally seen as intimidation. Special resolution + CG approval + opportunity of being heard required — protects auditor independence.'},
{id:'ca23',t:'caro',d:1,type:'mcq',q:'CARO 2020 requirement on inventory physical verification:',opts:['Daily','Monthly','At reasonable intervals by management','None'],ans:2,exp:'CARO 2020 Clause 3(ii): Whether physical verification of inventory done by management at REASONABLE INTERVALS; coverage and procedure adequacy; discrepancies of 10%+ dealt with properly.'},
{id:'ca24',t:'caro',d:1,type:'fill',q:'Auditor qualifications / disqualifications are given in Section _____ of Companies Act.',ans:['141','section 141'],exp:'Sec 141: Eligibility (CA/firm), disqualifications (body corporate, officer/employee of company, indebted > ₹5L, relative holding securities, etc.).'},
{id:'ca25',t:'caro',d:1,type:'mcq',q:'An auditor\'s report that modifies the opinion can be in form of:',opts:['Qualified','Adverse','Disclaimer','All of these'],ans:3,exp:'SA 705: Three types of modifications — Qualified ("except for"), Adverse ("do not present true and fair"), Disclaimer ("cannot express opinion").'},

/* ── MEDIUM (25) ── */
{id:'ca26',t:'caro',d:2,type:'mcq',q:'CARO 2020 does NOT apply to:',opts:['Public ltd co.','Pvt co. with paid-up ≤ ₹1cr AND borrowings ≤ ₹1cr AND revenue ≤ ₹10cr','Listed co.','Foreign co registered'],ans:1,exp:'CARO 2020 exempts: banking, insurance, Section 8, OPCs, small cos, and private cos meeting ALL three limits (paid-up ≤1cr, borrowings ≤1cr, revenue ≤10cr). All three conditions must be satisfied.'},
{id:'ca27',t:'caro',d:2,type:'tf',q:'An individual auditor can serve a listed company for one term of 5 years.',ans:true,exp:'True. Sec 139(2): Individual — max 1 term of 5 consecutive years. Firm — max 2 terms of 5 years. Cooling-off of 5 years before re-appointment. Applies to listed + specified public cos.'},
{id:'ca28',t:'caro',d:2,type:'fill',q:'Section _____ Companies Act deals with auditor rotation for specified companies.',ans:['139(2)','139 (2)','139'],exp:'Section 139(2) read with Rule 5: Mandatory rotation for listed companies, unlisted public (paid-up ≥10cr), private (paid-up ≥50cr), all companies with public borrowings ≥50cr or public deposits ≥50cr.'},
{id:'ca29',t:'caro',d:2,type:'scenario',q:'Beta Ltd (private) paid-up ₹80L, revenue ₹8cr, borrowings from bank ₹2cr. CARO 2020 applicability?',opts:['Not applicable (private)','APPLICABLE — borrowings exceed ₹1cr, fails one limb','Not applicable (revenue < 10cr)','Applicable only if listed'],ans:1,exp:'For CARO exemption, ALL THREE limits must be met cumulatively. Here borrowings ₹2cr > ₹1cr → FAILS one condition → CARO 2020 APPLIES.'},
{id:'ca30',t:'caro',d:2,type:'mcq',q:'Section 139(11) requires auditor to report under CARO:',opts:['Always','To shareholders along with main report','To AO','Only on demand'],ans:1,exp:'Sec 143(11): CARO report is part of auditor\'s report, submitted to company and filed along with AGM. Annexed to main audit report. MCA mandates via order (CARO 2020).'},
{id:'ca31',t:'caro',d:2,type:'tf',q:'Auditor is required to attend company\'s AGM.',ans:false,exp:'False. Section 146: Auditor has RIGHT to attend AGM and be heard on matters concerning him. It is NOT MANDATORY unless notified otherwise. Companies typically invite auditor for Q&A.'},
{id:'ca32',t:'caro',d:2,type:'fill',q:'Under CARO 2020, if auditor observes material weakness in internal controls, he should qualify clause under _____ .',ans:['3(iii)(c)','internal controls','ic','internal financial controls'],exp:'Internal Financial Controls (IFC) report is separately required u/s 143(3)(i) for listed cos and specified cos. CARO has its own clauses on internal controls (e.g., 3(iii)(c) on loans/investments).'},
{id:'ca33',t:'caro',d:2,type:'mcq',q:'Rotation of auditor under Sec 139(2) imposes a cooling-off period of:',opts:['2 years','3 years','5 years','None'],ans:2,exp:'After completing the maximum term (5 or 10 years), the auditor/firm cannot be re-appointed for 5 years. Prevents long-term familiarity threats.'},
{id:'ca34',t:'caro',d:2,type:'scenario',q:'Auditor resigns before expiry of term. What must be filed?',opts:['Only ADT-1','Form ADT-3 within 30 days stating reasons','Letter to shareholders','Court order'],ans:1,exp:'Sec 140(2) + Rule 8: Resigning auditor must file Form ADT-3 with ROC within 30 days stating reasons. Tech of transparency + regulatory oversight on why auditor left.'},
{id:'ca35',t:'caro',d:2,type:'tf',q:'Under CARO 2020, auditor must specifically comment on ratio-based analysis of financial health.',ans:true,exp:'True. CARO 2020 Clause 3(xix): Auditor to comment on material uncertainty on financial ratios — (current ratio, debt-equity, debt service coverage, return on equity, return on capital employed etc.). Compare with prior year, explain variations.'},
{id:'ca36',t:'caro',d:2,type:'mcq',q:'CARO 2020 has how many main clauses (approximately)?',opts:['10','15','21','40'],ans:2,exp:'CARO 2020 has 21 main clauses — covers fixed assets, inventory, loans, related parties, deposits, cost records, statutory dues, default on loans, funds application, fraud reporting, etc.'},
{id:'ca37',t:'caro',d:2,type:'fill',q:'Under CARO 2020 Clause 3(vii), statutory dues refer to PF, ESI, TDS, GST, income tax, etc. — report whether paid or _____ .',ans:['outstanding','pending','not paid','in arrears','unpaid'],exp:'CARO 2020 Clause 3(vii): Comment on regular payment of statutory dues. Any outstanding ≥6 months must be reported with amount, nature, period, and due date.'},
{id:'ca38',t:'caro',d:2,type:'scenario',q:'ABC Ltd has outstanding GST ₹50 lakh unpaid since 8 months. Auditor must:',opts:['Ignore','Report under CARO 2020 Clause 3(vii) with details','Qualify whole report','Resign'],ans:1,exp:'Clause 3(vii): Outstanding statutory dues > 6 months must be reported — amount, nature, period, due date. Not necessarily a qualification; affects Section 143(3) reporting.'},
{id:'ca39',t:'caro',d:2,type:'tf',q:'Section 143(12) mandates auditor to report fraud over ₹1 crore to Central Government.',ans:true,exp:'True. Sec 143(12): Fraud by officers/employees ≥ ₹1 crore must be reported to CG (MCA) within 60 days after obtaining auditor\'s comments. For <₹1 crore, report to Audit Committee or BOD within 2 days.'},
{id:'ca40',t:'caro',d:2,type:'mcq',q:'An auditor is prohibited from providing which of the following to his audit client (Sec 144)?',opts:['Internal audit','Tax filing assistance','Outsourced financial services','All of these'],ans:3,exp:'Sec 144: Audit firm cannot provide to the SAME client: accounting, bookkeeping, internal audit, design/implementation of IT systems, actuarial, investment banking, rendering outsourced financial services, management services. Preserves independence.'},
{id:'ca41',t:'caro',d:2,type:'fill',q:'CARO 2020 Clause 3(xi) deals with reporting of _____ within the company by officers/employees.',ans:['fraud','whistleblower','frauds'],exp:'Clause 3(xi): (a) Whether any fraud by the company OR on the company by officers/employees has been noticed/reported. (b) Details of report under Sec 143(12) filed. (c) Whether whistleblower complaints received have been considered.'},
{id:'ca42',t:'caro',d:2,type:'mcq',q:'Under Sec 139, rotation period for AUDITOR of a listed company (individual) is:',opts:['3 years','5 years','7 years','10 years'],ans:1,exp:'Individual auditor max = 1 term of 5 years. Firm max = 2 terms of 5 years (10 years). Cooling-off 5 years thereafter.'},
{id:'ca43',t:'caro',d:2,type:'scenario',q:'Delta Ltd appointed auditor Mr P on 1.4.2019 for a 5-year term. His term ends on:',opts:['31.3.2024','31.3.2025','AGM of 2024','AGM of 2025'],ans:2,exp:'Sec 139(1): Appointed for 5 consecutive years from one AGM to another. Strictly, 5 AGM term — appointed at AGM 2019, holds office till conclusion of 6th AGM (AGM 2024). So term ends at AGM in year 2024.'},
{id:'ca44',t:'caro',d:2,type:'tf',q:'Auditor remuneration for services other than audit must be separately disclosed in FS.',ans:true,exp:'True. Sec 142 + disclosure norms: Remuneration for audit and non-audit services must be disclosed separately in Notes to Accounts / MGT-7. CARO 2020 also requires disclosure.'},
{id:'ca45',t:'caro',d:2,type:'mcq',q:'Under CARO 2020, loans granted by company are reported under:',opts:['Clause 3(iii)','Clause 3(iv)','Clause 3(vii)','Clause 3(xxi)'],ans:0,exp:'Clause 3(iii): Whether company has made investments or granted loans to companies/firms/parties. Terms and conditions, repayment, overdue status, renewal, demand defaults — all to be reported.'},
{id:'ca46',t:'caro',d:2,type:'fill',q:'Under Section _____ , auditor reports on Internal Financial Controls over Financial Reporting.',ans:['143(3)(i)','143(3)i','143','143 3 i'],exp:'Sec 143(3)(i): For listed cos + specified cos (incl. some unlisted public with capital/turnover thresholds), auditor must report on IFC-FR per Rule 11. Assess design and operating effectiveness.'},
{id:'ca47',t:'caro',d:2,type:'mcq',q:'Incoming auditor must communicate with outgoing auditor before accepting appointment because of:',opts:['Professional courtesy only','Clause in ICAI Code of Ethics — professional clearance','Sec 141 requirement','Companies Act'],ans:1,exp:'ICAI Code of Ethics (Part A, Clause 8 of First Schedule): Professional clearance letter is mandatory. Incoming auditor must write to outgoing auditor to learn of any reason why he should not accept. Failure = professional misconduct.'},
{id:'ca48',t:'caro',d:2,type:'scenario',q:'Auditor discovers fraud of ₹3 crore by company officers. Reporting timeline:',opts:['Within 60 days with management response (Sec 143(12) via ADT-4)','Within 2 days','Next AGM','Don\'t report'],ans:0,exp:'Sec 143(12) + Rule 13: For fraud ≥ ₹1 crore — auditor seeks management response in 45 days, submits report to CG via ADT-4 within 60 days. For < ₹1 crore — report to Audit Committee/Board within 2 days.'},
{id:'ca49',t:'caro',d:2,type:'tf',q:'An auditor of a company can also be appointed as its internal auditor.',ans:false,exp:'False. Sec 144(b): An auditor cannot provide internal audit service to the same entity. Conflict of interest (reviewing own work). Prohibited non-audit service.'},
{id:'ca50',t:'caro',d:2,type:'mcq',q:'Auditor\'s tenure for a company where he is FIRST appointed by BOD (Sec 139(6)) is till:',opts:['5 years','End of first AGM (to be ratified/appointed by members)','Immediate revocation','3 years'],ans:1,exp:'Sec 139(6): First auditor appointed by BOD holds office TILL CONCLUSION OF FIRST AGM. Members then appoint auditor (same or different) for 5-year term.'},

/* ── HARD (25) ── */
{id:'ca51',t:'caro',d:3,type:'mcq',q:'Under CARO 2020 Clause 3(xxi), auditor must report on:',opts:['Fixed assets','Managerial remuneration','Qualifications in consolidated FS by component auditors','Inventory discrepancies'],ans:2,exp:'Clause 3(xxi): For consolidated FS — auditor must mention if there are qualifications/adverse/disclaimer remarks in CARO reports of component companies (subsidiaries, JVs, associates). Flag group-level concerns at consolidation.'},
{id:'ca52',t:'caro',d:3,type:'scenario',q:'MD of Beta Ltd borrowed ₹50 lakh from company without BOD approval. Section violated + auditor\'s action:',opts:['Sec 185 — report in CARO + consider qualification','Sec 139 — resign','Sec 142 — report ROC','No violation'],ans:0,exp:'Sec 185 prohibits direct/indirect loans to directors (limited exceptions: wholly owned subsidiaries with SR, etc.). Auditor must (i) report under CARO Clause 3(iv), (ii) evaluate materiality for qualification, (iii) consider Sec 143(12) fraud reporting if loan illegal.'},
{id:'ca53',t:'caro',d:3,type:'tf',q:'Section 143(12) fraud reporting to CG is via Form ADT-4.',ans:true,exp:'True. Rule 13 of Companies (Audit and Auditors) Rules 2014: Fraud ≥ ₹1 crore — auditor sends report to CG via Form ADT-4, within 60 days of knowledge, after obtaining management representation in 45 days.'},
{id:'ca54',t:'caro',d:3,type:'fill',q:'Under Sec _____ Companies Act, auditor is liable for MISREPRESENTATION to the tune of which amounts may be recovered from auditor.',ans:['147','section 147'],exp:'Sec 147 Punishment for Contravention: Fines on company and officers. Sec 147(3): Where auditor fails to comply with Sec 139-146 → fine and/or imprisonment. Sec 147(2) fine for auditor with fraud/intent: ₹1L-₹25L or 8 times remuneration, whichever lower.'},
{id:'ca55',t:'caro',d:3,type:'mcq',q:'Rule 11(a) under Sec 143(3) requires auditor to report on:',opts:['Pending litigations\' impact','Physical verification','Dividend','Long-term contracts'],ans:0,exp:'Rule 11: Miscellaneous matters for auditor — (a) pending litigations impact, (b) long-term contracts losses, (c) IEPF dues, (d) compliance with Audit Committee recommendations, (e) crypto dealings disclosure (added), (f) funds routing/non-related party violations, etc.'},
{id:'ca56',t:'caro',d:3,type:'tf',q:'CARO 2020 Clause 3(xi) requires auditor to comment on whistleblower complaints.',ans:true,exp:'True. Clause 3(xi)(c): Whether whistleblower complaints received during the year have been considered by the auditor — adds a layer of scrutiny. Tied to Sec 177(9-10) Companies Act — mandatory vigil mechanism.'},
{id:'ca57',t:'caro',d:3,type:'scenario',q:'Auditor observes systematic routing of funds through several layers — likely parking for improper purposes. CARO 2020 provides:',opts:['No specific clause','Clause 3(xviii) — funds routed via intermediaries','Clause 3(xvii) — cash losses','Only Sec 143(12)'],ans:1,exp:'CARO 2020 Clause 3(xviii) (approximately): Report on advances/funds received by company to be invested in/on behalf of other parties (ultimate beneficiaries), and whether company has passed on funds to other persons not disclosed. Covers layering/routing concerns (new addition to CARO).'},
{id:'ca58',t:'caro',d:3,type:'fill',q:'NFRA (National Financial Reporting Authority) is established under Section _____ of Companies Act.',ans:['132','section 132'],exp:'Sec 132: NFRA — independent regulator for auditing profession for specified companies (listed, large unlisted). Power to investigate, impose penalties, debar auditors. Replaced ICAI\'s disciplinary authority for specified cos.'},
{id:'ca59',t:'caro',d:3,type:'mcq',q:'NFRA has jurisdiction over audits of:',opts:['All companies','Listed companies and specified large unlisted/insurance/banking','Private companies only','Foreign companies'],ans:1,exp:'NFRA Rules 2018: Jurisdiction over (i) listed cos, (ii) unlisted public cos with paid-up ≥500cr, turnover ≥1000cr, or aggregate debt + outstanding loans/deposits ≥500cr (BS date), (iii) insurance, banking, electricity cos, (iv) body corporate referred by CG. Can initiate proceedings against auditors.'},
{id:'ca60',t:'caro',d:3,type:'tf',q:'NFRA can impose penalty up to ₹10 crore on an audit firm for misconduct.',ans:false,exp:'False (closer). NFRA Sec 132(4)(c): Monetary penalty on individual CA — not less than ₹1 lakh, up to 5× fees received. On firm — not less than ₹5 lakh, up to 10× fees received. Also debarment and professional sanctions. ₹10cr cap is not specified.'},
{id:'ca61',t:'caro',d:3,type:'mcq',q:'An auditor who signs audit report without proper audit procedures commits:',opts:['Civil wrong only','Professional misconduct under CA Act + offence under Sec 147 Companies Act','Breach of contract','No liability'],ans:1,exp:'Dual liability: (i) Professional misconduct under Chartered Accountants Act 1949 (Schedule II, Clause 7, 8, 9) — ICAI/NFRA disciplinary action. (ii) Criminal liability under Sec 147 Companies Act — fine + imprisonment.'},
{id:'ca62',t:'caro',d:3,type:'fill',q:'If auditor has given assurance without obtaining necessary evidence, action under CA Act Schedule _____ Part II can be taken.',ans:['ii','two','2','second'],exp:'Chartered Accountants Act 1949 — Second Schedule Part II lists "gross negligence" offences: signing reports without adequate evidence, false certification etc. Can lead to debarment, penalty, etc. by ICAI Disciplinary Committee.'},
{id:'ca63',t:'caro',d:3,type:'scenario',q:'Satyam-type scandal: Auditor failed to detect massive revenue inflation. Legal consequences:',opts:['Only professional misconduct','Criminal liability under Sec 447 Companies Act + CA Act action + NFRA penalty','Civil negligence only','CG notice only'],ans:1,exp:'Satyam-like cases attract (i) Sec 447 Companies Act (fraud punishable up to 10 years RI + fine 10x fraud amount), (ii) PMLA implications, (iii) CA Act professional misconduct, (iv) NFRA/ICAI debarment, (v) civil liability for damages, (vi) SEBI sanctions if listed. Satyam led to PwC India partners being banned for 2 years by SEBI.'},
{id:'ca64',t:'caro',d:3,type:'tf',q:'Under Sec 177, Audit Committee recommendations override the auditor.',ans:false,exp:'False. Audit Committee recommends + oversees. The auditor remains INDEPENDENT and has independent statutory duties. Committee works WITH auditor on significant matters, disagreements go to Board. Audit opinion is auditor\'s alone.'},
{id:'ca65',t:'caro',d:3,type:'mcq',q:'An auditor is liable to third parties (lenders, investors) for negligent mis-statement only if:',opts:['Never','There is "proximity" of relationship (Hedley Byrne principle)','Third party signed contract','Client demands'],ans:1,exp:'Hedley Byrne v. Heller (UK 1964) principle — auditor can be liable to THIRD PARTIES where "proximity" exists (audited report foreseeably relied on by identifiable third party). Caparo Industries v. Dickman (1990) narrowed scope — proximity requires foreseeability + sufficient relationship. Indian courts have followed similar principles.'},
{id:'ca66',t:'caro',d:3,type:'fill',q:'CARO 2020 Clause 3(xvii) requires disclosure of _____ losses by the company.',ans:['cash','cash losses','cash loss'],exp:'CARO 2020 Clause 3(xvii): Cash losses for the current year and immediately preceding year. If yes — state the amounts. Indicator of operational distress.'},
{id:'ca67',t:'caro',d:3,type:'mcq',q:'An auditor who holds equity shares in the company at appointment:',opts:['Can continue if transparent','Is disqualified u/s 141(3)(d) and must divest','Can hold <1%','Unaffected'],ans:1,exp:'Sec 141(3)(d): An auditor (or relative) holding ANY security/interest in company/subsidiary/holding/associate/subsidiary of associate is DISQUALIFIED — must dispose within 60 days of knowing, else cease to be auditor.'},
{id:'ca68',t:'caro',d:3,type:'scenario',q:'Small co. turnover ₹8 crore, paid-up ₹3 crore. CARO 2020 applicability (given current "small company" definition):',opts:['CARO applies','EXEMPT — small company (paid-up ≤₹4cr and turnover ≤₹40cr)','Partial application','Depends on debt'],ans:1,exp:'Current "Small Company" definition (2022): paid-up ≤₹4cr AND turnover ≤₹40cr. This private co. meets both — is small co. → EXEMPT from CARO 2020 irrespective of borrowings. Amendment widened small-co definition, expanding CARO exemption.'},
{id:'ca69',t:'caro',d:3,type:'tf',q:'Auditor cannot be held liable for a fraud NOT DETECTABLE through normal audit procedures.',ans:true,exp:'True. Auditor\'s duty is to exercise REASONABLE CARE AND SKILL per SAs. If fraud was sophisticated, collusive, and UNDISCOVERABLE through normal procedures, auditor is not liable. Liability arises where standard procedures WOULD have detected the fraud. Leading case: Kingston Cotton Mills (1896) — "Watchdog not bloodhound."'},
{id:'ca70',t:'caro',d:3,type:'mcq',q:'In Kingston Cotton Mills case, the principle established was:',opts:['Auditor must detect all frauds','Auditor is watchdog, not bloodhound — reasonable care expected','Absolute liability','No liability ever'],ans:1,exp:'Kingston Cotton Mills (1896, Lopes LJ): "An auditor is a watchdog, not a bloodhound." He must exercise REASONABLE care and skill; can rely on the honesty of company officials UNLESS something arouses suspicion. Modern SAs have elevated standards (professional skepticism, SA 240 fraud risk) but underlying "reasonable care" test remains.'},
{id:'ca71',t:'caro',d:3,type:'fill',q:'Under Sec 143(14), audit of government companies is conducted per CAG\'s directions / CAG supplementary audit u/s _____ .',ans:['143(6)','143 (6)','sec 143(6)'],exp:'Sec 143(5)-(7): CAG appoints statutory auditor, gives directions. CAG may conduct SUPPLEMENTARY AUDIT u/s 143(6) of government cos. Test audit u/s 143(7). Comments become part of audit report.'},
{id:'ca72',t:'caro',d:3,type:'mcq',q:'A "Secretarial Audit" u/s 204 is mandatory for:',opts:['All companies','Listed cos + specified unlisted public cos','Only private cos','Foreign cos'],ans:1,exp:'Sec 204: Secretarial audit by Practising Company Secretary mandatory for (i) Listed cos, (ii) Public cos with paid-up ≥50cr, turnover ≥250cr, or outstanding loans ≥100cr. Form MR-3. Reports on compliance with Companies Act, SEBI regs, FEMA etc.'},
{id:'ca73',t:'caro',d:3,type:'scenario',q:'Auditor\'s resignation creates uncertainty. On re-appointment to a different role (internal audit of same company), what applies?',opts:['Permitted once resigned','Prohibited by Sec 144 — cannot provide internal audit to audit client (or ex-client with cooling period considerations)','Unregulated','Only ethical issue'],ans:1,exp:'Sec 144 bars the same auditor from providing internal audit services. For ex-clients, ICAI Code of Ethics imposes COOLING-OFF — usually 2 years — before acceptance of senior management role. Conflict of interest prevention.'},
{id:'ca74',t:'caro',d:3,type:'tf',q:'Section 143(12) fraud reporting obligation applies even where fraud is committed against the company (not by it).',ans:true,exp:'True. Sec 143(12) covers fraud by officers/employees ON the company. Auditor obliged to report on any fraud they notice during the audit — whether fraud BY the company or fraud ON the company by its employees. Extended coverage.'},
{id:'ca75',t:'caro',d:3,type:'mcq',q:'Auditor\'s attendance at AGM u/s 146:',opts:['Not required','Required to be present','Right to attend and be heard on relevant matters; attendance may be required by company','Only on complaints'],ans:2,exp:'Sec 146: Auditor has the RIGHT to attend AGM, receive all notices, and be heard on matters which concern him as auditor. The Act does not mandate attendance, but practice is for auditor to attend and address shareholders\' queries. Some companies\' AoA make attendance mandatory.'},
/* ════════════════ VOUCHING & VERIFICATION (75 Qs) ════════════════ */
/* ── EASY (25) ── */
{id:'v1',t:'vouch',d:1,type:'mcq',q:'Vouching means examination of:',opts:['Physical assets','Entries with supporting documentary evidence (vouchers)','Debtors balances','Bank reconciliation'],ans:1,exp:'Vouching is the critical examination of documentary evidence (vouchers, invoices, receipts) supporting entries in the books.'},
{id:'v2',t:'vouch',d:1,type:'tf',q:'Verification is concerned only with the physical existence of assets.',ans:false,exp:'False. Verification covers EVOP — Existence, Ownership, Valuation, Presentation. Not just physical existence.'},
{id:'v3',t:'vouch',d:1,type:'fill',q:'The four aspects of asset verification are Existence, Ownership, Valuation, and _____ .',ans:['presentation','disclosure'],exp:'EVOP: E-O-V-P. Presentation means properly disclosed in FS as per applicable framework.'},
{id:'v4',t:'vouch',d:1,type:'mcq',q:'Which document is NOT required for vouching purchases?',opts:['Purchase order','Goods receipt note','Salary slip','Supplier invoice'],ans:2,exp:'Purchases: PO + GRN + supplier invoice + payment proof. Salary slip relates to payroll, not purchases.'},
{id:'v5',t:'vouch',d:1,type:'mcq',q:'Vouching is PRIMARILY used to verify:',opts:['Trial balance','Accuracy and authenticity of transactions in books','Future projections','Budget'],ans:1,exp:'Vouching confirms — is the entry in books: (i) genuine, (ii) properly authorised, (iii) correctly recorded, (iv) related to business, (v) accounted in right period.'},
{id:'v6',t:'vouch',d:1,type:'tf',q:'A voucher can be either a primary document (invoice) or a secondary one (internal memo).',ans:true,exp:'True. Primary vouchers: bills, invoices, receipts — original. Secondary vouchers: copies, internal memos, approvals. Primary preferred.'},
{id:'v7',t:'vouch',d:1,type:'fill',q:'Verification includes confirming the _____ of the asset (one aspect beyond existence).',ans:['ownership','valuation','presentation','title','rights'],exp:'Verification goes beyond just "exists" — must check the entity legally OWNS it, VALUES it correctly, PRESENTS it in accordance with framework.'},
{id:'v8',t:'vouch',d:1,type:'mcq',q:'The main purpose of vouching is to detect:',opts:['Future events','Fraud and manipulation','Inflation','Employee behaviour'],ans:1,exp:'Vouching helps detect (i) fictitious entries, (ii) unauthorised transactions, (iii) misclassifications, (iv) errors/frauds. Core to audit assurance.'},
{id:'v9',t:'vouch',d:1,type:'tf',q:'Cash purchases do not require vouching as they have no invoice.',ans:false,exp:'False. Cash purchases MUST be vouched — cash memos, bills, payment vouchers, authorisation, and entry in cash book. More scrutiny due to cash fraud risk.'},
{id:'v10',t:'vouch',d:1,type:'mcq',q:'While vouching wages, the auditor examines:',opts:['Dividend register','Wage register, muster roll, payslips, payment records','Sales register','Fixed assets'],ans:1,exp:'Payroll/wages vouching: muster roll (attendance), wage register (computation), authorisation, payment (bank transfer / signed disbursement), PF/ESI/TDS deductions.'},
{id:'v11',t:'vouch',d:1,type:'fill',q:'Verification of _____ involves confirmation from debtors and ageing analysis.',ans:['debtors','trade receivables','accounts receivable','sundry debtors'],exp:'Debtors verification: (i) subsidiary ledger reconciled with control account, (ii) external confirmations (SA 505), (iii) ageing analysis, (iv) provision for doubtful debts adequacy.'},
{id:'v12',t:'vouch',d:1,type:'mcq',q:'The starting point for vouching any entry is:',opts:['Balance sheet','Original voucher/document','Trial balance','Bank statement'],ans:1,exp:'Vouching starts from the ORIGINAL SOURCE DOCUMENT (voucher) and traces through books. Alternative: start from books and trace back to voucher — both directions used.'},
{id:'v13',t:'vouch',d:1,type:'tf',q:'Verification is normally done after vouching.',ans:true,exp:'True (generally). Sequence: Vouching (transactions) → Posting check → Trial balance check → Verification (of B/S items). Verification confirms end-of-period balances reflect reality.'},
{id:'v14',t:'vouch',d:1,type:'fill',q:'A vouching programme is documented in a _____ .',ans:['audit programme','programme','audit plan','audit program','working paper'],exp:'Audit programme = detailed listing of procedures to be performed. Vouching is incorporated as specific procedures with sample size, responsibility, and working paper reference.'},
{id:'v15',t:'vouch',d:1,type:'mcq',q:'Vouching is governed by which SA principally?',opts:['SA 200','SA 500','SA 300','SA 540'],ans:1,exp:'SA 500 Audit Evidence — underpins vouching principles. Vouching is a key means of obtaining appropriate audit evidence.'},
{id:'v16',t:'vouch',d:1,type:'tf',q:'External vouchers are more reliable than internal vouchers.',ans:true,exp:'True. SA 500 hierarchy — external evidence (bank statements, supplier invoices, customer confirmations) more reliable than internal (vouchers signed by company staff). Third-party > internal.'},
{id:'v17',t:'vouch',d:1,type:'mcq',q:'For vouching sales, which documents form the audit trail?',opts:['Only invoice','Sales order + dispatch note + invoice + receipt','Only purchase order','Inventory ledger'],ans:1,exp:'Full sales trail: customer order → sales order → dispatch/delivery note (gate pass) → sales invoice → receipt of payment / debtor entry. Auditor reconciles each link.'},
{id:'v18',t:'vouch',d:1,type:'fill',q:'Physical verification of _____ is usually conducted at year-end or just before.',ans:['inventory','stock','stocks','inventories'],exp:'Stock-take: physical count on/near year-end. Auditor attends/observes (SA 501). Count sheets reconciled with records. Cut-off procedures ensure correct period allocation.'},
{id:'v19',t:'vouch',d:1,type:'mcq',q:'Vouching of cash receipts involves examining:',opts:['Only receipts','Counterfoils, bank pay-in slips, cash book, bank statement, authorisation','Only bank slips','Sales report'],ans:1,exp:'Cash receipts: receipt counterfoil → entry in cash book → bank pay-in slip → bank credit → confirmed in bank statement. Authorisation + daily reconciliation.'},
{id:'v20',t:'vouch',d:1,type:'tf',q:'Verification of intangible assets requires legal title documents.',ans:true,exp:'True. Intangibles (patents, trademarks, copyrights): Verify registration certificates, assignments, renewal status, useful life, amortisation. Existence through legal rights.'},
{id:'v21',t:'vouch',d:1,type:'mcq',q:'The principle "teeming and lading" in cash audit relates to:',opts:['Fraud by delaying banking of receipts','Cost allocation','Budget preparation','Inventory count'],ans:0,exp:'Teeming & Lading (cash fraud): Collector delays depositing a debtor\'s cheque/cash and uses it to cover prior shortage. Detected by confirming receipt dates with debtors and bank deposit dates.'},
{id:'v22',t:'vouch',d:1,type:'fill',q:'Verification of buildings involves examining the _____ deed for ownership.',ans:['title','sale','title deed','conveyance'],exp:'Building/immovable property: Verify sale deed, title deed, mutation records, mortgage status, physical inspection, valuation reports. Title in name of company is critical.'},
{id:'v23',t:'vouch',d:1,type:'tf',q:'Vouching helps verify the accuracy of posting to ledger accounts.',ans:true,exp:'True. While vouching, auditor traces transactions from voucher → journal → ledger, checking (i) correct amount, (ii) correct account, (iii) correct side, (iv) correct period.'},
{id:'v24',t:'vouch',d:1,type:'mcq',q:'For verification of investments, the auditor obtains:',opts:['Dividend warrants','Physical share certificates OR custodial confirmation + investment register','Sales invoices','Purchase orders'],ans:1,exp:'Investment verification: (i) physical share/bond certificates for tangible; (ii) custodial/depository confirmation for dematerialised; (iii) tally with investment register; (iv) valuation basis (cost / FV / lower of cost/market).'},
{id:'v25',t:'vouch',d:1,type:'fill',q:'Verification is focused on _____ -end balances reported in the balance sheet.',ans:['period','year','period-end','year-end','balance sheet'],exp:'Vouching = transactions during period. Verification = end-of-period BALANCES appearing in B/S. Different focus; together cover FS.'},

/* ── MEDIUM (25) ── */
{id:'v26',t:'vouch',d:2,type:'mcq',q:'The strongest evidence for existence of debtors is:',opts:['Sales invoices','Debtors ledger balance','External confirmation (circularisation) — SA 505','Aged debtors report'],ans:2,exp:'SA 505 External Confirmations: Positive (request reply in all cases) or Negative (only if disagree). Direct third-party response is most reliable. Other evidences are internal.'},
{id:'v27',t:'vouch',d:2,type:'tf',q:'Cut-off procedures ensure transactions are recorded in the correct period.',ans:true,exp:'True. Cut-off especially critical for purchases, sales, inventory near year-end. Errors cause FS misstatement. Auditor examines last 5 days pre/post year-end.'},
{id:'v28',t:'vouch',d:2,type:'scenario',q:'Auditor finds cash payment vouchers self-signed by cashier without superior approval. Risk:',opts:['Overstatement of cash','Weak internal control — risk of fraud/misappropriation','Tax issue','No concern'],ans:1,exp:'Self-authorisation violates segregation of duties. Risk: cashier can pay fictitious expenses or pocket cash. Auditor: extend testing, report weakness to TCWG, consider implications for overall control risk.'},
{id:'v29',t:'vouch',d:2,type:'fill',q:'Verification of investments held with depositary can be done through _____ from DP.',ans:['confirmation','statement','demat statement','statement from dp','dp confirmation'],exp:'For demat holdings: obtain holding statement from Depository Participant (CDSL/NSDL) as of balance sheet date. Reliable third-party source.'},
{id:'v30',t:'vouch',d:2,type:'mcq',q:'Vouching of directors\' remuneration examines:',opts:['Only salary slip','Board/Shareholder resolution + Sec 197 compliance + Schedule V of Companies Act','Only bank transfer','Nothing special'],ans:1,exp:'Directors\' remuneration: (i) BR/SR resolution, (ii) Sec 197 overall limit (11% of net profit for public cos), (iii) Schedule V for inadequate profits, (iv) CG approval if applicable, (v) disclosure in FS.'},
{id:'v31',t:'vouch',d:2,type:'tf',q:'Verification includes testing the valuation basis of inventory.',ans:true,exp:'True. Verification of inventory covers valuation per AS 2 / Ind AS 2 — cost (FIFO/weighted avg, not LIFO), overhead absorption, NRV comparison, damaged/obsolete write-down.'},
{id:'v32',t:'vouch',d:2,type:'scenario',q:'Auditor verifies stock ₹25 lakh shown in B/S. Physical cost ₹22 lakh, NRV ₹20 lakh. Correct valuation:',opts:['₹25 lakh','₹22 lakh (cost)','₹20 lakh (NRV)','₹23.5 lakh avg'],ans:2,exp:'AS 2 / Ind AS 2: Inventory at LOWER of cost and NRV. Cost ₹22L; NRV ₹20L. Lower = ₹20L. Stock must be written down by ₹5L (from book ₹25L). Auditor to ensure write-down or qualify.'},
{id:'v33',t:'vouch',d:2,type:'mcq',q:'Sales vouching focuses on "occurrence" assertion. Which document is pivotal?',opts:['Sales order','Dispatch note / delivery note (proof goods actually left)','Customer feedback','Warranty card'],ans:1,exp:'Dispatch/Delivery note shows goods physically left premises — supports OCCURRENCE assertion. Invoice alone can be fabricated. Dispatch confirms real sale. Gate pass register further corroborates.'},
{id:'v34',t:'vouch',d:2,type:'fill',q:'Verification of patents and trademarks involves checking _____ certificates and renewals.',ans:['registration','legal','ownership','patent','trademark','ip'],exp:'IP verification: Registration certificate (Patent Office, Registrar of Trademarks), ownership documentation, renewal receipts, validity period, unamortised value.'},
{id:'v35',t:'vouch',d:2,type:'tf',q:'Long outstanding debtors should be separately examined during verification.',ans:true,exp:'True. Ageing analysis → debtors > 6/12 months require scrutiny for recoverability. Provision for doubtful debts adequacy. Communication with management, review of legal cases filed.'},
{id:'v36',t:'vouch',d:2,type:'mcq',q:'Vouching of rent paid examines:',opts:['Rent agreement, TDS compliance, bank payment, period mapped correctly','Only bank statement','Only rent receipt','Only agreement'],ans:0,exp:'Rent vouching: (i) rent agreement (terms, parties, amount), (ii) TDS u/s 194-I compliance, (iii) actual payment (banking), (iv) period allocation (accrual correct — prepaid/outstanding), (v) related-party check if landlord is director etc.'},
{id:'v37',t:'vouch',d:2,type:'fill',q:'Vouching of loan borrowings examines loan agreement, board/members\' resolution, _____ , and compliance with Sec 180/73.',ans:['charge','security','security creation','registration'],exp:'Loan vouching: (i) Loan agreement terms, (ii) BR/SR authorisation (Sec 180 requires SR for borrowing > paid-up + free reserves), (iii) Registration of charge (Sec 77), (iv) Secured/unsecured distinction, (v) Compliance with Sec 73 (deposits).'},
{id:'v38',t:'vouch',d:2,type:'scenario',q:'Auditor observes debtor "XYZ Ltd" outstanding ₹2 crore for 3 years. Company has no provision. Action:',opts:['Ignore','Insist on provision for doubtful debts (reality check on recoverability); if management refuses, qualify','Accept balance','Waive off'],ans:1,exp:'3-year old debtor of ₹2 crore = high doubt of recovery. Per prudence concept + AS 29 and matching principle, provision required. If management refuses despite evidence of irrecoverability — qualify per SA 705. Document evidence of communication with TCWG.'},
{id:'v39',t:'vouch',d:2,type:'mcq',q:'Vouching of bad debts written off requires:',opts:['Only entry','Board authorisation + evidence of irrecoverability (legal opinion / correspondence) + ITR treatment','Sales invoice','Employee approval'],ans:1,exp:'Bad debt write-off vouching: (i) BR authorisation, (ii) Evidence that all efforts to recover made (legal notice, follow-up), (iii) Relevant correspondence, (iv) Sec 36(1)(vii) IT Act requirements (actual write-off from books), (v) Related-party test.'},
{id:'v40',t:'vouch',d:2,type:'tf',q:'Verification of contingent liabilities involves examining legal correspondence and management representation.',ans:true,exp:'True. Contingent liabilities (AS 29): litigation, guarantees, tax disputes, claims. Auditor reviews legal letters (SA 501), minutes, claims listing, written reps from management, lawyer confirmations.'},
{id:'v41',t:'vouch',d:2,type:'mcq',q:'Vouching of prepaid expenses ensures:',opts:['Payment to right person','Correct portion relates to future period, balance matched with expense','Asset exists','Documents filed'],ans:1,exp:'Prepaid expense vouching: (i) Check payment, (ii) Compute portion relating to future period (pro-rata), (iii) Confirm balance = unused period, (iv) Expense portion charged in P&L for current period is correct. Cut-off critical.'},
{id:'v42',t:'vouch',d:2,type:'fill',q:'Verification of _____ is done by attending physical count and test counting.',ans:['inventory','stock','stocks','inventories'],exp:'SA 501: Attendance at physical inventory count is MANDATORY if inventory is material. Auditor observes procedures, test-counts high-value items, inquires about obsolete/damaged, reviews cut-off.'},
{id:'v43',t:'vouch',d:2,type:'mcq',q:'Vouching of share capital includes:',opts:['Only bank credit','Application, allotment letters, MoA, AoA, ROC filings (PAS-3, etc.), bank credit, share certificates issued','Only certificates','Only members register'],ans:1,exp:'Share capital vouching: (i) MoA/AoA, (ii) BR + SR for issue, (iii) Application + allotment register, (iv) PAS-3 return of allotment filed, (v) Bank credit for funds received, (vi) Share certificates issued within 2 months (Sec 56). For bonus/rights — separate procedures.'},
{id:'v44',t:'vouch',d:2,type:'scenario',q:'Company shows ₹10 lakh of purchases dated 31 March. Goods actually received 3 April. Cut-off treatment:',opts:['Record in March (period of invoice)','Move to April — goods not received by year-end; accruals adjusted','Split 50-50','Ignore'],ans:1,exp:'Cut-off test: Goods in transit at year-end — treatment depends on FoB terms. If risk/reward transferred at year-end (FoB shipping point → record in Mar; FoB destination → record in April). Here if goods RECEIVED 3 April with FoB destination → move to April. Audit check: examine shipping terms.'},
{id:'v45',t:'vouch',d:2,type:'tf',q:'Verification of fixed deposits with bank is done through bank confirmation letter.',ans:true,exp:'True. FD verification: direct bank confirmation (SA 505) stating balance, interest accrued, maturity, any encumbrance/lien. Reconcile with company\'s records. Physical FD certificates as secondary evidence.'},
{id:'v46',t:'vouch',d:2,type:'mcq',q:'Vouching of freight and carriage outward examines:',opts:['Freight receipts, reconciliation with goods dispatched, TDS','Only bank payment','Only freight slip','No need to verify'],ans:0,exp:'Freight vouching: (i) Freight receipts/consignment notes, (ii) Matching with dispatch records, (iii) TDS u/s 194C for transporter > ₹30,000, (iv) GST ITC on RCM for GTA services, (v) Reasonableness (rate per km/weight).'},
{id:'v47',t:'vouch',d:2,type:'fill',q:'Verification of sundry creditors includes examining purchase invoices, goods receipt, and _____ .',ans:['creditors confirmation','confirmation','external confirmation','supplier confirmation','supplier statement','circularisation'],exp:'Creditors verification: (i) Subsidiary ledger reconciled, (ii) Supplier statements reconciled, (iii) Creditor confirmations (usually NEGATIVE circularisation — reply only if disagree, per SA 505), (iv) Ageing for long-outstanding review.'},
{id:'v48',t:'vouch',d:2,type:'mcq',q:'Verification of goodwill involves:',opts:['Impairment testing under AS 28 / Ind AS 36','Market value only','Sales approach','Book value'],ans:0,exp:'Goodwill verification: (i) Origin (consideration paid > fair value of net assets at acquisition), (ii) ANNUAL impairment test (Ind AS 36) or 10-year amortisation (old AS 26) — choice of framework, (iii) Reasonable assumptions in impairment model, (iv) Presentation in B/S.'},
{id:'v49',t:'vouch',d:2,type:'scenario',q:'Verification of sale of machinery ₹10 lakh: Sale proceeds ₹8 lakh, carrying amount ₹6 lakh. Gain/loss:',opts:['Loss ₹2 lakh (₹10-₹8)','Gain ₹2 lakh (₹8-₹6) taxable / recorded in P&L','Gain ₹4 lakh','Loss ₹4 lakh'],ans:1,exp:'Sale of FA: Sale price ₹8L – Carrying amount ₹6L = Gain ₹2L. Auditor verifies: (i) Sale documents, (ii) De-recognition from FA register, (iii) Depreciation up to date of sale, (iv) Gain/loss in P&L, (v) For taxation, Section 50 block concept.'},
{id:'v50',t:'vouch',d:2,type:'tf',q:'Verification of provisions involves evaluating management\'s best estimate per SA 540.',ans:true,exp:'True. Provisions (AS 29 / Ind AS 37): Present obligation, probable outflow, reliable estimate. Auditor evaluates under SA 540 — management assumptions, methodology, adequacy, range of estimates. Disagreement can lead to audit difference.'},

/* ── HARD (25) ── */
{id:'v51',t:'vouch',d:3,type:'mcq',q:'For vouching sales, the MOST complete audit chain is:',opts:['Only invoice','Sales order + dispatch note + invoice + payment + customer acknowledgment','Only bank statement','Only goods return'],ans:1,exp:'Full chain: customer order → sales order (authorised) → dispatch/delivery note (goods sent) → sales invoice (billed) → payment/debtor entry → customer acknowledgment. Audit trail for OCCURRENCE + completeness + ACCURACY + cut-off.'},
{id:'v52',t:'vouch',d:3,type:'tf',q:'Verification of FA can be completed solely by reviewing the fixed asset register.',ans:false,exp:'False. Asset register is INTERNAL — doesn\'t prove physical existence or condition. Auditor must attend physical verification by management + selective inspection of high-value assets + check title documents.'},
{id:'v53',t:'vouch',d:3,type:'fill',q:'Verification of investments\' VALUATION requires testing for _____ as per Ind AS 109.',ans:['fair value','impairment','mark to market','ecl'],exp:'Financial instruments (Ind AS 109): Classification as amortised cost / FVOCI / FVTPL. Fair value test needed. Expected credit loss (ECL) model for impairment. Auditor verifies classification + measurement.'},
{id:'v54',t:'vouch',d:3,type:'scenario',q:'Auditor verifies company\'s land ₹5 crore. Title deed in name of director, not company (held "in trust"). Treatment:',opts:['Accept as asset','Qualify — ownership risk; insist on title transfer to company','Write off','Note in CARO'],ans:1,exp:'Title not in company\'s name = ownership risk + potential Sec 166 (director fiduciary duty) + Sec 188 (related party) issues. Not legally the company\'s asset. CARO 2020 Clause 3(i)(c) specifically requires disclosure. Serious — qualify if material; consider fraud reporting.'},
{id:'v55',t:'vouch',d:3,type:'mcq',q:'Vouching of construction contracts (long-term) uses:',opts:['Cash basis','Percentage of completion method (Ind AS 115) + cost incurred + future cost estimation','Only cost incurred','Full completion method'],ans:1,exp:'Ind AS 115 (replacing AS 7): Revenue from construction contracts over time (percentage of completion). Auditor verifies: (i) cost incurred to date, (ii) estimated total cost, (iii) percentage completion = costs incurred / total costs, (iv) revenue and profit recognition, (v) loss provisioning if foreseeable loss.'},
{id:'v56',t:'vouch',d:3,type:'tf',q:'Verification of operating lease arrangements after Ind AS 116 remains unchanged for lessees.',ans:false,exp:'False. Ind AS 116 (replacing AS 19 for Ind AS cos): ALL LEASES recorded on balance sheet by lessees — Right-of-Use asset + lease liability. No distinction between operating and finance lease for lessees (except short-term/low-value). Verification now includes discount rate, lease term, options, modifications.'},
{id:'v57',t:'vouch',d:3,type:'fill',q:'Under SA 501, auditor\'s attendance at _____ is mandatory if inventory is material.',ans:['physical inventory count','inventory count','stock-take','stock taking','physical count','physical verification'],exp:'SA 501 Special Considerations Selected Items: Attend physical count (or reconcile with appropriate alternate procedures if cannot attend). Assess management procedures, test counts, cut-off, obsolete/damaged identification. Mandatory when material.'},
{id:'v58',t:'vouch',d:3,type:'mcq',q:'Verification of FOREIGN CURRENCY LOANS requires:',opts:['Only current rate conversion','AS 11 / Ind AS 21 — closing rate monetary items, exchange differences in P&L, hedge accounting if applied','Historical rate','Market guess'],ans:1,exp:'AS 11 / Ind AS 21: Foreign monetary items at CLOSING RATE on BS date. Exchange differences in P&L. For forex loans: long-term forex monetary item treatment, hedge accounting under Ind AS 109. Auditor verifies conversion rates, exchange gain/loss, hedge effectiveness.'},
{id:'v59',t:'vouch',d:3,type:'scenario',q:'Company shows Advance to suppliers ₹5 crore outstanding 18 months. Supplier confirms no goods supplied. Auditor action:',opts:['Accept as advance','Possible fund diversion / fictitious transaction — investigate, consider fraud reporting (Sec 143(12)) and qualify','Write off','Note only'],ans:1,exp:'18-month-old advance with no goods supplied = suspicious. Possible fraud (fund diversion, related-party layering). Auditor must (i) investigate, (ii) obtain detailed explanation, (iii) consider Sec 143(12) reporting (if fraud ≥ ₹1cr), (iv) CARO 2020 Clause 3(iii) on loans/advances, (v) qualify audit report if unsatisfactory.'},
{id:'v60',t:'vouch',d:3,type:'tf',q:'Verification of deferred tax assets involves testing for future taxable income existence per Ind AS 12.',ans:true,exp:'True. AS 22 / Ind AS 12: DTA recognised only if REASONABLE / virtual certainty of future taxable profits to utilise. Auditor verifies (i) recognition basis, (ii) supporting profit projections, (iii) history of taxable profits, (iv) tax planning strategies, (v) re-assessment at year end.'},
{id:'v61',t:'vouch',d:3,type:'mcq',q:'Vouching of related-party transactions examines:',opts:['Nothing special','Arm\'s length pricing, approvals (Sec 188 + audit committee), disclosures (AS 18 / Ind AS 24)','Only board approval','Nothing is required'],ans:1,exp:'Related-party procedures (SA 550 + Sec 188 + AS 18/Ind AS 24): (i) Identify all RPs (list completeness), (ii) Confirm BR + Audit Committee approval, (iii) SR for material transactions, (iv) Arm\'s length basis test, (v) Disclosures in FS, (vi) Forms MGT-14, AOC-2.'},
{id:'v62',t:'vouch',d:3,type:'fill',q:'Verification of impairment loss on intangibles involves testing _____ (i.e., present value of future cash flows).',ans:['recoverable amount','value in use','fair value','higher of the two'],exp:'Ind AS 36 Impairment: Impairment = Carrying amount > Recoverable amount (HIGHER of Fair Value less Cost of Disposal OR Value in Use). Auditor tests CGU identification, discount rate, cash flow projections, assumption reasonableness. Highly judgmental area.'},
{id:'v63',t:'vouch',d:3,type:'scenario',q:'Auditor during stock-take observes inventory figure ₹50 crore, but several damaged and slow-moving items included. Valuation concerns?',opts:['Value at cost','Provision for damaged/obsolete items — write down to NRV per AS 2 / Ind AS 2','Sell urgently','Ignore'],ans:1,exp:'AS 2/Ind AS 2: Obsolete, damaged, slow-moving items — NRV often less than cost. Must write down. Auditor: (i) identify via ageing + physical inspection, (ii) get management estimate for NRV, (iii) verify sampling basis, (iv) test any post-BS sales for NRV evidence.'},
{id:'v64',t:'vouch',d:3,type:'tf',q:'Verification of employee benefit provisions (gratuity, leave encashment) requires actuarial valuation.',ans:true,exp:'True. AS 15 / Ind AS 19 Employee Benefits: Defined benefit plans (gratuity, pension, leave encashment beyond 12 months) require ACTUARIAL VALUATION. Auditor rely on actuary (SA 620), verify assumptions (discount rate, salary growth, attrition, mortality). Material area.'},
{id:'v65',t:'vouch',d:3,type:'mcq',q:'For vouching cash sales, key control tests:',opts:['Sequential numbering of cash memos, daily banking, independent reconciliation, segregation cashier vs recorder','Only physical cash count','Bank statement only','Sales report'],ans:0,exp:'Cash sales control: (i) Pre-numbered cash memos, gaps investigated, (ii) Daily banking (reduces theft), (iii) Independent reconciliation of sales + banking, (iv) Segregation between cashier and accounting staff, (v) Till count surprise by supervisor, (vi) Cash register/POS records tallied.'},
{id:'v66',t:'vouch',d:3,type:'fill',q:'Vouching of contingent liabilities includes review of Board Minutes, Legal Opinion, and _____ .',ans:['management representation','written representation','bank guarantees','written rep','mrl'],exp:'Contingent liability vouching: (i) Board minutes for pending litigations/guarantees, (ii) Legal opinion from lawyer (SA 501), (iii) Written representations from management, (iv) Guarantees register review, (v) Taxation dispute register, (vi) AS 29 / Ind AS 37 disclosure adequacy.'},
{id:'v67',t:'vouch',d:3,type:'scenario',q:'During stock-take, auditor finds stock shown in books at ₹30 lakh higher than physical. Management explains as "stocks at supplier\'s godown." Auditor:',opts:['Accept explanation','Seek corroboration: (i) supplier confirmation, (ii) GRN evidence, (iii) inspect if possible, (iv) consider qualification if unverifiable','Write off difference','Ignore'],ans:1,exp:'Stock in transit or at third-party location = suspicious if material. Auditor applies professional skepticism (SA 200). Seek (i) supplier confirmation SA 505, (ii) goods transport evidence, (iii) GRN/pending receipt, (iv) physical inspection if feasible. If unverifiable, consider qualification or disclaimer.'},
{id:'v68',t:'vouch',d:3,type:'tf',q:'Verification of ESOP grants requires fair value measurement at grant date per Ind AS 102.',ans:true,exp:'True. Ind AS 102 Share-Based Payment (replaces SEBI Guidance): Equity-settled awards — fair value at grant date, expense over vesting period. Auditor verifies (i) grant date, (ii) fair value calculation (Black-Scholes), (iii) vesting conditions, (iv) expense recognition schedule, (v) treasury/share capital impact on exercise.'},
{id:'v69',t:'vouch',d:3,type:'mcq',q:'Verification of BANK BALANCES requires:',opts:['Only passbook','Bank confirmation letter + reconciliation between company book and bank statement + outstanding items verification','Only statement','Cash book only'],ans:1,exp:'Bank verification: (i) Direct bank confirmation SA 505 (all accounts, balances, FDs, loans, guarantees, restrictions), (ii) Bank Reconciliation Statement — reconcile company book to bank statement, (iii) Test outstanding cheques / deposits, (iv) Post-year-end clearance, (v) Unpresented cheques over 6 months (stale) adjusted.'},
{id:'v70',t:'vouch',d:3,type:'fill',q:'Verification of _____ (intangible) involves testing fair value allocation and amortisation in a business combination.',ans:['goodwill','intangibles','intangible assets','brand','purchased intangible'],exp:'Business combinations (Ind AS 103): Purchase price allocation to identifiable intangibles (brand, customer relationships, technology) at fair value. Residual = goodwill. Auditor verifies valuer competence, allocation methodology, amortisation (or annual impairment for goodwill).'},
{id:'v71',t:'vouch',d:3,type:'mcq',q:'Vouching of "sales returns" requires examining:',opts:['Only credit note','Customer return note, credit note, stock re-addition, reason for return, authorisation','Only inventory','Not needed'],ans:1,exp:'Sales return vouching: (i) Customer return note, (ii) Goods re-addition to stock (reconciles inventory), (iii) Credit note issued (authorised), (iv) Reason for return (quality issue vs pricing), (v) Impact on sales/receivables, (vi) GST credit note requirements, (vii) Cut-off (return period vs books).'},
{id:'v72',t:'vouch',d:3,type:'tf',q:'Verification of share premium includes testing utilisation per Section 52 (only specified purposes).',ans:true,exp:'True. Sec 52 Companies Act 2013: Securities premium can be used only for (i) bonus issue, (ii) writing off preliminary expenses, (iii) share issue expenses/commission, (iv) buyback, (v) premium on redemption of pref shares/debentures. Auditor verifies utilisation is within permitted uses.'},
{id:'v73',t:'vouch',d:3,type:'scenario',q:'Company has ₹2 crore in "Sundry Creditors" for 5 years unchanged. Supplier confirmation: "No balance." Auditor:',opts:['Ignore','Investigate — possible ficticious liability / write-back avoidance; consider fraud','Release to P&L','Note in CARO'],ans:1,exp:'Static stale creditor balance with no acknowledgment = likely fictitious (no real liability) or requires write-back to P&L. Possible motive: evade income recognition. Auditor investigates origin, trail, reconciliation. If unexplained: (i) insist write-back, (ii) consider Sec 41(1) IT Act income, (iii) possible fraud indicators SA 240.'},
{id:'v74',t:'vouch',d:3,type:'mcq',q:'Verification of PROVISIONS differs from CONTINGENT LIABILITIES mainly because:',opts:['Provisions are certain liabilities with reliable estimate; contingent = uncertain/possible obligation','Same thing','Based on size','Only tax matter'],ans:0,exp:'AS 29 / Ind AS 37: Provision = present obligation, probable outflow, reliable estimate — RECOGNISED in books. Contingent liability = possible OR probable but not reliably estimable — DISCLOSED in notes only. Auditor verifies classification + measurement rigour.'},
{id:'v75',t:'vouch',d:3,type:'fill',q:'Verification of _____ (e.g., bank guarantees, LCs issued) requires bank confirmations and review of contingent liability register.',ans:['off-balance sheet','contingent liabilities','guarantees','off balance sheet','obs items','bank guarantees'],exp:'Off-B/S items: Bank guarantees, letters of credit, performance bonds, derivatives, operating leases (pre Ind AS 116). Auditor verifies via (i) bank confirmation SA 505, (ii) contingent liability register, (iii) disclosure adequacy, (iv) quantification, (v) board authorisation.'},
/* ════════════════ AUDIT REPORT & OPINION (75 Qs) ════════════════ */
/* ── EASY (25) ── */
{id:'ar1',t:'rep',d:1,type:'mcq',q:'An Unmodified Opinion means:',opts:['No audit done','FS give true and fair view in all material respects','Minor errors corrected','Access restricted'],ans:1,exp:'Unmodified (clean) Opinion under SA 700: FS are fairly presented per applicable framework, free from material misstatement.'},
{id:'ar2',t:'rep',d:1,type:'fill',q:'An audit opinion expressed as "except for" is called a _____ opinion.',ans:['qualified','qualified opinion'],exp:'Qualified Opinion: material but NOT PERVASIVE issue. Auditor agrees with everything except specified items.'},
{id:'ar3',t:'rep',d:1,type:'tf',q:'Adverse Opinion is more serious than Disclaimer of Opinion.',ans:false,exp:'Both are serious. Adverse = misstatements material + pervasive. Disclaimer = scope limitation so severe auditor cannot opine at all. Different nature, both equally grave.'},
{id:'ar4',t:'rep',d:1,type:'mcq',q:'Disclaimer of Opinion is issued when:',opts:['Misstatements are material + pervasive','Scope limitation so severe no opinion possible','Only minor errors','Fraud detected'],ans:1,exp:'SA 705: Disclaimer when unable to obtain sufficient appropriate audit evidence — scope limitation pervasive → no opinion.'},
{id:'ar5',t:'rep',d:1,type:'fill',q:'SA _____ deals with "Forming an Opinion and Reporting on Financial Statements".',ans:['700','sa 700'],exp:'SA 700: Auditor\'s obligation to form opinion and issue Independent Auditor\'s Report — format + contents.'},
{id:'ar6',t:'rep',d:1,type:'tf',q:'Emphasis of Matter (EoM) paragraph modifies the opinion.',ans:false,exp:'False. EoM (SA 706) draws attention to matter already PROPERLY DISCLOSED in FS. Does NOT modify opinion.'},
{id:'ar7',t:'rep',d:1,type:'mcq',q:'SA 705 deals with:',opts:['Modifications to the Opinion','KAM','Other Information','Going Concern'],ans:0,exp:'SA 705: Modifications to the Opinion — covers qualified, adverse, disclaimer. Sets out when each is used.'},
{id:'ar8',t:'rep',d:1,type:'fill',q:'KAM stands for Key _____ Matters.',ans:['audit','auditor'],exp:'KAM = Key Audit Matters. SA 701. Matters of most significance in auditor\'s professional judgment.'},
{id:'ar9',t:'rep',d:1,type:'mcq',q:'The auditor\'s opinion is expressed in which paragraph of the report?',opts:['Introduction','Opinion Paragraph (usually first)','Other Matter','Closure'],ans:1,exp:'SA 700: Opinion paragraph FIRST in audit report (post-SA 700 Revised). Followed by Basis for Opinion, then other sections.'},
{id:'ar10',t:'rep',d:1,type:'tf',q:'Audit report is dated on or before the date FS are approved by directors.',ans:false,exp:'False. Audit report date must be ON OR AFTER the date management approves/signs FS (SA 700). Otherwise auditor has no final FS to opine on.'},
{id:'ar11',t:'rep',d:1,type:'mcq',q:'"Except for" is used in:',opts:['Unmodified','Qualified','Adverse','Disclaimer'],ans:1,exp:'Qualified Opinion uses "except for" — indicating specific items on which auditor has reservations, rest is fine.'},
{id:'ar12',t:'rep',d:1,type:'fill',q:'Under SA 700, the audit report must state whether FS comply with applicable _____ framework.',ans:['financial reporting','reporting','accounting','frf'],exp:'Applicable Financial Reporting Framework: Companies Act (AS/Ind AS), IFRS, etc. Auditor opines on compliance.'},
{id:'ar13',t:'rep',d:1,type:'mcq',q:'Auditor\'s responsibility in "Basis for Opinion" paragraph is to:',opts:['Describe reason for opinion including independence and conduct of audit per SAs','Explain company business','Profit analysis','Tax advice'],ans:0,exp:'Basis for Opinion: states audit conducted per SAs, auditor is independent per Code of Ethics, sufficient evidence obtained. Always accompanies opinion paragraph.'},
{id:'ar14',t:'rep',d:1,type:'tf',q:'An auditor must communicate with those charged with governance before finalizing report.',ans:true,exp:'True. SA 260: Communication with TCWG (board/audit committee) on significant findings, difficulties, disagreements, and matters requiring attention. Usually via management letter / meeting.'},
{id:'ar15',t:'rep',d:1,type:'mcq',q:'The audit report is signed by:',opts:['Auditor in his official capacity','Company directors','Shareholders','CEO'],ans:0,exp:'Audit report signed by auditor (partner if firm) with firm registration number, UDIN, membership number, place, date. Signed in official capacity.'},
{id:'ar16',t:'rep',d:1,type:'fill',q:'UDIN is a _____ digit unique identifier required on audit reports.',ans:['18','eighteen'],exp:'UDIN = Unique Document Identification Number — 18-digit code. Generated at www.udin.icai.org, mandatory for auditor\'s signed documents (audit reports, certifications, attestations).'},
{id:'ar17',t:'rep',d:1,type:'tf',q:'"Going Concern" is addressed in a separate paragraph of the audit report.',ans:true,exp:'True. SA 570 (revised): Material uncertainty about going concern triggers separate section "Material Uncertainty Related to Going Concern" in audit report. Required for adequate user awareness.'},
{id:'ar18',t:'rep',d:1,type:'mcq',q:'An Unmodified Opinion may still include which optional paragraph?',opts:['Emphasis of Matter','Adverse','Disclaimer','None'],ans:0,exp:'EoM or Other Matter paragraphs can be included with UNMODIFIED opinion. They do not modify the opinion — just draw attention.'},
{id:'ar19',t:'rep',d:1,type:'fill',q:'Modified Opinion includes Qualified, Adverse, and _____ of Opinion.',ans:['disclaimer','disclaimer of opinion'],exp:'Three types of Modified Opinion (SA 705): Qualified, Adverse, Disclaimer. Choice depends on materiality and pervasiveness.'},
{id:'ar20',t:'rep',d:1,type:'mcq',q:'If auditor issues Qualified Opinion, the basis is explained in:',opts:['Opinion paragraph','Basis for Qualified Opinion paragraph','Separate financial statement','Management letter only'],ans:1,exp:'SA 705: "Basis for [Qualified/Adverse/Disclaimer of] Opinion" paragraph immediately after the opinion paragraph. Specifies the matter causing modification + quantification.'},
{id:'ar21',t:'rep',d:1,type:'tf',q:'Auditor\'s report must specifically refer to Companies Act 2013 requirements in India.',ans:true,exp:'True. Indian audit reports reference Sec 143(3), Sec 143(11) (CARO), Sec 143(3)(i) (IFC for listed), Rule 11 matters, etc. Legal compliance reporting.'},
{id:'ar22',t:'rep',d:1,type:'mcq',q:'Adverse Opinion is issued when misstatements are:',opts:['Immaterial','Material but not pervasive','Material AND pervasive','Only hypothetical'],ans:2,exp:'SA 705: Adverse Opinion = misstatements both MATERIAL and PERVASIVE. Auditor concludes FS do NOT give a true and fair view.'},
{id:'ar23',t:'rep',d:1,type:'fill',q:'Disclaimer is issued when auditor is _____ to obtain sufficient appropriate audit evidence.',ans:['unable','not able'],exp:'Disclaimer: Scope limitation so pervasive auditor cannot obtain evidence basis for any opinion. Disclaims opinion formally.'},
{id:'ar24',t:'rep',d:1,type:'mcq',q:'The auditor\'s report is usually addressed to:',opts:['Board','Members (Shareholders)','CEO','CA Institute'],ans:1,exp:'Auditor\'s report addressed to MEMBERS/SHAREHOLDERS. Auditors are elected by members (Sec 139). They report up to those who appointed them.'},
{id:'ar25',t:'rep',d:1,type:'tf',q:'A "clean" audit report is the same as Unmodified Opinion.',ans:true,exp:'True. "Clean" is informal for Unmodified Opinion under SA 700. All FS items free from material misstatement and comply with framework.'},
