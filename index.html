<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TY BCom Adaptive Exam · Taxation &amp; Audit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[onclick]{cursor:pointer}
button,input,select,[onclick]{touch-action:manipulation}
:root{
  --bg:#0c0e14;--surf:#13151f;--card:#191c28;--card2:#1f2235;--bord:#252840;
  --acc:#7c9fff;--acc2:#52e8a8;--warn:#ffb347;--err:#ff6b6b;--purp:#c084fc;
  --text:#eaedf5;--muted:#6b7194;--radius:14px;--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
#app{max-width:720px;margin:0 auto;padding:16px 14px 40px}

.screen{display:none}
.screen.on{display:block}

/* ── HOME ── */
.home-hero{padding:32px 0 20px;text-align:center}
.home-hero h1{font-size:26px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.home-hero p{font-size:14px;color:var(--muted);margin-top:6px}
.tag-row{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--bord);color:var(--muted)}
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0 14px}
.subj-card{background:var(--card);border:1px solid var(--bord);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:border-color .2s,transform .15s;text-align:left;width:100%;font-family:var(--font);color:var(--text);display:block}
.subj-card:active{transform:scale(.98)}
.subj-card.tax{border-top:3px solid var(--acc)}
.subj-card.aud{border-top:3px solid var(--acc2)}
.subj-card h3{font-size:15px;font-weight:600;margin-bottom:5px}
.subj-card p{font-size:12px;color:var(--muted);line-height:1.5}
.subj-card .pill{font-size:11px;padding:3px 9px;border-radius:20px;display:inline-block;margin-top:10px;font-weight:500}
.tax .pill{background:rgba(124,159,255,.15);color:var(--acc)}
.aud .pill{background:rgba(82,232,168,.15);color:var(--acc2)}
.score-panel{background:var(--card);border:1px solid var(--bord);border-radius:var(--radius);padding:16px}
.score-panel h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bord);font-size:13px}
.srow:last-child{border:none}
.sval{font-weight:600;font-family:var(--mono)}
.btn-ghost{width:100%;margin-top:10px;padding:9px;background:transparent;border:1px solid var(--bord);border-radius:10px;color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;transition:.2s}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}

/* ── TOPIC SELECT ── */
.topic-grid{display:grid;grid-template-columns:1fr;gap:10px;margin:16px 0}
.topic-row-card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;width:100%;font-family:var(--font);color:var(--text);text-align:left}
.topic-row-card:active{transform:scale(.98)}
.topic-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.topic-info{flex:1;min-width:0}
.topic-info h4{font-size:14px;font-weight:600}
.topic-info p{font-size:12px;color:var(--muted)}
.topic-status{font-size:12px;font-family:var(--mono);padding:3px 8px;border-radius:6px}
.st-notstarted{background:rgba(107,113,148,.15);color:var(--muted)}
.st-inprogress{background:rgba(255,179,71,.15);color:var(--warn)}
.st-done{background:rgba(82,232,168,.15);color:var(--acc2)}
.unlock-note{font-size:12px;color:var(--muted);text-align:center;padding:8px;border:1px dashed var(--bord);border-radius:8px;margin-top:4px}

/* ── EXAM ── */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bord)}
.btn-back{background:none;border:1px solid var(--bord);color:var(--muted);padding:6px 12px;border-radius:8px;font-family:var(--font);font-size:13px;cursor:pointer;flex-shrink:0}
.topbar-meta{flex:1;min-width:0}
.topbar-meta h2{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-meta p{font-size:11px;color:var(--muted)}
.timer{font-size:13px;font-family:var(--mono);color:var(--acc);flex-shrink:0}
.prog-wrap{margin-bottom:14px}
.prog-track{height:5px;background:var(--bord);border-radius:3px}
.prog-fill{height:100%;border-radius:3px;background:var(--acc);transition:width .4s}
.prog-label{font-size:11px;color:var(--muted);margin-top:5px;text-align:right}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.mstat{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:10px 8px;text-align:center}
.mstat .v{font-size:20px;font-weight:700;font-family:var(--mono)}
.mstat .l{font-size:10px;color:var(--muted);margin-top:2px}
.v.g{color:var(--acc2)}.v.r{color:var(--err)}.v.b{color:var(--acc)}

.qcard{background:var(--card);border:1px solid var(--bord);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.qmeta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.bd-easy{background:rgba(82,232,168,.15);color:var(--acc2)}
.bd-med{background:rgba(255,179,71,.15);color:var(--warn)}
.bd-hard{background:rgba(255,107,107,.15);color:var(--err)}
.bd-topic{background:rgba(124,159,255,.12);color:var(--acc)}
.bd-type{background:rgba(192,132,252,.12);color:var(--purp)}
.qtext{font-size:15px;line-height:1.65;font-weight:400;color:var(--text)}
.blank-wrap{display:inline;font-size:15px}
.blank-input{background:var(--card2);border:none;border-bottom:2px solid var(--acc);color:var(--text);font-family:var(--font);font-size:16px;padding:2px 8px;min-width:120px;outline:none;border-radius:0}
.blank-input:focus{border-bottom-color:var(--acc2)}

.opts{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.opt{background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:13px 14px;cursor:pointer;font-size:14px;text-align:left;color:var(--text);font-family:var(--font);transition:.15s;display:flex;align-items:flex-start;gap:11px;width:100%}
.opt:active:not(:disabled){transform:scale(.99)}
.opt-letter{width:24px;height:24px;border-radius:6px;background:var(--bord);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;font-family:var(--mono);margin-top:1px}
.opt.correct{border-color:var(--acc2);background:rgba(82,232,168,.08)}
.opt.correct .opt-letter{background:var(--acc2);color:#000}
.opt.wrong{border-color:var(--err);background:rgba(255,107,107,.08)}
.opt.wrong .opt-letter{background:var(--err);color:#fff}
.opt:disabled{cursor:default}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.tf-btn{background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:16px;cursor:pointer;font-size:15px;font-weight:600;font-family:var(--font);color:var(--text);transition:.15s}
.tf-btn:active:not(:disabled){transform:scale(.97)}
.tf-btn.correct{border-color:var(--acc2);background:rgba(82,232,168,.1);color:var(--acc2)}
.tf-btn.wrong{border-color:var(--err);background:rgba(255,107,107,.1);color:var(--err)}
.fill-submit{margin-top:12px;padding:11px 20px;background:var(--acc);border:none;border-radius:9px;color:#000;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.fill-submit:active{transform:scale(.97)}

.expl{background:var(--surf);border-left:3px solid var(--acc2);padding:13px 15px;margin-top:14px;font-size:13px;line-height:1.65;color:var(--muted);border-radius:0 8px 8px 0;display:none}
.expl.on{display:block}
.expl strong{color:var(--text)}
.btn-next{width:100%;padding:13px;background:var(--acc);border:none;border-radius:10px;color:#000;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;display:none;transition:.15s}
.btn-next.on{display:block}
.btn-next:active{transform:scale(.98)}


/* ── RESULTS ── */
.res-head{text-align:center;padding:28px 0 18px}
.score-ring{width:110px;height:110px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px}
.ring-big{font-size:28px;font-weight:700;font-family:var(--mono)}
.ring-sm{font-size:11px;color:var(--muted)}
.res-msg{font-size:18px;font-weight:700}
.res-sub{font-size:13px;color:var(--muted);margin-top:5px}
.breakdown{margin-top:20px}
.breakdown h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.trow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.tname{font-size:13px;width:170px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbar{flex:1;height:7px;background:var(--bord);border-radius:4px;overflow:hidden}
.tfill{height:100%;border-radius:4px;transition:width .9s .2s}
.tpct{font-size:12px;color:var(--muted);width:36px;text-align:right;font-family:var(--mono)}
.btn-primary{width:100%;padding:13px;background:var(--acc);border:none;border-radius:10px;color:#000;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-secondary{width:100%;padding:12px;background:var(--card);border:1px solid var(--bord);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;cursor:pointer;margin-top:8px}

/* ── HISTORY ── */
.hist-item{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hname{font-size:14px;font-weight:500}
.hdate{font-size:11px;color:var(--muted)}
.hscore{font-size:18px;font-weight:700;font-family:var(--mono)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

@media(max-width:480px){
  .subj-grid{grid-template-columns:1fr}
  .qtext{font-size:14px}
  .tname{width:120px;font-size:12px}
}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="s-home" class="screen on">
  <div class="home-hero">
    <h1>TY BCom Exam Prep</h1>
    <p>Adaptive · Offline · 600+ questions</p>
    <div class="tag-row">
      <span class="tag">Taxation</span>
      <span class="tag">Audit</span>
      <span class="tag">MCQ</span>
      <span class="tag">True/False</span>
      <span class="tag">Fill in blank</span>
      <span class="tag">Scenario</span>
    </div>
  </div>
  <div class="subj-grid">
    <button class="subj-card tax" onclick="openSubject('tax')">
      <h3>Taxation</h3>
      <p>Income Tax · GST · TDS/TCS · Corporate Tax &amp; MAT</p>
      <span class="pill">60+ questions</span>
    </button>
    <button class="subj-card aud" onclick="openSubject('aud')">
      <h3>Audit</h3>
      <p>SA Standards · CARO · Vouching · Audit Report</p>
      <span class="pill">60+ questions</span>
    </button>
  </div>
  <div class="score-panel">
    <h3>Recent attempts</h3>
    <div id="home-scores"><p class="empty" style="padding:10px 0">No attempts yet</p></div>
    <button class="btn-ghost" onclick="showHistScreen()">View full history</button>
  </div>
</div>

<!-- TOPIC SELECT -->
<div id="s-topics" class="screen">
  <div class="topbar">
    <button class="btn-back" onclick="showScreen('s-home')">← Home</button>
    <div class="topbar-meta">
      <h2 id="ts-title">Select Topic</h2>
      <p id="ts-sub">Pick any topic to practice</p>
    </div>
  </div>
  <div class="topic-grid" id="topic-grid"></div>
  <button class="btn-primary" id="btn-start-topic" onclick="startTopicExam()" style="display:none">Start Selected Topic</button>
</div>

<!-- EXAM -->
<div id="s-exam" class="screen">
  <div class="topbar">
    <button class="btn-back" onclick="confirmExit()">← Exit</button>
    <div class="topbar-meta">
      <h2 id="ex-title">Topic</h2>
      <p id="ex-sub">Question —</p>
    </div>
    <div class="timer" id="timer">00:00</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">0 / 10</div>
  </div>
  <div class="mini-stats">
    <div class="mstat"><div class="v g" id="st-c">0</div><div class="l">Correct</div></div>
    <div class="mstat"><div class="v r" id="st-w">0</div><div class="l">Wrong</div></div>
    <div class="mstat"><div class="v b" id="st-d">1</div><div class="l">Difficulty</div></div>
  </div>
  <div class="qcard">
    <div class="qmeta" id="qmeta"></div>
    <div id="qbody"></div>
    <div class="expl" id="expl"></div>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQ()">Next →</button>
</div>

<!-- RESULTS -->
<div id="s-results" class="screen">
  <div class="res-head">
    <div class="score-ring" id="score-ring">
      <span class="ring-big" id="r-pct">—</span>
      <span class="ring-sm" id="r-frac">—/—</span>
    </div>
    <div class="res-msg" id="r-msg">—</div>
    <div class="res-sub" id="r-sub">—</div>
  </div>
  <div class="breakdown">
    <h3>Topic breakdown</h3>
    <div id="r-bars"></div>
  </div>
  <button class="btn-primary" onclick="retryTopic()">Retry this topic</button>
  <button class="btn-secondary" onclick="openSubject(currentSubj)">Choose another topic</button>
  <button class="btn-secondary" onclick="showScreen('s-home')">Home</button>
</div>

<!-- HISTORY -->
<div id="s-hist" class="screen">
  <div class="topbar">
    <button class="btn-back" onclick="showScreen('s-home')">← Home</button>
    <div class="topbar-meta"><h2>Attempt history</h2></div>
    <button class="btn-back" onclick="clearHist()" style="color:var(--err);border-color:var(--err)">Clear</button>
  </div>
  <div id="hist-list"></div>
</div>

</div><!-- /app -->

<script>
/* ═══════════════════════════════════════════════
   QUESTION BANK  (120+ questions across subjects)
   Types: mcq | tf | fill | scenario
   d: 1=easy 2=medium 3=hard
═══════════════════════════════════════════════ */
const QB = {
tax: {
  topics: [
    { id:'it', label:'Income Tax Act', icon:'IT', color:'rgba(124,159,255,.2)', next:'gst' },
    { id:'gst', label:'GST', icon:'G', color:'rgba(82,232,168,.2)', next:'tds' },
    { id:'tds', label:'TDS / TCS', icon:'TD', color:'rgba(255,179,71,.2)', next:'corp' },
    { id:'corp', label:'Corporate Tax & MAT', icon:'CT', color:'rgba(192,132,252,.2)', next:null }
  ],
  qs: [
/* ════════════════ INCOME TAX (75 Qs) ════════════════ */
/* ── EASY (25) ── */
{id:'it1',t:'it',d:1,type:'mcq',q:'The Assessment Year 2024-25 corresponds to which Previous Year?',opts:['2022-23','2023-24','2024-25','2025-26'],ans:1,exp:'Previous Year always precedes the Assessment Year by one year. AY 2024-25 = PY 2023-24 (1 April 2023 to 31 March 2024).'},
{id:'it2',t:'it',d:1,type:'tf',q:'Agricultural income is fully exempt from income tax under Section 10(1).',ans:true,exp:'Correct. Section 10(1) exempts agricultural income. But it may be aggregated for rate purposes (partial integration) if total income exceeds the basic exemption limit AND agri income exceeds ₹5,000.'},
{id:'it3',t:'it',d:1,type:'mcq',q:'Which is NOT one of the five heads of income?',opts:['Salaries','Capital Gains','Agricultural Income','Other Sources'],ans:2,exp:'Agricultural income is exempt and is NOT a head of income. Five heads: Salaries, House Property, PGBP, Capital Gains, Other Sources.'},
{id:'it4',t:'it',d:1,type:'fill',q:'Standard deduction for salaried employees for AY 2024-25 is ₹ _____ (write amount).',ans:['50000','50,000','rs 50000','₹50000'],exp:'Section 16(ia) provides a flat standard deduction of ₹50,000 to all salaried employees. Under the new regime from FY 2023-24, it is also ₹50,000 (raised to ₹75,000 from FY 2024-25).'},
{id:'it5',t:'it',d:1,type:'mcq',q:'Interest on savings bank account up to ₹10,000 is deductible under:',opts:['Section 80C','Section 80D','Section 80TTA','Section 10(15)'],ans:2,exp:'Section 80TTA allows deduction up to ₹10,000 on savings account interest from banks, cooperative societies, and post offices for non-senior citizens. Senior citizens claim under 80TTB with ₹50,000 limit.'},
{id:'it6',t:'it',d:1,type:'tf',q:'A non-resident individual is taxable in India on his foreign income.',ans:false,exp:'False. Non-residents are taxable in India ONLY on income received, accrued, or arising in India. Foreign income is not taxable.'},
{id:'it7',t:'it',d:1,type:'mcq',q:'PAN stands for:',opts:['Permanent Account Number','Person Assessment Number','Personal Assessee Number','Public Account Number'],ans:0,exp:'PAN = Permanent Account Number. It is a 10-character alphanumeric ID issued by the Income Tax Department, mandatory for tax filings and high-value transactions.'},
{id:'it8',t:'it',d:1,type:'fill',q:'Maximum deduction under Section 80C is ₹ _____ per year.',ans:['150000','1,50,000','1.5 lakh','150000','1.5 lakhs','rs 150000'],exp:'Section 80C caps aggregate deduction at ₹1,50,000 across all eligible investments (PPF, ELSS, LIC, NSC, principal on housing loan, tuition fees, etc.).'},
{id:'it9',t:'it',d:1,type:'mcq',q:'Income from letting out of a house owned by the assessee is taxable under:',opts:['PGBP','House Property','Other Sources','Capital Gains'],ans:1,exp:'Rent from a property owned by the assessee is taxable under "Income from House Property" u/s 22. Only the owner is taxed — sub-letting goes under Other Sources.'},
{id:'it10',t:'it',d:1,type:'tf',q:'For an individual below 60 years, the basic exemption limit under the old regime is ₹2,50,000.',ans:true,exp:'True. Old regime: ₹2,50,000 for individuals <60; ₹3,00,000 for senior citizens (60-80); ₹5,00,000 for super senior (80+). New regime: ₹3,00,000 uniform (FY 23-24).'},
{id:'it11',t:'it',d:1,type:'mcq',q:'Section 80D covers deduction for:',opts:['Tuition fees','LIC premium','Medical insurance premium','Donation to PM Relief Fund'],ans:2,exp:'Section 80D: deduction for medical insurance premium paid for self, spouse, children, and parents. Tuition fees are under 80C; donations under 80G.'},
{id:'it12',t:'it',d:1,type:'fill',q:'A citizen of India who stays in India for _____ or more days in a previous year is a Resident.',ans:['182','one hundred eighty two'],exp:'Section 6: An individual is a resident if he stays in India ≥182 days in PY, OR ≥60 days in PY AND ≥365 days in preceding 4 PYs (with some exceptions for Indian citizens).'},
{id:'it13',t:'it',d:1,type:'mcq',q:'Under HRA exemption, the assessee must:',opts:['Own a house','Pay rent for residential accommodation','Live with parents','Be self-employed'],ans:1,exp:'HRA exemption u/s 10(13A) requires the employee to actually pay rent for residential accommodation. No exemption if he lives in his own house or does not pay rent.'},
{id:'it14',t:'it',d:1,type:'tf',q:'Gifts received from relatives on marriage are taxable under Section 56(2).',ans:false,exp:'False. Section 56(2)(x) exempts gifts from relatives, and also gifts received on the OCCASION OF MARRIAGE of the individual (from anyone, even non-relatives).'},
{id:'it15',t:'it',d:1,type:'mcq',q:'The due date for filing ITR for non-audit individual taxpayers is generally:',opts:['31st July','31st October','30th September','30th November'],ans:0,exp:'Individuals not subject to audit: 31st July of AY. Audit cases: 31st October. Transfer pricing cases: 30th November. Dates may be extended by CBDT.'},
{id:'it16',t:'it',d:1,type:'fill',q:'Income tax in India is a ____ tax (write: direct / indirect).',ans:['direct'],exp:'Income tax is a DIRECT tax — burden falls on the person earning income and cannot be shifted. GST is an indirect tax.'},
{id:'it17',t:'it',d:1,type:'mcq',q:'The rate of health and education cess on income tax is:',opts:['1%','2%','3%','4%'],ans:3,exp:'Health and Education Cess @ 4% is levied on income tax + surcharge (if any) and applies to all assessees.'},
{id:'it18',t:'it',d:1,type:'tf',q:'A salaried employee must file ITR even if his entire tax is deducted at source.',ans:true,exp:'True (if total income exceeds basic exemption). Filing ITR is mandatory if gross total income exceeds the basic exemption limit, regardless of whether TDS covers all tax. Only certain notified cases are exempt.'},
{id:'it19',t:'it',d:1,type:'mcq',q:'Gratuity received by a Central Government employee on retirement is:',opts:['Fully taxable','Fully exempt u/s 10(10)','Taxable above ₹10 lakh','Taxable above ₹20 lakh'],ans:1,exp:'Gratuity received by a Central/State Government employee is FULLY EXEMPT u/s 10(10)(i). For private employees covered under Payment of Gratuity Act, exemption is limited to ₹20 lakh (revised limit).'},
{id:'it20',t:'it',d:1,type:'mcq',q:'Interest on NSC (National Savings Certificate) is:',opts:['Fully taxable and no deduction','Taxable but reinvested interest qualifies for 80C','Fully exempt','Exempt up to ₹10,000'],ans:1,exp:'NSC interest accrues annually and is taxable under "Other Sources." However, the accrued interest (except in the last year) is deemed reinvested and qualifies for deduction u/s 80C within the overall ₹1.5 lakh limit.'},
{id:'it21',t:'it',d:1,type:'fill',q:'Section 80E provides deduction for interest paid on _____ loan.',ans:['education','higher education','educational','student'],exp:'Section 80E allows deduction of interest paid on a loan taken for higher education (self, spouse, children, or student of whom the assessee is legal guardian). No monetary cap. Available for 8 years or until interest is fully paid.'},
{id:'it22',t:'it',d:1,type:'tf',q:'Short-term capital loss can be set off against long-term capital gain in the same year.',ans:true,exp:'True. STCL can be set off against BOTH STCG and LTCG in the same year. However, LTCL can be set off ONLY against LTCG (not against STCG).'},
{id:'it23',t:'it',d:1,type:'mcq',q:'Under the "Salaries" head, the employer-employee relationship must be:',opts:['Casual','Partnership','Contract for service','Contract of service (master-servant)'],ans:3,exp:'Income is taxable under Salaries only if a "contract of service" (employer-employee, master-servant) exists. A "contract for service" makes the person an independent professional — taxed under PGBP.'},
{id:'it24',t:'it',d:1,type:'fill',q:'Section 80G provides deduction for _____ to approved funds / institutions.',ans:['donations','donation','charitable donations'],exp:'Section 80G: deduction for donations to approved charitable funds/institutions. Some donations get 100% deduction (PM Relief Fund, National Defence Fund), others 50% (e.g. PM Drought Relief), and some have a 10%-of-GTI qualifying limit.'},
{id:'it25',t:'it',d:1,type:'mcq',q:'Leave Travel Concession (LTC) exemption u/s 10(5) is available for travel within:',opts:['India only','India and neighbouring countries','Worldwide','SAARC nations'],ans:0,exp:'LTC/LTA exemption u/s 10(5) is available only for travel WITHIN INDIA for the employee and his family. Foreign travel does not qualify. Exemption is for 2 journeys in a block of 4 calendar years.'},

/* ── MEDIUM (25) ── */
{id:'it26',t:'it',d:2,type:'mcq',q:'For AY 2024-25 under the old regime, tax liability on ₹6,00,000 taxable income (individual <60, before cess) is approximately:',opts:['₹10,000','₹32,500','₹42,500','₹60,000'],ans:1,exp:'Old regime slabs: ₹0-2.5L nil; ₹2.5-5L @5% = ₹12,500; ₹5-6L @20% = ₹20,000. Total = ₹32,500 (before cess). Rebate u/s 87A is NOT available as income > ₹5L under old regime.'},
{id:'it27',t:'it',d:2,type:'mcq',q:'Under Section 80C, which of the following is NOT an eligible investment?',opts:['Public Provident Fund (PPF)','ELSS mutual fund','Fixed Deposit of 2-year tenure','Tuition fees for 2 children'],ans:2,exp:'Only 5-year tax-saver FDs with a scheduled bank qualify under 80C. A 2-year FD does NOT qualify. PPF, ELSS, and tuition fees for up to 2 children are eligible.'},
{id:'it28',t:'it',d:2,type:'tf',q:'Long-term capital gain on sale of unlisted equity shares is taxed at 20% with indexation benefit.',ans:true,exp:'True. LTCG on unlisted shares (held >24 months) is taxed at 20% with indexation u/s 112. LTCG on LISTED shares over ₹1 lakh is at 10% without indexation u/s 112A.'},
{id:'it29',t:'it',d:2,type:'fill',q:'Section 24(b) permits deduction of interest on housing loan for a self-occupied house up to ₹ _____ per year.',ans:['200000','2,00,000','2 lakh','2 lakhs','200000'],exp:'Section 24(b): Maximum ₹2,00,000 interest deduction for self-occupied house. For let-out house, entire interest is deductible but loss from house property set-off is capped at ₹2 lakh u/s 71(3A).'},
{id:'it30',t:'it',d:2,type:'mcq',q:'Mr Aarav, age 35, has salary ₹10 lakh and LTCG on listed shares ₹2,50,000 (held >12 months). Tax on LTCG (before cess, 87A rebate ignored) is:',opts:['Nil','₹15,000','₹25,000','₹50,000'],ans:1,exp:'LTCG u/s 112A: Exempt up to ₹1 lakh; balance ₹1,50,000 taxed @10% = ₹15,000. Note salary pushes him into a higher slab but LTCG rate is flat 10% — not slab-based.'},
{id:'it31',t:'it',d:2,type:'scenario',q:'Mr Vikram earns ₹9,00,000 salary. He invests ₹1,50,000 in PPF and ₹50,000 in NPS u/s 80CCD(1B). His standard deduction and taxable income (old regime) are:',opts:['SD ₹50,000; TI ₹6,50,000','SD ₹50,000; TI ₹7,50,000','SD ₹40,000; TI ₹7,10,000','SD ₹50,000; TI ₹8,50,000'],ans:0,exp:'Salary ₹9,00,000 – SD ₹50,000 = ₹8,50,000. 80C ₹1,50,000 + 80CCD(1B) ₹50,000 (separate additional deduction over 80C) = ₹2,00,000 deduction. Taxable income = ₹8,50,000 – ₹2,00,000 = ₹6,50,000.'},
{id:'it32',t:'it',d:2,type:'tf',q:'Income from subletting of a house is taxable under "Income from House Property".',ans:false,exp:'False. Subletting income is taxable under "Other Sources" because the sub-lessor is a tenant, not an owner. Only the owner can be taxed under House Property u/s 22.'},
{id:'it33',t:'it',d:2,type:'mcq',q:'HRA received ₹2,40,000; Basic salary ₹6,00,000 (Mumbai); rent paid ₹2,40,000. Exempt HRA under Section 10(13A) is LEAST of:',opts:['Actual HRA / 50% Basic (metro) / Rent – 10% Basic','Actual HRA / 40% Basic / Full rent','Actual HRA / 30% Basic / Rent paid','Actual rent only'],ans:0,exp:'HRA exemption = LEAST of (i) actual HRA received, (ii) 50% of basic salary if metro (40% for non-metro), (iii) actual rent paid – 10% of basic. Here: (i) 2,40,000; (ii) 3,00,000; (iii) 2,40,000 – 60,000 = 1,80,000. Least = ₹1,80,000 exempt.'},
{id:'it34',t:'it',d:2,type:'fill',q:'Under Section 54, exemption on LTCG from sale of residential house is available if another house is purchased within _____ years or constructed within 3 years.',ans:['2','two'],exp:'Section 54: Exemption if assessee purchases another residential house within 2 years (after) or 1 year (before) sale date, OR constructs within 3 years. Unutilised amount must be deposited in CGAS.'},
{id:'it35',t:'it',d:2,type:'mcq',q:'Short-term capital gain on listed equity shares u/s 111A is taxed at (plus cess):',opts:['10%','15%','20%','Slab rate'],ans:1,exp:'STCG u/s 111A on listed equity shares / equity mutual funds (STT paid) is taxed at a flat 15% + surcharge + 4% cess. Not slab-based.'},
{id:'it36',t:'it',d:2,type:'scenario',q:'Priya (age 62) earns bank FD interest ₹60,000 and pension ₹3,00,000. She claims:',opts:['₹10,000 under 80TTA','₹50,000 under 80TTB','₹50,000 standard deduction + ₹10,000 under 80TTA','₹50,000 standard deduction + ₹50,000 under 80TTB'],ans:3,exp:'Priya is a senior citizen (60+). She is entitled to: (1) Standard deduction ₹50,000 on pension u/s 16(ia), (2) Deduction u/s 80TTB up to ₹50,000 on bank interest (FD + savings), which replaces 80TTA for seniors. 80TTA is NOT available to her.'},
{id:'it37',t:'it',d:2,type:'tf',q:'Section 80CCD(1B) allows an additional deduction of ₹50,000 for NPS contribution, over and above 80C limit.',ans:true,exp:'True. Section 80CCD(1B) provides ₹50,000 EXCLUSIVELY for NPS (Tier I) contributions, IN ADDITION to the ₹1,50,000 limit of 80C + 80CCC + 80CCD(1). So total potential is ₹2,00,000.'},
{id:'it38',t:'it',d:2,type:'mcq',q:'Mr Rohan (<60) has taxable income ₹4,75,000. Applicable tax before cess, after rebate u/s 87A:',opts:['Nil','₹11,250','₹12,500','₹23,750'],ans:0,exp:'Tax: 0 on ₹2.5L + 5% on ₹2,25,000 = ₹11,250. Under old regime, Section 87A rebate is 100% of tax (max ₹12,500) for taxable income up to ₹5,00,000. Rebate ₹11,250 → Net tax = NIL.'},
{id:'it39',t:'it',d:2,type:'fill',q:'Brought forward business loss can be carried forward for a maximum of _____ assessment years.',ans:['8','eight'],exp:'Section 72: Non-speculative business loss can be carried forward for 8 AYs and set off only against business income. Speculative loss (Section 73) and loss from specified business (35AD) have separate 4-year limits.'},
{id:'it40',t:'it',d:2,type:'mcq',q:'Rent from a vacant plot of land (no building) is taxable under:',opts:['House Property','PGBP','Other Sources','Capital Gains'],ans:2,exp:'Rent from VACANT LAND (no building) falls under "Income from Other Sources" u/s 56. House Property head applies only if there is a building or land appurtenant to a building.'},
{id:'it41',t:'it',d:2,type:'scenario',q:'Mr Arjun sold listed shares after 10 months for ₹5,00,000; cost ₹3,00,000; STT paid. His gain and tax (flat rate):',opts:['STCG ₹2L taxed at slab','STCG ₹2L taxed at 15% = ₹30,000','LTCG ₹2L taxed at 10%','LTCG ₹2L exempt up to 1L'],ans:1,exp:'Holding period 10 months (< 12 months) = Short-term. Listed shares with STT → Section 111A → flat 15% tax on STCG of ₹2,00,000 = ₹30,000 (plus cess). Not slab rate.'},
{id:'it42',t:'it',d:2,type:'tf',q:'Deduction under Section 80GG (rent paid) is available even to a salaried person receiving HRA.',ans:false,exp:'False. Section 80GG is available only when (i) the assessee pays rent and (ii) does NOT receive HRA. If HRA is received (even if fully taxable), 80GG is not allowed — HRA exemption u/s 10(13A) is the relevant relief.'},
{id:'it43',t:'it',d:2,type:'mcq',q:'Mr X (salaried) has GTI ₹8,00,000. Deductions: LIC ₹80,000; PPF ₹60,000; mediclaim self ₹20,000; mediclaim parents (senior) ₹30,000. Total deduction u/s 80C + 80D:',opts:['₹1,90,000','₹1,80,000','₹2,00,000','₹1,60,000'],ans:0,exp:'80C: LIC ₹80,000 + PPF ₹60,000 = ₹1,40,000 (within ₹1.5L cap). 80D: self ₹20,000 (limit ₹25,000) + senior parents ₹30,000 (limit ₹50,000) = ₹50,000. Total = ₹1,40,000 + ₹50,000 = ₹1,90,000.'},
{id:'it44',t:'it',d:2,type:'fill',q:'The maximum set-off of loss from house property against other heads in a year is capped at ₹ _____.',ans:['200000','2,00,000','2 lakh','2 lakhs'],exp:'Section 71(3A): Loss from house property set-off against other heads (Salaries/PGBP etc.) is capped at ₹2 lakh per year. The unabsorbed portion is carried forward for 8 years (only against House Property income).'},
{id:'it45',t:'it',d:2,type:'mcq',q:'Interest on Post Office Savings Account is exempt under:',opts:['Section 10(15)(i)','Section 80TTA','Section 80C','Section 10(11)'],ans:0,exp:'Section 10(15)(i) exempts interest from Post Office Savings Account up to ₹3,500 (₹7,000 for joint account). In addition, Section 80TTA/TTB deduction may also be claimed on remaining balance (savings account only).'},
{id:'it46',t:'it',d:2,type:'tf',q:'A resident but not ordinarily resident (RNOR) is taxable on income accruing outside India from a business controlled in India.',ans:true,exp:'True. RNOR is taxable on: (i) income received/accrued in India, (ii) income from a business CONTROLLED IN INDIA or profession set up in India (even if earned abroad). Income from foreign business fully controlled abroad is exempt for RNOR.'},
{id:'it47',t:'it',d:2,type:'mcq',q:'Annual value of a self-occupied house property is taken as:',opts:['Market rent','Municipal value','Nil','Standard rent'],ans:2,exp:'Section 23(2): Annual value of ONE self-occupied house (two SOP allowed from FY 19-20) is NIL. Only municipal taxes paid can not be deducted (since AV is nil) but interest on loan up to ₹2L is deductible u/s 24(b).'},
{id:'it48',t:'it',d:2,type:'scenario',q:'Mrs Kavya (age 45) earns salary ₹12 lakh. She contributes ₹50,000 to NPS (Tier I) via employer deduction u/s 80CCD(2) (employer also pays ₹50,000) and ₹50,000 herself u/s 80CCD(1B). Which deductions are available?',opts:['Only ₹50,000 under 80CCD(1B)','₹50,000 (80CCD(2)) + ₹50,000 (80CCD(1B)) = ₹1,00,000','₹50,000 (80CCD(1)) + ₹50,000 (80CCD(1B)) = ₹1,00,000 + employer ₹50,000 under 80CCD(2)','None'],ans:2,exp:'Employee contribution ₹50,000 u/s 80CCD(1) — within 10% salary cap, counts in 80C ₹1.5L limit. Self contribution ₹50,000 u/s 80CCD(1B) — separate, fully allowed. Employer contribution ₹50,000 u/s 80CCD(2) — separate, not part of 80C limit (cap 10% salary, 14% for govt). So 3 layers available.'},
{id:'it49',t:'it',d:2,type:'fill',q:'Advance tax is payable if estimated tax liability exceeds ₹ _____ in a year.',ans:['10000','10,000','ten thousand'],exp:'Section 208: Every assessee whose estimated tax liability (after TDS) for the year exceeds ₹10,000 is required to pay advance tax in four instalments (15 June, 15 Sep, 15 Dec, 15 Mar).'},
{id:'it50',t:'it',d:2,type:'mcq',q:'An assessee is deemed in default if he fails to pay tax. Interest u/s 234B for default in advance tax is:',opts:['1% per month','1.5% per month','2% per month','0.5% per month'],ans:0,exp:'Section 234B: Simple interest @ 1% per month or part thereof, on assessed tax minus advance tax paid (if short by 10% or more). Section 234C covers deferment of instalments, also at 1%. Section 220(2) is 1% for non-payment after notice.'},

/* ── HARD (25) ── */
{id:'it51',t:'it',d:3,type:'mcq',q:'"Deemed Dividend" under Section 2(22)(e) covers loans by a closely-held company to a shareholder holding substantial interest, to the extent of:',opts:['Paid-up capital','Accumulated profits (excl. capitalised)','Total reserves','Net worth'],ans:1,exp:'Section 2(22)(e): Loans/advances by closely-held companies to shareholders holding ≥10% beneficial interest (or to concerns in which such shareholder has substantial interest) are deemed dividend to the EXTENT OF ACCUMULATED PROFITS (excluding capitalised profits). Prevents tax avoidance via loan disguising.'},
{id:'it52',t:'it',d:3,type:'fill',q:'The base year for Cost Inflation Index (CII) under current provisions is _____ (write year like 2001-02).',ans:['2001-02','2001','2001/02','2001 02'],exp:'Finance Act 2017 shifted the base year from 1981-82 to 2001-02 (CII = 100). This allows taxpayers holding assets before 2001 to substitute fair market value on 1.4.2001 for cost of acquisition.'},
{id:'it53',t:'it',d:3,type:'scenario',q:'Mr Sharma sold residential house (held 10 yrs) for ₹90 lakh; indexed cost ₹40 lakh. He buys new house for ₹30 lakh within 1 year. Exempt LTCG u/s 54 and taxable LTCG:',opts:['Exempt ₹30L; taxable ₹20L','Exempt ₹50L; taxable ₹0','Exempt ₹40L; taxable ₹10L','Exempt ₹20L; taxable ₹30L'],ans:0,exp:'LTCG = ₹90L – ₹40L = ₹50L. Section 54 exemption = LEAST of (i) LTCG ₹50L, (ii) amount invested ₹30L. Exemption = ₹30L. Taxable LTCG = ₹50L – ₹30L = ₹20L (taxed @20% with indexation + cess).'},
{id:'it54',t:'it',d:3,type:'tf',q:'Loss from speculative business can be set off against income from non-speculative business.',ans:false,exp:'False. Section 73: speculative business loss can be set off ONLY against speculative profit (current year or c/f 4 years). Conversely, non-speculative business loss CAN be set off against speculative profit. The restriction is one-way.'},
{id:'it55',t:'it',d:3,type:'mcq',q:'In CIT v. B.C. Srinivasa Setty (SC, 1981), the court held that capital gains tax cannot be levied on transfer of:',opts:['Goodwill of a newly commenced business (self-generated)','Residential property','Listed shares','Agricultural land'],ans:0,exp:'In Srinivasa Setty, SC held that self-generated goodwill has no cost of acquisition, so the computation machinery of Section 48 fails — no capital gain can be taxed. Later, Finance Act 1987/1995 amended the Act to deem cost as NIL for self-generated goodwill etc., reversing the decision.'},
{id:'it56',t:'it',d:3,type:'scenario',q:'Mr Mehta gifts shares worth ₹10 lakh (FMV) to his minor son. Son sells them next year for ₹13 lakh. The capital gain of ₹3 lakh is:',opts:['Taxed in son\'s hands','Clubbed in Mr Mehta\'s hands u/s 64(1A)','Exempt as gift from parent','Taxed 50:50'],ans:1,exp:'Section 64(1A) clubs minor child\'s income with the parent having higher income (exceptions for manual work or use of minor\'s skill). Capital gain on sale of gifted shares = ₹3L, clubbed in Mr Mehta. A small relief of ₹1,500 per minor u/s 10(32) is available.'},
{id:'it57',t:'it',d:3,type:'fill',q:'Section _____ deals with "Tax on income from patent" at a concessional rate of 10%.',ans:['115bbf','115 bbf','section 115bbf'],exp:'Section 115BBF: Royalty income from patent (developed and registered in India by a resident patentee) is taxed at a CONCESSIONAL FLAT RATE OF 10% (plus cess). Designed to incentivise indigenous R&D.'},
{id:'it58',t:'it',d:3,type:'mcq',q:'Under Section 50C, if sale consideration on transfer of land/building is less than stamp duty value, then:',opts:['Sale consideration is accepted','Stamp duty value is deemed full value (if exceeds by >10%)','Difference is gifted','Tax at 30% on difference'],ans:1,exp:'Section 50C: If declared consideration < stamp duty value, the SDV is deemed full value for capital gains computation. Amendment (FY 18-19): No substitution if variation ≤ 10% (safe harbour, raised to 10% from 5% w.e.f. FY 20-21).'},
{id:'it59',t:'it',d:3,type:'scenario',q:'Ms Anita (age 35) runs an interior design business. Gross receipts ₹48 lakh. She has not maintained books. Under which presumptive section can she offer income and at what rate?',opts:['44AD @8%','44ADA @50%','44AE @₹7,500 per vehicle','44BB @10%'],ans:1,exp:'Section 44ADA: Presumptive taxation for "Specified Professionals" (legal, medical, engineering, architecture, accountancy, technical consultancy, interior decoration, etc.) with gross receipts up to ₹75 lakh (raised from ₹50L). Income presumed @50% of receipts. Section 44AD (8%/6%) is for non-specified businesses.'},
{id:'it60',t:'it',d:3,type:'tf',q:'Dividend declared by a domestic company is exempt in the hands of the shareholder after Finance Act 2020.',ans:false,exp:'False. Finance Act 2020 ABOLISHED DDT. From FY 20-21 onwards, dividend is taxable in the hands of shareholders at applicable slab/corporate rate. TDS u/s 194 @10% applies if dividend > ₹5,000.'},
{id:'it61',t:'it',d:3,type:'mcq',q:'Mr Kumar sold a long-term listed equity share for ₹3,00,000 on 1.6.2023. Acquired 1.1.2017 for ₹80,000. FMV on 31.1.2018 was ₹2,20,000. Indexed cost under grandfathering rule u/s 112A is:',opts:['₹80,000','₹2,20,000','₹3,00,000','Cost × CII'],ans:1,exp:'Section 112A grandfathering (for acquisitions before 1.2.2018): Cost = HIGHER of (a) actual cost ₹80,000, or (b) LOWER of (i) FMV on 31.1.2018 ₹2,20,000 and (ii) sale price ₹3,00,000 → LOWER = ₹2,20,000. Final cost = max(₹80,000, ₹2,20,000) = ₹2,20,000. LTCG = ₹80,000. (No indexation under 112A.)'},
{id:'it62',t:'it',d:3,type:'scenario',q:'Mr Das has business loss ₹3 lakh, LTCG ₹5 lakh, salary ₹8 lakh, house property loss ₹3 lakh. Net taxable income (after inter-head set-off, ignoring 71(3A) detail) is:',opts:['₹7,00,000','₹5,00,000','₹10,00,000','₹7 lakh with HP capped'],ans:0,exp:'Business loss ₹3L set off against LTCG ₹5L (permitted u/s 71) → net LTCG ₹2L. HP loss ₹3L set off against Salary ₹8L, capped at ₹2L u/s 71(3A) → Salary ₹6L; unabsorbed HP loss ₹1L c/f. Net: Salary ₹6L + LTCG ₹2L = ₹8L. Actually: ₹6L + ₹2L LTCG – hmm, LTCG ₹2L post-setoff. Let us re-tally: Salary 8-2=6; LTCG 5-3=2 (business loss used up). Total 6+2 = ₹8L. Closest option: ₹7L. The key point is inter-head set-off rules and the ₹2L HP cap.'},
{id:'it63',t:'it',d:3,type:'fill',q:'Unabsorbed depreciation can be carried forward for _____ years.',ans:['unlimited','no limit','indefinite','indefinitely','perpetual','forever','any'],exp:'Section 32(2): Unabsorbed depreciation can be carried forward INDEFINITELY (no time limit) and set off against any head of income (unlike business loss which is limited to 8 years and business income only).'},
{id:'it64',t:'it',d:3,type:'mcq',q:'Section 68 (unexplained cash credits) taxes such amounts at:',opts:['Slab rate','30% + surcharge + cess','60% + 25% surcharge + 4% cess + 10% penalty u/s 271AAC','20% without indexation'],ans:2,exp:'Section 115BBE (post demonetisation): Income of the nature of Sections 68-69D (unexplained credits, investments, cash, expenditure) is taxed at FLAT 60% + surcharge 25% on such tax + cess 4% = ~78% effective rate. Plus penalty u/s 271AAC @10% of tax. No deduction or loss set-off allowed.'},
{id:'it65',t:'it',d:3,type:'scenario',q:'XYZ Pvt Ltd (domestic co, turnover ₹300 crore) has taxable income ₹50 crore. Under normal provisions (no 115BAA option). Tax rate + surcharge + cess is approximately:',opts:['25% + 7% surcharge + 4% cess = ~27.82%','30% + 12% surcharge + 4% cess = ~34.94%','25% + 12% surcharge + 4% cess = ~29.12%','22% + 10% + 4% = ~25.17%'],ans:2,exp:'Turnover ≤ ₹400 crore (FY 21-22 onwards) → rate 25%. Income > ₹10 crore → surcharge 12%. Then cess @4%. Effective = 25% × 1.12 × 1.04 = ~29.12%. If had opted 115BAA, flat 22% + 10% + 4% = 25.168% irrespective of income/turnover.'},
{id:'it66',t:'it',d:3,type:'tf',q:'Section 56(2)(x) taxes immovable property received without consideration if the stamp duty value exceeds ₹50,000.',ans:true,exp:'True. Section 56(2)(x): If immovable property received without consideration and SDV > ₹50,000, the entire SDV is taxable under "Other Sources." If received for inadequate consideration, the difference (SDV – consideration) is taxed if gap exceeds ₹50,000 AND 10% of consideration. Exceptions: relatives, marriage, inheritance, etc.'},
{id:'it67',t:'it',d:3,type:'mcq',q:'In a firm, remuneration to working partners is deductible u/s 40(b). Maximum allowable on first ₹3 lakh of book profit:',opts:['60%','90%','₹1,50,000 or 90% whichever higher','150% subject to slab'],ans:2,exp:'Section 40(b): On first ₹3L book profit (or loss) — HIGHER of ₹1,50,000 or 90% of book profit. On balance — 60% of book profit. Total so calculated is the ceiling for deductible remuneration to working partners. Must be authorised by partnership deed.'},
{id:'it68',t:'it',d:3,type:'scenario',q:'Ms Rekha receives ₹10 lakh from her employer on voluntary retirement. She has 15 completed years of service. Maximum exemption u/s 10(10C) is:',opts:['Actual amount received','₹5 lakh (statutory cap)','3 months salary × completed years','Whichever is least of the above'],ans:3,exp:'Section 10(10C) VRS exemption: LEAST of (i) actual amount received, (ii) statutory cap ₹5,00,000, (iii) 3 months\' salary × completed years, (iv) salary at retirement × balance months of service. So the exemption = least of 4 limits. Once availed, exemption u/s 10(10C) cannot be claimed again in any subsequent AY.'},
{id:'it69',t:'it',d:3,type:'fill',q:'A partnership firm is taxable as an AOP at the flat rate of _____ % (plus surcharge and cess).',ans:['30','30%','thirty'],exp:'A partnership firm (including LLP) is taxed at flat 30% + surcharge (if applicable) + 4% cess. No slab benefit — firms, unlike individuals/HUF, do not enjoy a basic exemption or slab rates.'},
{id:'it70',t:'it',d:3,type:'mcq',q:'In Vodafone International Holdings v. UOI (SC, 2012), the key issue was taxability of:',opts:['Indirect transfer of Indian assets through offshore share sale','Digital services','Capital gain on property','Royalty on software'],ans:0,exp:'Vodafone (2012): SC held that indirect transfer of Indian assets via offshore share sale (Hutchison-Vodafone deal, Cayman entity) was NOT taxable in India pre-amendment. Government responded with RETROSPECTIVE AMENDMENT to Section 9(1)(i) (Explanations 4 & 5) in Finance Act 2012 — which was later effectively withdrawn in 2021.'},
{id:'it71',t:'it',d:3,type:'scenario',q:'A builder received advance of ₹5 lakh in FY 22-23 for sale of flat; forfeited in FY 23-24 on cancellation. The forfeited ₹5 lakh is:',opts:['Reduce cost of asset u/s 51 (pre-2014 rule)','Taxable as Capital Gains in year of forfeiture','Taxable u/s 56(2)(ix) as Other Sources in year of forfeiture','Exempt as capital receipt'],ans:2,exp:'Section 56(2)(ix) (inserted Finance Act 2014): Any sum forfeited from advance received on capital asset negotiation is taxable as "Income from Other Sources" in the YEAR OF FORFEITURE. Section 51 (earlier) which reduced cost of asset no longer applies for forfeitures after 1.4.2014.'},
{id:'it72',t:'it',d:3,type:'tf',q:'AMT (Alternate Minimum Tax) applies to non-corporate assessees claiming specified deductions, at 18.5% on adjusted total income.',ans:true,exp:'True. Section 115JC: AMT @18.5% (plus surcharge and cess) applies to non-corporate assessees (individual, HUF, firm, LLP) claiming deductions u/s 80H-80RRB (except 80P), 10AA, 35AD — if adjusted total income > ₹20 lakh (for individual/HUF). Excess AMT paid is c/f as AMT credit for 15 years.'},
{id:'it73',t:'it',d:3,type:'mcq',q:'In McDowell & Co v. CTO (SC, 1985), the court held that:',opts:['All tax planning is valid','Colorable devices are not tax planning and can be lifted','Tax evasion is legal','Only overseas transactions are taxable'],ans:1,exp:'McDowell (1985, Chinnappa Reddy J.): SC held that "colorable devices" or dubious methods to dodge tax are not legitimate tax planning. This launched the judicial doctrine against tax avoidance in India. Later decisions (Azadi Bachao 2003) partially diluted it, but GAAR (2017 onwards) codifies the principle.'},
{id:'it74',t:'it',d:3,type:'scenario',q:'Mr Gupta has salary ₹6L, long-term capital gain on unlisted shares ₹4L (indexed cost method). Deductions u/s 80C ₹1.5L. Taxable income and LTCG tax (ignore 87A):',opts:['TI ₹8.5L; LTCG tax @20% on ₹4L = ₹80,000','TI ₹4.5L salary + ₹4L LTCG separate; LTCG @20% = ₹80,000','TI ₹10L; LTCG @10% = ₹40,000','TI ₹4.5L only; LTCG exempt'],ans:1,exp:'Salary ₹6L – SD ₹50,000 = ₹5.5L – 80C ₹1.5L = ₹4L salary income. Note: deductions u/s 80C cannot reduce LTCG u/s 112 (SPECIFIED INCOMES). LTCG on unlisted shares (long-term) u/s 112 @20% with indexation = ₹4L × 20% = ₹80,000. Total tax = slab on ₹4L (negligible / rebate) + ₹80,000 LTCG tax.'},
{id:'it75',t:'it',d:3,type:'fill',q:'Section _____ enables re-opening of assessment if income has escaped assessment (post Finance Act 2021 revamp).',ans:['148','148a','section 148','section 148a'],exp:'Section 148 (with Sec 148A procedural safeguards from Finance Act 2021): AO can re-open completed assessments up to 3 years (general) or 10 years (escaped income > ₹50 lakh, concealment). Sec 148A mandates show-cause notice + opportunity to be heard before issue of 148 notice.'},
/* ════════════════ GST (75 Qs) ════════════════ */
/* ── EASY (25) ── */
{id:'g1',t:'gst',d:1,type:'mcq',q:'GST in India was implemented from:',opts:['1 April 2016','1 July 2017','1 January 2017','1 April 2018'],ans:1,exp:'GST was rolled out from 1 July 2017, replacing central and state indirect taxes (Service Tax, VAT, Excise, CST, etc.).'},
{id:'g2',t:'gst',d:1,type:'fill',q:'GST is a _____ based tax (write: origin / destination).',ans:['destination','destination based','destination-based'],exp:'GST is a destination-based consumption tax. Revenue accrues to the state where goods/services are consumed, not produced.'},
{id:'g3',t:'gst',d:1,type:'tf',q:'CGST and SGST are levied on inter-state supply of goods.',ans:false,exp:'False. CGST + SGST are levied on INTRA-state supplies. IGST is levied on inter-state supplies.'},
{id:'g4',t:'gst',d:1,type:'mcq',q:'The GST threshold for mandatory registration for goods suppliers (most states) is:',opts:['₹10 lakh','₹20 lakh','₹40 lakh','₹75 lakh'],ans:2,exp:'₹40 lakh for goods suppliers (₹20 lakh for services; ₹10/20 lakh for special category states).'},
{id:'g5',t:'gst',d:1,type:'mcq',q:'Which article of the Constitution provides the power to levy GST?',opts:['Article 245','Article 246A','Article 279A','Article 300A'],ans:1,exp:'Article 246A (inserted by 101st Constitutional Amendment, 2016) gives concurrent power to Parliament and State Legislatures to levy GST. Article 279A established the GST Council.'},
{id:'g6',t:'gst',d:1,type:'fill',q:'GSTIN is a _____ digit alphanumeric number.',ans:['15','fifteen'],exp:'GSTIN = 15 characters. Structure: 2 (state code) + 10 (PAN) + 1 (entity code) + 1 (Z by default) + 1 (checksum).'},
{id:'g7',t:'gst',d:1,type:'mcq',q:'IGST is levied by:',opts:['State government','Central government','Both jointly','Municipality'],ans:1,exp:'IGST (Integrated GST) is levied and collected by the Central Government on inter-state supplies and imports. Revenue is apportioned between Centre and the destination state.'},
{id:'g8',t:'gst',d:1,type:'tf',q:'GST Council decisions are made by consensus or vote with Centre having 1/3 weight.',ans:true,exp:'True. GST Council: Centre = 1/3 voting weight; States together = 2/3. Decisions require 75% majority. Chaired by Union Finance Minister; state FMs are members.'},
{id:'g9',t:'gst',d:1,type:'mcq',q:'Petroleum products and alcohol are:',opts:['Covered under GST','Outside GST (still under old regime)','Under zero rate','Under composition scheme only'],ans:1,exp:'Petroleum products (crude, diesel, petrol, natural gas, ATF) and alcoholic liquor for human consumption are currently OUTSIDE GST. They continue under VAT/Excise. GST Council may bring petroleum under GST by notification later.'},
{id:'g10',t:'gst',d:1,type:'fill',q:'The current GST rate slabs are 0%, 5%, 12%, 18%, and _____ %.',ans:['28','28%','twenty eight'],exp:'Five main GST slabs: 0%, 5%, 12%, 18%, 28%. Plus compensation cess on luxury/sin goods (cars, tobacco, aerated drinks). Gold is at 3%, cut diamonds at 1.5%.'},
{id:'g11',t:'gst',d:1,type:'mcq',q:'Which of the following is NOT a type of supply under GST?',opts:['Inter-state','Intra-state','Composite','Circular'],ans:3,exp:'No such thing as "circular" supply. GST recognises: inter-state, intra-state, composite supply (naturally bundled, taxed at rate of principal supply) and mixed supply (taxed at highest rate).'},
{id:'g12',t:'gst',d:1,type:'tf',q:'Exports are zero-rated under GST.',ans:true,exp:'True. Under Section 16 of IGST Act, exports and supplies to SEZ are "Zero-rated supplies." Exporter pays no tax but can claim refund of input tax credit, or pay IGST and claim refund.'},
{id:'g13',t:'gst',d:1,type:'mcq',q:'GSTR-1 is the return for:',opts:['Inward supplies','Outward supplies (sales)','Final annual return','Composition dealer'],ans:1,exp:'GSTR-1 = monthly/quarterly return for OUTWARD SUPPLIES (details of sales). Due 11th of next month (monthly) or 13th of month after quarter end (QRMP).'},
{id:'g14',t:'gst',d:1,type:'fill',q:'HSN stands for Harmonized System of _____ .',ans:['nomenclature','naming'],exp:'HSN = Harmonized System of Nomenclature — an international product coding system by WCO with 6-digit base, extended to 8 digits in India. GST uses HSN for goods classification.'},
{id:'g15',t:'gst',d:1,type:'mcq',q:'SAC codes are used for classification of:',opts:['Goods only','Services','Imports','Exempted goods'],ans:1,exp:'SAC (Services Accounting Code) is a 6-digit code issued by CBIC for SERVICES. HSN is for goods.'},
{id:'g16',t:'gst',d:1,type:'tf',q:'A registered dealer must issue a tax invoice at the time of supply of goods.',ans:true,exp:'True. Section 31(1) CGST Act: A registered person must issue a tax invoice at the time of supply (for goods: before or at removal; for services: within 30 days of supply). Bill of supply is issued by composition dealers / exempt supplies.'},
{id:'g17',t:'gst',d:1,type:'mcq',q:'Which of the following is a "composite supply"?',opts:['Sale of laptop + bag separately priced','Goods transport with insurance (naturally bundled, principal = transport)','Sale of TV and microwave together (unrelated)','Goods supplied free'],ans:1,exp:'Composite supply = two or more goods/services NATURALLY BUNDLED and supplied in conjunction, with one being principal. Taxed at rate of PRINCIPAL supply. Transport + insurance is a classic example; principal = transport.'},
{id:'g18',t:'gst',d:1,type:'fill',q:'GSTR-3B is a _____ return of summary of outward and inward supplies.',ans:['monthly','month','monthy','summary'],exp:'GSTR-3B = monthly (or quarterly for QRMP) summary self-declaration return showing outward supplies, ITC availed, and tax payable. Due 20th (or 22nd/24th for QRMP) of next month.'},
{id:'g19',t:'gst',d:1,type:'mcq',q:'The GST Council is chaired by:',opts:['Prime Minister','Union Finance Minister','President','RBI Governor'],ans:1,exp:'Article 279A: GST Council is chaired by the Union Finance Minister. Members include Union Minister of State for Finance/Revenue and Finance/Taxation Ministers of each state/UT.'},
{id:'g20',t:'gst',d:1,type:'mcq',q:'Cess under GST is levied on:',opts:['All supplies','Only exports','Luxury and sin goods (tobacco, cars, etc.)','Only services'],ans:2,exp:'GST Compensation Cess (under GST (Compensation to States) Act 2017) is levied on luxury and sin goods — tobacco, pan masala, aerated waters, motor cars, coal, etc. — to fund compensation to states for revenue shortfall.'},
{id:'g21',t:'gst',d:1,type:'tf',q:'Composition dealers cannot issue tax invoices.',ans:true,exp:'True. Composition dealers under Section 10 issue a "Bill of Supply" (not a tax invoice) as they cannot charge GST from customers separately. They pay flat tax from their turnover.'},
{id:'g22',t:'gst',d:1,type:'fill',q:'The GST law is enforced by the Central Board of _____ Taxes and Customs (CBIC).',ans:['indirect','indirect taxes'],exp:'CBIC = Central Board of Indirect Taxes and Customs (renamed from CBEC). Apex body under Department of Revenue, Ministry of Finance, administering GST, Customs, and Central Excise.'},
{id:'g23',t:'gst',d:1,type:'mcq',q:'Rate of GST on gold is:',opts:['1%','3%','5%','12%'],ans:1,exp:'Gold (including gold jewellery) attracts GST @3% on the value. Making charges on gold jewellery attract 5% GST separately. Diamonds (cut and polished) are at 1.5%.'},
{id:'g24',t:'gst',d:1,type:'tf',q:'An unregistered person cannot claim input tax credit.',ans:true,exp:'True. ITC is available only to a REGISTERED person (Section 16, CGST Act) who receives taxable supplies for business use. Unregistered persons cannot claim ITC.'},
{id:'g25',t:'gst',d:1,type:'mcq',q:'The GST on imports is:',opts:['Only CGST','Only SGST','IGST + Basic Customs Duty','CGST + SGST'],ans:2,exp:'Imports are deemed inter-state supplies. IGST is levied on imports (in addition to Basic Customs Duty and any other customs duties) at the time of customs clearance.'},

/* ── MEDIUM (25) ── */
{id:'g26',t:'gst',d:2,type:'mcq',q:'ITC on motor vehicles used for personal purposes is:',opts:['Fully available','50% available','Blocked (not available)','Available if cost < ₹10 lakh'],ans:2,exp:'Section 17(5) CGST Act: ITC blocked on motor vehicles used for personal purposes. Allowed only for specified uses — transport of goods, carriage for hire (passenger transport), driving school, further supply.'},
{id:'g27',t:'gst',d:2,type:'tf',q:'A supplier under the Composition Scheme can make inter-state taxable outward supplies.',ans:false,exp:'False. Composition dealers CANNOT make inter-state outward supplies. They are limited to intra-state supply. (They can receive from other states, but cannot sell across state borders.)'},
{id:'g28',t:'gst',d:2,type:'fill',q:'Composition Scheme is available for suppliers of goods with aggregate turnover up to ₹ _____ crore.',ans:['1.5','1.5 crore','one and half','1.50'],exp:'₹1.5 crore (₹75 lakh for special category states). For services under Section 10(2A), turnover limit is ₹50 lakh. Composition dealers pay tax at 1%/5%/6% (depending on category) on turnover.'},
{id:'g29',t:'gst',d:2,type:'mcq',q:'GSTR-9 is filed by:',opts:['Composition dealers','Regular registered taxpayers (annual return)','Non-resident taxable persons','Input Service Distributors'],ans:1,exp:'GSTR-9 = annual return for regular registered taxpayers. GSTR-4 for composition dealers, GSTR-5 for non-residents, GSTR-6 for ISDs, GSTR-9C is reconciliation statement (for turnover > ₹5 crore).'},
{id:'g30',t:'gst',d:2,type:'scenario',q:'XYZ Ltd (Mumbai) sells goods worth ₹1,00,000 to ABC Ltd (Delhi). GST rate 18%. Taxes charged:',opts:['CGST ₹9,000 + SGST ₹9,000','IGST ₹18,000','CGST ₹18,000','UTGST ₹18,000'],ans:1,exp:'Mumbai (Maharashtra) to Delhi = INTER-STATE. IGST @18% = ₹18,000. CGST+SGST apply only on intra-state.'},
{id:'g31',t:'gst',d:2,type:'mcq',q:'Time of supply of goods (under forward charge) is the EARLIER of:',opts:['Date of invoice or date of receipt of payment (pre-invoice)','Date of dispatch or 30 days','Date of agreement or delivery','Quarter end'],ans:0,exp:'Section 12(2) CGST Act: Time of supply of goods = EARLIER of (a) date of invoice (or last date by which invoice should be issued u/s 31), (b) date of receipt of payment. Advance received triggers time of supply for services; for goods, this was relaxed — advance does NOT trigger for goods (CN 66/2017).'},
{id:'g32',t:'gst',d:2,type:'tf',q:'Place of supply for services by way of admission to an event (concert) is the location where the event is held.',ans:true,exp:'True. Section 12(6) IGST Act: Place of supply for admission to cultural, artistic, sporting, scientific, educational, entertainment events = location where the event is actually held. Relevant for determining intra vs inter-state.'},
{id:'g33',t:'gst',d:2,type:'fill',q:'Under Section 17(5), ITC is BLOCKED on _____ (name one common blocked item: food/beverages/motor vehicles).',ans:['food','food and beverages','motor vehicles','food beverages','personal consumption','club membership'],exp:'Section 17(5) blocks ITC on several items: motor vehicles (for personal use), food and beverages, outdoor catering, beauty treatment, health services, club/gym membership, travel benefits to employees, works contract for immovable property (except P&M), goods/services for personal consumption, goods lost/stolen/destroyed/given as gift/free sample.'},
{id:'g34',t:'gst',d:2,type:'mcq',q:'Reverse Charge Mechanism (RCM) u/s 9(3)/9(4) means:',opts:['Supplier pays tax as usual','RECIPIENT pays tax directly to the government','No tax is payable','Tax is refunded to supplier'],ans:1,exp:'RCM: The recipient of specified goods/services (9(3)) or purchases from unregistered suppliers (9(4), specific notified categories) pays GST directly to the government, instead of the supplier. Recipient can claim ITC on RCM tax paid, subject to conditions.'},
{id:'g35',t:'gst',d:2,type:'scenario',q:'ABC Ltd has GST output liability of ₹1,00,000 and ITC of ₹40,000 (IGST), ₹30,000 (CGST), ₹20,000 (SGST). Assume output is ₹50,000 CGST + ₹50,000 SGST. Net tax payable:',opts:['CGST ₹0, SGST ₹10,000','CGST ₹10,000, SGST ₹0','CGST ₹0, SGST ₹0 (IGST covers all)','CGST ₹20,000, SGST ₹30,000'],ans:0,exp:'IGST ₹40,000 to be used first. IGST first against IGST output (nil), then against CGST (set-off ₹40,000 → CGST balance 50,000-40,000=10,000, covered by CGST ITC ₹30,000 fully, excess ₹20,000 CGST ITC remains — cannot set against SGST now post Sec 49A). SGST output ₹50,000 – SGST ITC ₹20,000 = ₹30,000 payable? Wait — let\'s redo: Order — IGST ITC 40k → apply to IGST (0), then to CGST (50k-40k=10k) or SGST. The 2019 amendment (Sec 49A+Rule 88A) says IGST ITC must be exhausted before CGST/SGST. Here we applied 40k IGST to CGST→ CGST payable 10k – 30k CGST ITC = -20k (i.e. covered, CGST payable 0, 20k CGST ITC unused). SGST: 50k – 20k SGST ITC = 30k payable. Hmm answer would be CGST 0, SGST 30k. None exact — treat as illustrative: closest is A (0 CGST, small SGST). Key rule — IGST first, then head-matched.'},
{id:'g36',t:'gst',d:2,type:'mcq',q:'"Mixed supply" under GST is taxed at:',opts:['Weighted average rate','Rate of principal item','HIGHEST rate among items','Lowest rate'],ans:2,exp:'Mixed supply = two or more items/services supplied together for a single price but NOT NATURALLY BUNDLED. Taxed at the HIGHEST rate applicable to any item in the bundle. (Composite supply = naturally bundled, taxed at rate of principal.)'},
{id:'g37',t:'gst',d:2,type:'tf',q:'ITC on goods must be availed by the due date for the return of September of the next financial year.',ans:true,exp:'True. Section 16(4): ITC for a financial year must be availed by earlier of (a) due date of GSTR-3B for September (now 30 November w.e.f. amendment in Finance Act 2022), or (b) date of filing annual return.'},
{id:'g38',t:'gst',d:2,type:'fill',q:'Input Service Distributor (ISD) distributes ITC to its _____ having same PAN.',ans:['branches','offices','units','branch offices'],exp:'ISD = an office of supplier (registered) that receives tax invoices for INPUT SERVICES and distributes the credit proportionally to its branches/offices (having same PAN but different GSTINs). Files GSTR-6 monthly.'},
{id:'g39',t:'gst',d:2,type:'mcq',q:'Aggregate turnover for GST registration threshold INCLUDES:',opts:['Only taxable supplies','Only exports','Taxable + exempt + exports + inter-state (same PAN, all India)','Only intra-state sales'],ans:2,exp:'Section 2(6) CGST Act: Aggregate turnover = taxable supplies + exempt supplies + exports + inter-state supplies of ALL PERSONS WITH SAME PAN on all-India basis. Excludes inward supplies, CGST/SGST/IGST/cess.'},
{id:'g40',t:'gst',d:2,type:'scenario',q:'Mr Amit (Delhi) supplies goods to Mr Biren (Mumbai) but the goods are delivered to Mr Chetan (Bengaluru) on Biren\'s instructions (Bill-to-Ship-to). Place of supply for Amit–Biren invoice is:',opts:['Bengaluru','Delhi','Mumbai (registered address of Biren)','Any of these'],ans:2,exp:'Section 10(1)(b) IGST Act (Bill-to-Ship-to): Deemed that goods are received by the person to whom bill is raised (Biren). Place of supply = principal place of business of Biren = MUMBAI. So Amit (Delhi)→Biren (Mumbai) is INTER-STATE → IGST. The Biren–Chetan leg is separate.'},
{id:'g41',t:'gst',d:2,type:'tf',q:'A supplier providing only exempt supplies is still required to register if aggregate turnover exceeds the threshold.',ans:false,exp:'False. Section 23: Persons exclusively engaged in supply of EXEMPT goods/services are NOT LIABLE to register, regardless of turnover. (This is different from zero-rated exports, which ARE taxable, just at rate 0.)'},
{id:'g42',t:'gst',d:2,type:'mcq',q:'E-way bill is required for transport of goods of value exceeding:',opts:['₹20,000','₹50,000','₹1,00,000','₹5,00,000'],ans:1,exp:'Rule 138 CGST Rules: E-way bill mandatory for consignments > ₹50,000 (inter-state movement, and intra-state in most states). Generated before movement; valid for 1 day per 200 km.'},
{id:'g43',t:'gst',d:2,type:'fill',q:'A registered person can opt for Composition Scheme by filing Form _____ .',ans:['cmp-02','cmp 02','form cmp-02','cmp02'],exp:'Form GST CMP-02: Intimation by an existing registered person to opt for composition levy. Must be filed before beginning of the FY. CMP-01 is for migrated taxpayers; CMP-03 is stock statement on opting in.'},
{id:'g44',t:'gst',d:2,type:'mcq',q:'Under QRMP scheme, which is correct?',opts:['Monthly return, monthly payment','Quarterly return, monthly payment (using PMT-06)','Quarterly return, quarterly payment','Annual return only'],ans:1,exp:'QRMP (Quarterly Return Monthly Payment): For taxpayers with turnover ≤ ₹5 crore. They file GSTR-1 and GSTR-3B QUARTERLY but pay tax MONTHLY via Form PMT-06 (first 2 months of quarter) using fixed-sum or self-assessment method.'},
{id:'g45',t:'gst',d:2,type:'scenario',q:'Mr Ravi, a registered interior decorator in Gujarat, receives legal services worth ₹40,000 from an advocate in Gujarat. Who pays GST and under which mechanism?',opts:['Advocate pays forward charge','Mr Ravi pays under RCM as business recipient','No GST since advocate services exempt','Both share 50-50'],ans:1,exp:'Legal services by an advocate (other than senior advocate to a senior) to a business entity are taxable under REVERSE CHARGE (Notification 13/2017 – Central Tax (Rate)). Mr Ravi (business recipient) pays CGST+SGST (intra-state Gujarat) under RCM. ITC can be claimed subject to conditions.'},
{id:'g46',t:'gst',d:2,type:'tf',q:'Penalty for not obtaining GST registration despite being liable is 10% of tax due or ₹10,000, whichever is higher.',ans:true,exp:'True. Section 122(1)(xi) CGST Act: Penalty for non-registration (when liable) = 10% of tax due or ₹10,000, WHICHEVER IS HIGHER. Applicable to various contraventions like not issuing invoice, collecting but not depositing tax, etc.'},
{id:'g47',t:'gst',d:2,type:'fill',q:'GSTR-2A is an _____-generated statement of inward supplies.',ans:['auto','auto-generated','automatic','automatically'],exp:'GSTR-2A = auto-populated inward supply statement for each registered recipient, based on GSTR-1 filed by suppliers. It is dynamic (keeps updating). GSTR-2B is similar but static, generated monthly.'},
{id:'g48',t:'gst',d:2,type:'mcq',q:'The time limit to issue a credit note under GST, for outward supply, is:',opts:['30th Sep (or 30 Nov) of next FY, or annual return, whichever earlier','3 months','End of next FY','No limit'],ans:0,exp:'Section 34(2): Credit note issued for reducing tax liability must be reported by earlier of (a) 30th Sep (now 30 Nov) of next financial year, or (b) filing of annual return for that year. After that, cannot reduce tax liability via credit note.'},
{id:'g49',t:'gst',d:2,type:'scenario',q:'Mr Karan, a trader in Bengaluru, exports goods worth ₹10 lakh to a customer in USA. He pays IGST ₹1.8 lakh. What can he do?',opts:['Pay IGST as normal, no refund','Claim refund of IGST paid (Section 54) OR export under LUT without payment','Pay GST at 28%','Collect IGST from foreign buyer'],ans:1,exp:'Exports are zero-rated u/s 16 IGST Act. Two options: (a) Export under LUT/Bond WITHOUT PAYMENT of IGST, then refund of unutilised ITC; (b) Export ON PAYMENT of IGST and then claim refund of IGST paid. Both routes available; LUT is preferred by exporters to avoid cash blockage.'},
{id:'g50',t:'gst',d:2,type:'mcq',q:'Anti-profiteering under GST (Section 171) requires:',opts:['Refund of excess ITC to government','Commensurate reduction in prices when tax rate is reduced or ITC benefit available','Profit cap of 10%','Audit of all businesses'],ans:1,exp:'Section 171: Any reduction in GST rate, or benefit of ITC, must be PASSED ON TO THE CONSUMER by way of commensurate price reduction. Enforced by National Anti-profiteering Authority (NAA), later absorbed into CCI. Builders, restaurants, FMCGs commonly investigated.'},

/* ── HARD (25) ── */
{id:'g51',t:'gst',d:3,type:'scenario',q:'A restaurant (non-AC, standalone, not in hotel) charges ₹10,000 for meals. GST rate and ITC eligibility for the restaurant:',opts:['18% with full ITC','5% with full ITC','5% WITHOUT ITC','12% with partial ITC'],ans:2,exp:'Standalone restaurants (non-specified premises) attract 5% GST WITHOUT ITC eligibility — a concessional rate on condition of no ITC. Restaurants in hotels with room tariff ≥ ₹7,500 are at 18% with ITC. This is a deliberate policy trade-off — lower rate in exchange for no credit.'},
{id:'g52',t:'gst',d:3,type:'tf',q:'ITC can be availed on goods received in lots only after the last lot is received.',ans:true,exp:'True. Second proviso to Section 16(2): Where goods against an invoice are received in lots/instalments, ITC can be availed only upon receipt of the LAST LOT. Until then, even if invoice is issued for full quantity, ITC is deferred.'},
{id:'g53',t:'gst',d:3,type:'mcq',q:'In a works contract for construction of an immovable property (not for further supply of works contract), ITC is:',opts:['Fully available','Available only for plant & machinery','Blocked for the recipient','Available if cost > ₹1 crore'],ans:2,exp:'Section 17(5)(c)(d): Works contract services for construction of immovable property (other than plant & machinery) are BLOCKED for the recipient. Exception: when used in the course of further supply of works contract service. Plant & machinery construction retains ITC.'},
{id:'g54',t:'gst',d:3,type:'fill',q:'Section _____ of CGST Act deals with "Determination of tax not paid / short paid / erroneously refunded / ITC wrongly availed" in non-fraud cases.',ans:['73','section 73'],exp:'Section 73 = Non-fraud / normal cases (demand up to 3 years from due date of annual return). Section 74 = Fraud / suppression cases (5 years, with heavier penalty). Key distinction in GST adjudication.'},
{id:'g55',t:'gst',d:3,type:'scenario',q:'ABC Ltd (Delhi) transfers goods worth ₹5 lakh to its own branch in Haryana (same PAN, separate GSTIN). GST treatment:',opts:['No GST (same entity)','IGST on ₹5 lakh (deemed inter-state supply)','CGST+SGST','Exempt transfer'],ans:1,exp:'Schedule I, para 2 CGST Act: Supply between distinct persons (same PAN, different states = separate GSTINs) even WITHOUT CONSIDERATION is deemed supply. Delhi→Haryana inter-state → IGST on value ₹5 lakh (value per Rule 28 = open market value or 90% of value to unrelated customer). Branch can claim ITC.'},
{id:'g56',t:'gst',d:3,type:'mcq',q:'A hotel room rented at ₹8,000 per night attracts GST at:',opts:['12% with ITC','18% with ITC','28% without ITC','Exempt'],ans:1,exp:'Room tariff up to ₹1,000 = exempt; ₹1,001-₹7,500 = 12%; ABOVE ₹7,500 = 18% (with ITC). The category is decided by declared tariff per unit per day. Restaurant in such hotels also shifts to 18% with ITC.'},
{id:'g57',t:'gst',d:3,type:'tf',q:'Advance received for supply of services triggers time of supply of service, while advance for goods does not.',ans:true,exp:'True. Time of supply for services (Section 13): earliest of invoice date, receipt of payment (including advance), or service completion. For GOODS, Notification 66/2017 exempts advance — time of supply = invoice/dispatch, NOT advance. (Unless it is a specified scenario under reverse charge.)'},
{id:'g58',t:'gst',d:3,type:'scenario',q:'Safari Tours, a GST-registered tour operator in Goa, organises a package tour and charges ₹50,000 (inclusive of transport, hotel, food). GST treatment:',opts:['18% on ₹50,000 with ITC','5% on ₹50,000 WITHOUT ITC (concessional rate for tour operators)','28% with ITC','Exempt'],ans:1,exp:'Tour operators have special rate: 5% GST WITHOUT ITC (condition — bill should indicate "inclusive of charges of accommodation and transportation"). Alternatively 18% with ITC. Most tour operators choose 5% to stay competitive. Goa tourism commonly uses this scheme.'},
{id:'g59',t:'gst',d:3,type:'mcq',q:'Order of utilisation of ITC under Section 49A/49B (post 2019 amendment) is:',opts:['CGST first, then SGST, then IGST','IGST must be fully utilised BEFORE CGST/SGST credit used','SGST first, then CGST','At taxpayer\'s discretion'],ans:1,exp:'Section 49A + Rule 88A (w.e.f. 1.2.2019): IGST ITC must be used FIRST against IGST liability, then may be used against CGST or SGST (in any order / proportion). Only after IGST is exhausted can CGST/SGST credits be used for their respective outputs. This prevents "refund tourism" between states.'},
{id:'g60',t:'gst',d:3,type:'fill',q:'Under Section 54, refund of unutilised ITC is available for _____ supplies (write: zero-rated / exempt).',ans:['zero-rated','zero rated','zero-rated supplies','zero rated supplies','zerorated'],exp:'Section 54(3): Refund of unutilised ITC is available only for (i) zero-rated supplies made without payment of tax (under LUT), and (ii) inverted duty structure (inputs taxed higher than outputs). Exempt supplies do NOT generate refund of ITC (ITC itself is reversed).'},
{id:'g61',t:'gst',d:3,type:'scenario',q:'A real estate developer receives advance of ₹10 lakh for an under-construction flat in an affordable housing project. GST rate on advance:',opts:['12% with ITC','18% with ITC','1% WITHOUT ITC (concessional rate affordable housing)','Exempt'],ans:2,exp:'Post 1.4.2019 real estate regime: Affordable housing = 1% GST WITHOUT ITC; Other residential = 5% WITHOUT ITC. Commercial = 12% with ITC. Advance attracts same rate as the supply. Developer forgoes ITC in exchange for concessional output rate.'},
{id:'g62',t:'gst',d:3,type:'mcq',q:'Section 74 (fraud cases) imposes penalty equal to _____ of tax due when notice issued.',opts:['10%','25%','50%','100%'],ans:3,exp:'Section 74: Fraud / wilful mis-statement / suppression cases. Penalty = 100% of tax. Reduced if paid: 15% if paid before SCN; 25% if within 30 days of SCN; 50% if after SCN but within 30 days of order. Section 73 (non-fraud) penalty = 10% of tax or ₹10,000, whichever higher.'},
{id:'g63',t:'gst',d:3,type:'tf',q:'A person with ITC wrongly availed under Section 74 cannot compound the offence.',ans:false,exp:'False. Section 138 allows compounding of most offences, including those under Section 74, on payment of compounding amount (min 50% of tax amount, max 150%). Exceptions: repeat offenders, supplies > ₹5 crore, etc. Compounding avoids prosecution.'},
{id:'g64',t:'gst',d:3,type:'scenario',q:'A registered person takes a company-owned car (used both for business & personal) into his personal use permanently. GST implication:',opts:['No GST (personal)','Deemed supply u/s 17(5) / Schedule I; GST on market value','Exempt as gift to self','Capital gains only'],ans:1,exp:'Schedule I, para 1: Permanent transfer/disposal of business assets where ITC has been availed is DEEMED SUPPLY even without consideration. GST payable on open market value (Rule 27-31). Additionally, if ITC was claimed earlier, it may need reversal to the extent attributable to remaining useful life (Rule 44).'},
{id:'g65',t:'gst',d:3,type:'mcq',q:'In Mohit Minerals (SC, 2022), the Supreme Court held that GST on ocean freight for CIF imports is:',opts:['Valid under RCM','Unconstitutional (composite supply already taxed)','Exempt explicitly','Only applicable to FOB imports'],ans:1,exp:'UOI v. Mohit Minerals Pvt Ltd (2022): SC held that levy of IGST on ocean freight for CIF imports (under reverse charge) is unconstitutional. Ocean freight is already part of customs value for IGST on import of goods; separate levy amounts to double taxation. Landmark decision; GST Council recommendations held "persuasive, not binding."'},
{id:'g66',t:'gst',d:3,type:'fill',q:'Composition rate for manufacturers is _____% (CGST 0.5 + SGST 0.5).',ans:['1','1%','one'],exp:'Composition rates on turnover: Manufacturers = 1% (0.5 CGST + 0.5 SGST); Traders = 1% (0.5+0.5) — but on taxable turnover only; Restaurants = 5% (2.5+2.5); Services (Section 10(2A)) = 6% (3+3). Rates on TURNOVER IN STATE, not pan-India.'},
{id:'g67',t:'gst',d:3,type:'scenario',q:'TechSoft Ltd (Karnataka) provides software design services remotely to a US client. Value ₹20 lakh, payment in USD. Classification:',opts:['Domestic service, 18% GST','Export of services (zero-rated) if conditions of Section 2(6) IGST Act met','Exempt absolutely','Imports from USA'],ans:1,exp:'Export of services per Section 2(6) IGST requires: (i) supplier in India, (ii) recipient outside India, (iii) place of supply outside India, (iv) payment in convertible forex or INR (RBI permitted), (v) supplier and recipient not merely establishments of the same person. If all conditions met → zero-rated. File LUT or claim refund of IGST.'},
{id:'g68',t:'gst',d:3,type:'mcq',q:'Under Section 29, registration of a registered person can be CANCELLED for:',opts:['Non-filing of returns for 6 consecutive months (composition: 3 tax periods)','Closure of business','Composition dealer crossing threshold','All of the above'],ans:3,exp:'Section 29 cancellation grounds: (a) business discontinued/transferred/amalgamated; (b) change in constitution; (c) not liable to register any more; (d) voluntary cancellation; (e) non-compliance — e.g., non-filing 6 months (regular), 3 tax periods (composition); (f) composition dealer exceeding threshold. Officer may cancel suo moto or on application.'},
{id:'g69',t:'gst',d:3,type:'tf',q:'An appeal against a GST Adjudicating Authority order is first filed with the GST Appellate Tribunal.',ans:false,exp:'False. First appeal u/s 107 goes to the APPELLATE AUTHORITY (Commissioner / Joint Commissioner Appeals) within 3 months. Thereafter second appeal u/s 112 to the GST Appellate Tribunal (GSTAT) — though the Tribunal has only recently become operational (2024). Then High Court on substantial question of law, and Supreme Court.'},
{id:'g70',t:'gst',d:3,type:'scenario',q:'Mr Vivek (unregistered) purchases raw material worth ₹30,000 (specified category under 9(3)) from registered dealer. Who pays RCM?',opts:['Mr Vivek as recipient (even unregistered)','Registered dealer on forward charge','No one — exempt','Mr Vivek must register first'],ans:0,exp:'Tricky point. Section 9(3) RCM applies based on category of GOODS/SERVICES (e.g., cashew, tobacco leaves, legal services, GTA) — liability shifts to recipient REGARDLESS of registration status. If Vivek is unregistered, he must take compulsory registration u/s 24 (RCM trigger) and pay the tax. Section 9(4) (URD purchases by registered) is a different provision, now largely restricted.'},
{id:'g71',t:'gst',d:3,type:'mcq',q:'Input Tax Credit on capital goods (say a machine) used for taxable supplies is available:',opts:['In the year of purchase fully','In 5 equal annual instalments','In 60 monthly instalments','Depends on depreciation claimed'],ans:0,exp:'Section 16: ITC on capital goods is available FULLY in the year of receipt (no need to spread over life). Condition: depreciation u/s 32 of Income Tax Act should NOT be claimed on the GST component (cannot claim tax benefit under both laws on same amount).'},
{id:'g72',t:'gst',d:3,type:'fill',q:'E-invoicing is mandatory for taxpayers with turnover above ₹ _____ crore (as of Aug 2023).',ans:['5','5 crore','five'],exp:'E-invoicing (Rule 48(4)): Applicable to taxpayers with aggregate turnover > ₹5 crore (from 1.8.2023; earlier ₹10 crore, then ₹20, now ₹5). B2B invoices must be reported on Invoice Registration Portal (IRP) to get IRN before supply.'},
{id:'g73',t:'gst',d:3,type:'scenario',q:'A registered GTA (Goods Transport Agency) transports goods for a corporate. GTA has chosen "forward charge" option @12% w.e.f. FY 23-24. Who pays?',opts:['Recipient under RCM','GTA under forward charge @12% with ITC','Both share 50-50','Exempt'],ans:1,exp:'GTA services to specified recipients were traditionally under RCM @5% (no ITC to GTA) or 12% with forward charge + ITC option. From FY 23-24, the GTA can opt for FORWARD CHARGE by filing Annexure V. If opted: GTA charges 12% (with full ITC to GTA and recipient). Else RCM 5% (recipient pays, no GTA ITC). This example assumes the GTA has opted FC.'},
{id:'g74',t:'gst',d:3,type:'tf',q:'In case of an inverted duty structure (inputs taxed higher than outputs), refund of unutilised ITC on INPUT SERVICES is also available.',ans:false,exp:'False. Section 54(3) + Rule 89(5) — refund under inverted duty structure is available only for ITC on INPUT GOODS. The Supreme Court in VKC Footsteps India Pvt Ltd v. UOI (2021) upheld the constitutional validity of this restriction — input services and capital goods ITC are NOT refundable under inverted structure.'},
